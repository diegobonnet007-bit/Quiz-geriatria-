ne, non della ASL.", "m": "RSA: anche ricoveri di sollievo temporanei.", "f": 0, "fn": 0}, {"n": 108, "id": "108", "q": "Quale delle seguenti condizioni si associa ad incontinenza urinaria da urgenza?", "o": ["Tutte le condizioni citate", "Malattia di Alzheimer iniziale", "Prolasso vescicale", "Nessuna delle condizioni citate", "Malattia di Parkinson Rispetto alla A indicata prima, sulle slides nomina esplicitamente il Parkinson, mentre l’Alzheimer dice essere causa di incontinenza solo nella fase avanzata. L’opzione C non è indicata nelle slides."], "a": 4, "c": "demenza", "w": "Nell'incontinenza da urgenza rientra la malattia di Parkinson (iperattività detrusoriale neurogena). L'Alzheimer dà incontinenza solo in fase avanzata.", "m": "Parkinson → vescica iperattiva → urgenza.", "f": 0, "fn": 0}, {"n": 109, "id": "108bis", "q": ") Quale delle seguenti condizioni può essere associata ad incontinenza urinaria da urgenza?", "o": ["Ictus", "Morbo di Parkinson", "Demenza di Alzheimer", "Tutte le condizioni citate", "Nessuna delle condizioni citate"], "a": 3, "c": "demenza", "w": "Nella versione più ampia, l'incontinenza da urgenza può associarsi a ictus, Parkinson e Alzheimer (tutte cause neurogene di iperattività detrusoriale) → tutte.", "m": "Cause neurologiche centrali → urgenza.", "f": 0, "fn": 0}, {"n": 110, "id": "109", "q": "La rigidità arteriosa nell’anziano:", "o": ["Nessuna delle altre risposte è corretta", "Determina un’elevata prevalenza di ipertensione diastolica isolata", "Si associa ad un aumento della velocità di conduzione dell’onda sfigmica", "Si associa ad un aumento della compliance vascolare", "Favorisce una riduzione dei valori di pressione sistolica"], "a": 2, "c": "cardio", "w": "La rigidità arteriosa dell'anziano aumenta la velocità dell'onda sfigmica (PWV) e riduce la compliance, causando ipertensione sistolica isolata (non diastolica).", "m": "Vasi rigidi → onda più veloce (PWV alta).", "f": 0, "fn": 0}, {"n": 111, "id": "110", "q": "Le prove di ipotensione ortostatica hanno maggior potere diagnostico se eseguite:", "o": ["Il pomeriggio", "In qualsiasi momento, anche a distanza di tempo dalla sincope", "La sera", "Subito dopo l’episodio sincopale"], "a": 3, "c": "cadute", "w": "Le prove di ipotensione ortostatica rendono di più se eseguite subito dopo l'episodio sincopale (l'OI può essere intermittente e sfuggire a distanza).", "m": "Misura l'ortostatica subito dopo lo svenimento.", "f": 0, "fn": 0}, {"n": 112, "id": "111", "q": "In un anziano che riferisce l’improvvisa comparsa di incontinenza urinaria da urgenza, presente da circa due settimane, quale esame richiederesti come primo accertamento?", "o": ["Cistoscopia", "Ecografia transrettale", "TC encefalo", "Esame delle urine ed eventualmente urinocoltura", "Uroflussometria Da slides: l’esame da fare per primo è sempre l’esame delle urine"], "a": 3, "c": "cute", "w": "Davanti a un'incontinenza da urgenza di nuova insorgenza il primo esame è sempre l'esame delle urine ± urinocoltura (per escludere IVU, causa reversibile).", "m": "Incontinenza nuova → prima le urine.", "f": 0, "fn": 0}, {"n": 113, "id": "112", "q": "Un uomo di 65 anni ha avuto un episodio sincopale in seguito alla rotazione brusca del capo. Riferisce storia di episodi pre-sincopali avvenuti con la medesima dinamica. Anamnesi muta e EO negativo. PA e ECG nella norma, prove di ipotensione ortostatica negative. Qual è l’eziologia più probabile di tale episodio?", "o": ["Neuromediata", "Embolia polmonare", "Traumatica", "Disautonomica", "Cardiaca strutturale"], "a": 0, "c": "fragilita", "w": "La sincope scatenata dalla rotazione/compressione del collo (o in un uomo anziano con questi trigger) è neuromediata, da ipersensibilità del seno carotideo.", "m": "Collo stimolato → sincope = seno carotideo (neuromediata).", "f": 0, "fn": 0}, {"n": 114, "id": "113", "q": "Quali delle seguenti formule per la stima del filtrato renale include tra le sue variabili il peso corporeo:", "o": ["MDRD", "CKD-EPI cistatina/creatinina", "BIS-1", "Cockroft-Gault", "CKD-EPI creatinina"], "a": 3, "c": "rene", "w": "La formula di Cockroft-Gault è l'unica che include il PESO corporeo tra le variabili (oltre a età, sesso, creatinina).", "m": "Cockroft-Gault = quella col peso.", "f": 0, "fn": 0}, {"n": 115, "id": "114", "q": "Sulle cadute nell’anziano quali delle seguenti è vera?", "o": ["l’attività fisica è un fattore di rischio", "Sono determinate solo da fattori estrinseci: ambiente inadeguato, ausili inadeguati, esecuzione di attività ad alto rischio", "nell’anziano spesso sono ridotti i “riflessi paracadute”", "le patologie neurologiche non aumentano il rischio di cadute", "hanno un impatto minimo sulla mortalità"], "a": 2, "c": "cadute", "w": "Nell'anziano le cadute sono favorite dalla riduzione dei riflessi di protezione (\"paracadute\"). L'attività fisica protegge (non è fattore di rischio) e le malattie neurologiche aumentano il rischio.", "m": "Anziano cade male perché perde i riflessi paracadute.", "f": 0, "fn": 0}, {"n": 116, "id": "115", "q": "La valutazione neuropsicologica. Scegli un'alternativa:", "o": ["E’ raramente indicata nell’iter diagnostico della demenza", "serve a valutare l’efficienza delle diverse funzioni cognitive in caso di sospetta demenza", "è necessaria per caratterizzare lo stato psicoaffettivo dell’anziano", "serve a valutare l’impatto psicologico dei deficit neurologici nella demenza", "E’ scarsamente utile nelle demenze lievi"], "a": 1, "c": "demenza", "w": "La valutazione neuropsicologica serve a misurare l'efficienza delle diverse funzioni cognitive nel sospetto di demenza (utile anche nelle forme lievi).", "m": "Neuropsicologia = test fini delle funzioni cognitive.", "f": 0, "fn": 0}, {"n": 117, "id": "116", "q": "Quale di queste non entra in diagnosi differenziale con scompenso cardiaco:", "o": ["obesità", "anemia", "BPCO", "diverticolosi del colon", "ipotiroidismo"], "a": 3, "c": "cardio", "w": "La diverticolosi del colon NON entra in diagnosi differenziale con lo scompenso. Obesità, anemia, BPCO e ipotiroidismo possono invece mimarne i sintomi (dispnea/astenia).", "m": "Diverticoli ≠ scompenso.", "f": 0, "fn": 0}, {"n": 118, "id": "117", "q": "Mario, 72 anni, consulta il medico curante perchè nelle ultime settimane ha riscontrato PAS 155 mmHg alle misurazioni eseguite a domicilio, confermata dalle misurazioni eseguite dal curante. E’ in buone condizioni generali e non ha patologie di nota, svolge regolare attività fisica (tennis e corsa 3-4 volte la settimana). Cosa consiglieresti?", "o": ["Nessuna terapia, perchè la terapia farmacologica è indicata solo in prevenzione secondaria", "introduzione di un farmaco anti-ipertensivo a basso dosaggio solo in caso di sintomi, per esempio cefalea", "nessuna terapia, perchè sarebbe indicata solo per valori di PAS > 160 mmHg", "introduzione di un’associazione di DUE farmaci anti-ipertensivi , per esempio un ACEi e un diuretico", "introduzione di UN farmaco anti-ipertensivo a basso dosaggio corretta da slides, le linee guida dicono che nell’anziano fit ci si comporta così"], "a": 3, "c": "cardio", "w": "In un anziano \"fit\" con PAS ~155 le linee guida indicano di iniziare direttamente con un'associazione di due farmaci a basso dosaggio (es. ACE-i + diuretico/calcioantagonista).", "m": "Iperteso anziano fit: parti già con due farmaci a basse dosi.", "f": 0, "fn": 0}, {"n": 119, "id": "118", "q": "Quale tra i seguenti farmaci è indicato dalle linee guida per il trattamento sintomatico dello scompenso cardiaco?", "o": ["Furosemide", "Trazodone", "Idroclorotiazide", "Colchicina", "Salbutamolo"], "a": 0, "c": "cardio", "w": "Per il trattamento SINTOMATICO dello scompenso (congestione) si usa la furosemide (diuretico dell'ansa): allevia i sintomi ma non migliora la prognosi.", "m": "Sintomi da congestione → furosemide.", "f": 0, "fn": 0}, {"n": 120, "id": "119", "q": "Quale tra i seguenti NON è un possibile fattore precipitante di riacutizzazione di segni e sintomi di scompenso cardiaco nel paziente anziano?", "o": ["crisi ipertensiva", "IRA", "scarsa compliance alla terapia farmacologica", "angina da sforzo", "infezione respiratoria"], "a": 3, "c": "cardio", "w": "Il file indica l'angina da sforzo come NON precipitante di riacutizzazione. ⚠️ Attenzione: l'ischemia miocardica è in realtà un classico fattore precipitante dello scompenso; risposta da verificare con le slide del docente.", "m": "⚠️ Da verificare: l'ischemia di solito È un precipitante.", "f": 1, "fn": 1}, {"n": 121, "id": "120", "q": "Quale di questi concetti NON appartiene alla definizione di fragilità?", "o": ["è una sindrome geriatrica", "espone a un maggior rischio di disabilità, ospedalizzazione, istituzionalizzazione e morte", "è caratterizzata da riduzione di performance degli arti inferiori", "comprende la presenza di disabilità", "Si osserva la progressiva riduzione dei meccanismi dell’omeostasi fisiologica."], "a": 3, "c": "fragilita", "w": "La fragilità NON include la disabilità (sono concetti distinti, anche se correlati): la disabilità è una possibile conseguenza, non un criterio definitorio. È una sindrome geriatrica da ridotta riserva omeostatica.", "m": "Fragilità ≠ disabilità (la prima precede, non contiene, la seconda).", "f": 0, "fn": 0}, {"n": 122, "id": "121", "q": "Un paziente con demenza allo stato iniziale può mostrare tutte le seguenti alterazioni tranne:", "o": ["compromissione del linguaggio", "deficit dell’orientamento", "psicosi", "alterazione dello stato di coscienza", "compromissione della memoria"], "a": 3, "c": "demenza", "w": "Nella demenza iniziale la coscienza/vigilanza è conservata: l'alterazione dello stato di coscienza orienta verso il delirium, non la demenza. Memoria, linguaggio, orientamento e psicosi possono invece essere alterati.", "m": "Demenza = coscienza integra; se la coscienza salta → delirium.", "f": 0, "fn": 0}, {"n": 123, "id": "122", "q": "Per valutare lo stato nutrizionale di una persona anziana:", "o": ["è utile valutare la conta dei neutrofili", "nessuna risposta è corretta", "tutte le altre risposte sono corrette", "può essere utile dosare le proteine sieriche", "il BMI non è utile"], "a": 3, "c": "nutrizione", "w": "Per lo stato nutrizionale può essere utile dosare le proteine sieriche (albumina, prealbumina), insieme a BMI e MNA. La conta dei neutrofili non c'entra.", "m": "Nutrizione: guarda anche albumina/prealbumina.", "f": 0, "fn": 0}, {"n": 124, "id": "123", "q": "Come fare diagnosi di disfagia?", "o": ["Eseguendo un RX esofago con contrasto", "valutando il paziente ospedalizzato durante il pasto a letto, mentre viene aiutato dagli operatori sanitari", "eseguento a tutti i pazienti ospedalizzati una visita foniatrica specialistica (povero Coscarelli)", "è possibile fare una valutazione della disfagia SOLO a domicilio durante la vita quotidiana", "eseguendo esami di screening (Swallow Test in paziente seduto con busto eretto) e successiva eventuale valutazione specialistica (visita foniatrica/logopedica con esami strumentali es. VFS)"], "a": 4, "c": "nutrizione", "w": "La diagnosi di disfagia parte da esami di screening (swallow/water test in posizione seduta eretta) e prosegue, se positivi, con valutazione specialistica logopedico-foniatrica e strumentale (es. VFS).", "m": "Disfagia: prima il water test, poi lo specialista.", "f": 0, "fn": 0}, {"n": 125, "id": "124", "q": "In un anziano ricoverato per ictus determinante emiplegia sn, ai fini di prevenire la comparsa di ulcere da pressione è importante", "o": ["Utilizzare presidi assorbenti", "Iniziare precocemente una terapia antibiotica", "Valutare la deglutizione e iniziare quanto prima la nutrizione per via orale o enterale", "Posizionare a sedere non appena possibile", "Posizionare calze elastocompressive Spiegazione: è fondamentale controllare lo stato nutritivo del pz. Infatti un insufficiente apporto dietetico, in particolare di proteine come l’albumina è un indice predittivo di sviluppo di lesioni)."], "a": 2, "c": "cardio", "w": "Nell'emiplegico post-ictus, per prevenire malnutrizione/lesioni si deve valutare la deglutizione e avviare precocemente la nutrizione (orale o enterale). Un buon apporto proteico protegge dalle piaghe.", "m": "Post-ictus: valuta la deglutizione e nutri presto.", "f": 0, "fn": 0}, {"n": 126, "id": "125", "q": "Nel paziente anziano con sincope", "o": ["Il tilt test è controindicato per l’età", "La sincope è di origine cardiaca in circa il 50% dei casi", "Il massaggio dei seni carotidei è controindicato per l’età", "Il massaggio dei seni carotidei e il tilt test possono essere utili nei casi inspiegati al termine della valutazione iniziale"], "a": 3, "c": "cadute", "w": "Massaggio dei seni carotidei e tilt test sono utili nei casi inspiegati al termine della valutazione iniziale (non controindicati per età). La sincope cardiaca non è il 50% dei casi.", "m": "Sincope oscura: tilt test e massaggio carotideo (non per l'età).", "f": 0, "fn": 0}, {"n": 127, "id": "126", "q": "Gli anziani con frattura del femore prossimale:", "o": ["Non lamentano dolore", "Generalmente presentano in anamnesi un trauma maggiore", "Presentano l’arto inferiore accorciato e intraruotato", "Presentano l’arto inferiore accorciato e extraruotato", "Generalmente non presentano limiti alla mobilizzazione attiva e passiva dell’arto inferiore e alla deambulazione"], "a": 3, "c": "ossa", "w": "La frattura del femore prossimale dà classicamente arto accorciato ed EXTRAruotato, con dolore e impotenza funzionale (spesso dopo trauma minore).", "m": "Femore rotto = gamba corta ed extraruotata.", "f": 0, "fn": 0}, {"n": 128, "id": "127", "q": "Di quali strumenti non ci si avvale per fare screening di malnutrizione nel paziente anziano", "o": ["Valutazione delle variazioni del peso corporeo", "Mini Nutritional Assessment MNA", "Valutazione sierica di albumina", "Antropometria", "Densitometria assiale a raggi X (DEXA)"], "a": 4, "c": "fragilita", "w": "La DEXA (densitometria) misura l'osso, non lo stato nutrizionale: NON è uno strumento di screening della malnutrizione. Si usano MNA, variazioni di peso, albumina, antropometria.", "m": "Screening malnutrizione: MNA/peso/albumina, non la DEXA.", "f": 0, "fn": 0}, {"n": 129, "id": "128", "q": "Quale dei seguenti non rientra tra i possibili effetti avversi degli antidepressivi triciclici", "o": ["Xerostomia", "Ipotensione ortostatica", "Globo vescicale", "Bradicardia (al contrario, danno tachicardia)", "Confusione mentale"], "a": 3, "c": "cadute", "w": "Gli antidepressivi triciclici NON danno bradicardia, anzi danno tachicardia (effetto anticolinergico) e allungano il QT. Tipici: xerostomia, ipotensione ortostatica, ritenzione urinaria, confusione.", "m": "Triciclici = tachicardia, non bradicardia (e tanti effetti anticolinergici).", "f": 0, "fn": 0}, {"n": 130, "id": "129", "q": "Quale delle seguenti affermazioni è VERA in riferimento all’anziano ultraottantenne fragile affetto da ipertensione arteriosa?", "o": ["E’ indicata l’introduzione della terapia anti-ipertensiva solo nel paziente sintomatico", "Non è indicata l’introduzione della terapia anti-ipertensiva, ma può essere proseguita qualora già in corso", "E’ indicata l’introduzione della terapia antipertensiva in caso di pressione arteriosa sistolica maggiore di 130 mmHg", "Il trattamento anti-ipertensivo deve essere sospeso", "La terapia anti-ipertensiva è indicata, se tollerata"], "a": 4, "c": "fragilita", "w": "Nell'ultraottantenne fragile la terapia antipertensiva è indicata se tollerata (anche da iniziare), con target meno aggressivi: non va sospesa né limitata ai soli sintomatici.", "m": "Anche il grande anziano fragile va trattato, se regge la terapia.", "f": 0, "fn": 0}, {"n": 131, "id": "130", "q": "Quale dei seguenti parametri non è compreso nel fenotipo di fragilità proposto da Linda Fried", "o": ["Numero di patologie croniche", "Calo ponderale non intenzionale", "Velocità del cammino", "Riduzione dell’attività fisica", "Riduzione della forza muscolare"], "a": 0, "c": "fragilita", "w": "Il fenotipo di Fried NON include il numero di patologie croniche (quella è la comorbilità, costrutto diverso). Comprende: calo ponderale, debolezza, affaticabilità, lentezza del cammino, ridotta attività fisica.", "m": "Fried = 5 item fisici; la comorbilità è un'altra cosa.", "f": 0, "fn": 0}, {"n": 132, "id": "131", "q": "Quale dei seguenti reperti si osserva più frequentemente al monitoraggio pressorio delle 24h in un paziente con disautonomia cardiovascolare?", "o": ["Ipotensione clinostatica", "Ipertensione clinostatica con episodi ipotensivi diurni (spesso l’ipotensione ortostatica si associa a ipertensione in clinostatismo)", "Il monitoraggio pressorio nelle 24 ore non è indicato nel paziente con disautonomia cardiovascolare", "Dipping notturno", "Ipertensione clinostatica con picchi ipertensivi diurni"], "a": 1, "c": "fragilita", "w": "Tipico al monitoraggio 24h del disautonomico è l'ipertensione in clinostatismo con episodi ipotensivi diurni (l'ipotensione ortostatica spesso convive con ipertensione supina).", "m": "Disautonomia: ipertensione sdraiato + ipotensione in piedi.", "f": 0, "fn": 0}, {"n": 133, "id": "132", "q": "Quale delle seguenti è una possibile causa di cadute nell’anziano con demenza", "o": ["Tutte le altre risposte", "Scompenso cardiaco", "Effetti avversi da farmaci", "Ipertensione arteriosa", "Regolare attività fisica"], "a": 2, "c": "demenza", "w": "Nell'anziano con demenza una causa frequente di cadute sono gli effetti avversi dei farmaci (sedativi, antipertensivi, anticolinergici). Da rivedere sempre la terapia.", "m": "Demente che cade → controlla i farmaci.", "f": 0, "fn": 0}, {"n": 134, "id": "133", "q": "L’effetto prognostico favorevole della terapia antiipertensiva dell’anziano:", "o": ["è presente solo nell’ipertensione sisto-diastolica", "è presente solo nella decade 65-75 anni", "consiste nella riduzione del rischio cardiovascolare globale (mi sembra la più sensata tra le 3 disponibili)", "(qualcuno completi)", "(qualcuno completi)"], "a": 2, "c": "cardio", "w": "L'effetto prognostico favorevole della terapia antipertensiva nell'anziano consiste nella riduzione del rischio cardiovascolare globale (ictus, eventi coronarici, scompenso).", "m": "Trattare la pressione = meno eventi CV in generale.", "f": 0, "fn": 0}, {"n": 135, "id": "134", "q": "Un punteggio minore di 21 a Mini Mental State Examination è indicativo di:", "o": ["sindrome depressiva maggiore", "pseudodemenza depressiva", "decadimento cognitivo", "malattia di Alzheimer", "normale livello cognitivo"], "a": 2, "c": "demenza", "w": "Un MMSE < 21 è indicativo di decadimento cognitivo (non specifica però il tipo: non equivale a diagnosi di Alzheimer).", "m": "MMSE < 21 = decadimento (ma non dice quale).", "f": 0, "fn": 0}, {"n": 136, "id": "135", "q": "Nella fibrillazione atriale la frequenza del polso è spesso:", "o": ["superiore od inferiore alla frequenza cardiaca in base alla digitalizzazione", "inferiore alla frequenza cardiaca", "superiore od inferiore alla frequenza cardiaca in base alla postura", "nessuna delle altre risposte è corretta", "superiore alla frequenza cardiaca"], "a": 1, "c": "cardio", "w": "In FA il polso periferico è spesso INFERIORE alla frequenza cardiaca centrale (\"deficit di polso\"): alcuni battiti sono troppo deboli per generare onda periferica.", "m": "FA: il polso \"perde\" battiti rispetto al cuore (deficit di polso).", "f": 0, "fn": 0}, {"n": 137, "id": "136", "q": "Nello scompenso cardiaco a frazione d’eiezione preservata (HFpEF)", "o": ["La frazione di eiezione è tipicamente maggiore o uguale al 50%", "Non sono presenti i segni e i sintomi tipici dello scompenso", "Raramente è presente un quadro ecocardiografico di ipertrofia ventricolare sinistra", "I livelli di NT-proBNP sono normali", "Non ci sono alterazioni ecocardiografiche caratteristiche"], "a": 0, "c": "cardio", "w": "Nell'HFpEF la frazione d'eiezione è ≥50%, ma ci sono segni/sintomi di scompenso, NT-proBNP elevato e alterazioni ecocardiografiche (ipertrofia, disfunzione diastolica).", "m": "HFpEF: FE conservata (≥50%) ma cuore che funziona male in diastole.", "f": 0, "fn": 0}, {"n": 138, "id": "138", "q": "Nell’ identificazione della causa di demenza", "o": ["La valutazione neuropsicologica è poco utile", "È indicato richiedere alcuni esami di laboratorio", "Il neuroimaging strutturale è scarsamente utilizzato in quanto poco specifico", "È sempre necessario effettuare PET con FDG", "La ricerca di biomarcatori liquorali non è mai indicata"], "a": 1, "c": "demenza", "w": "Nell'iter eziologico della demenza è indicato richiedere alcuni esami di laboratorio (es. TSH, B12, folati) per escludere cause reversibili. Il neuroimaging è utile e la neuropsicologia importante.", "m": "Demenza: sempre esami per le cause reversibili (tiroide, B12).", "f": 0, "fn": 0}, {"n": 139, "id": "139", "q": "Quali sono le fasi della deglutizione", "o": ["Non si possono identificare fasi differenti della deglutizione perché è un atto motorio complesso ed unico, comprendente anche il sistema respiratorio e nervoso centrale", "Masticazione, salivazione e fase esofagea", "Fase faringea e fase esofagea, seguita dalla fase gastrica", "Fase preparatoria orale, fase propulsiva orale, fase faringea e fase esofagea", "Le fasi cambiano tra giovani/adulti e anziani, dipendendo dalle modifiche anatomiche che occorrono fisiologicamente o para fisiologicamente nella persona anziana (es. edentulia, riduzione della salivazione)"], "a": 3, "c": "ossa", "w": "Le fasi della deglutizione sono quattro: preparatoria orale, propulsiva orale, faringea ed esofagea.", "m": "Deglutizione: 2 orali + faringea + esofagea.", "f": 0, "fn": 0}, {"n": 140, "id": "140", "q": "Che cosa è il Mini Nutritional Assessment (MNA)", "o": ["Un test di Valutazione Multidimensionale che rileva il cattivo stato nutrizionale e il rischio di malnutrizione ed è costituito da una parte di screening, una valutazione globale, linee guida gestionali per sviluppare un programma terapeutico", "Un test di valutazione del fabbisogno proteico nell’anziano con malnutrizione", "Una scheda di valutazione per l’impostazione di un regime dietetico specifico nei pazienti con malnutrizione", "Un test di Valutazione Multidimensionale che rileva il cattivo stato nutrizionale e il rischio di malnutrizione ed è costituito da una valutazione di screening e da una valutazione globale", "Un test di valutazione del fabbisogno calorico nell’anziano con obesità sarcopenica"], "a": 3, "c": "fragilita", "w": "Il Mini Nutritional Assessment (MNA) è uno strumento di valutazione multidimensionale del rischio di malnutrizione, composto da una parte di screening e una valutazione globale.", "m": "MNA = screening + valutazione globale della nutrizione.", "f": 0, "fn": 0}, {"n": 141, "id": "141", "q": "Per prevenire le cadute nella popolazione anziana", "o": ["È spesso utile l’uso di mezzi di contenzione", "È utile utilizzare calzature comode ma soprattutto aperte", "È utile effettuare un programma di attività fisica", "Nessuna delle risposte è corretta", "Non è utile modificare la terapia farmacologica"], "a": 2, "c": "cadute", "w": "Per prevenire le cadute è utile un programma di attività fisica (forza/equilibrio, es. OTAGO). La contenzione non aiuta e modificare la terapia è spesso necessario.", "m": "Prevenzione cadute = esercizio (equilibrio e forza).", "f": 0, "fn": 0}, {"n": 142, "id": "142", "q": "I fattori di rischio riconosciuti per caduta", "o": ["Comprendono la Malattia di Parkinson, NON gli esiti di ictus", "Comprendono la demenza, ma solo nella fase iniziale", "Comprendono l’Osteoporosi", "Nessuna delle altre risposte è corretta", "Comprendono l’ipertensione arteriosa >>>Correzione Prof. Mossello 16/06, come da dubbio, lui intende l’osteoporosi come condizione che aumenta il rischio di FRATTURA, ma non di caduta NO [Dubbio tra C e D. Pensavamo “nessuna” perchè dall’interpretazione delle slide sembrava che l’osteoporosi aumentasse maggiormente il rischio di frattura patologica, non di caduta. Tuttavia, dal LIBRO pare che l’osteoporosi sia un fattore di rischio per le cadute. Quindi C.]"], "a": 3, "c": "demenza", "w": "Il file segna \"nessuna\" (D); ⚠️ punto controverso: secondo il libro l'osteoporosi è fattore di rischio per cadute, mentre il docente la considera fattore di rischio per la frattura, non per la caduta. Da chiarire con le slide.", "m": "⚠️ Osteoporosi: rischio di frattura sì, di caduta è dibattuto.", "f": 1, "fn": 1}, {"n": 143, "id": "143", "q": "L’assistenza domiciliare integrata:", "o": ["Nessuna delle altre risposte è corretta", "Viene erogata ad anziani generalmente autosufficienti", "È dedicata a persone con condizioni domestiche inadeguate", "Comprende l’assistenza di base alla persona", "Non comprende la fisioterapia"], "a": 3, "c": "cure", "w": "L'Assistenza Domiciliare Integrata (ADI) comprende anche l'assistenza di base alla persona (oltre a infermieristica e riabilitazione) ed è rivolta a non autosufficienti.", "m": "ADI = cure + assistenza alla persona a casa.", "f": 0, "fn": 0}, {"n": 144, "id": "144", "q": "Quale delle seguenti NON è causa REVERSIBILE di incontinenza urinaria", "o": ["Cistite", "Nessuna delle altre risposte è corretta", "Terapia con diuretici", "Delirium", "Fecaloma"], "a": 1, "c": "demenza", "w": "Cistite, diuretici, delirium e fecaloma sono TUTTE cause potenzialmente reversibili di incontinenza (acronimo DRIP) → \"nessuna\" è quella non reversibile, cioè la risposta corretta è B.", "m": "Cause reversibili = DRIP; quindi qui \"nessuna\" è esclusa.", "f": 0, "fn": 0}, {"n": 145, "id": "145", "q": "Nel monitoraggio della terapia con anticoagulanti orali diretti in un paziente con fibrillazione atriale permanente, è importante valutare", "o": ["La frazione d’eiezione", "La frequenza ventricolare media", "Nessuna delle altre risposte è corretta", "Il rischio di interazioni con altre terapie concomitanti quali antifungini/antivirali", "La presenza di dilatazione atriale sn"], "a": 3, "c": "cardio", "w": "Con i DOAC non si monitora la coagulazione, ma va valutato il rischio di interazioni farmacologiche (es. antifungini azolici, antivirali, induttori/inibitori del CYP/P-gp).", "m": "DOAC: niente INR, ma occhio alle interazioni.", "f": 0, "fn": 0}, {"n": 146, "id": "146", "q": "La sincope cardiaca può essere classificata in", "o": ["Aritmica, strutturale cardiaca e riflessa", "Aritmica, strutturale cardiaca e da embolia polmonare", "Da disfunzione nodale, aritmica ventricolare e mista", "Fibrillatoria, strutturale cardiaca e mista", "Cardiaca, polmonare e mista"], "a": 1, "c": "cadute", "w": "La sincope cardiaca si classifica in aritmica, strutturale (es. stenosi aortica) e da embolia polmonare (causa ostruttiva).", "m": "Sincope cardiaca: aritmia, struttura, embolia polmonare.", "f": 0, "fn": 0}, {"n": 147, "id": "147", "q": "Quale tra queste NON è disturbo “non motorio” associato alla Malattia di Parkinson", "o": ["Anosmia", "Allucinazioni visive", "Incontinenza urinaria da sforzo", "Ipotensione ortostatica", "Stipsi Dalla lezione sul Parkinson ipotensione ortostatica, stipsi e incontinenza da URGENZA sono considerati sintomi vegetativi, quindi ad esclusione resta l'incontinenza da sforzo (avendo già scartato anosmia e allucinazioni)."], "a": 2, "c": "cadute", "w": "Tra i sintomi NON motori del Parkinson (anosmia, allucinazioni, ipotensione ortostatica, stipsi, incontinenza da urgenza), l'incontinenza da SFORZO non rientra (è sfinterica).", "m": "Disautonomia Parkinson: urgenza sì, sforzo no.", "f": 0, "fn": 0}, {"n": 148, "id": "148", "q": "In un pz con ipertrofia prostatica, quali farmaci sconsiglieresti?", "o": ["Anticolinergici", "Beta-bloccanti", "Alfa-litici", "calcioantagonisti", "nessuno di questi farmaci è controindicato"], "a": 0, "c": "cardio", "w": "Nell'ipertrofia prostatica vanno evitati gli anticolinergici (peggiorano la ritenzione urinaria). Gli alfa-litici sono addirittura terapia dell'IPB.", "m": "IPB: niente anticolinergici (bloccano la pipì).", "f": 0, "fn": 0}, {"n": 149, "id": "149", "q": "Il programma OTAGO:", "o": ["riguarda la riabilitazione cognitiva della demenza", "riguarda la prevenzione delle cadute", "riguarda la prevenzione dell’ictus", "riguarda la psicoterapia cognitivo-comportamentale", "riguarda la riabilitazione dell’incontinenza urinaria persistente"], "a": 1, "c": "demenza", "w": "Il programma OTAGO è un protocollo di esercizi per la prevenzione delle cadute nell'anziano.", "m": "OTAGO = esercizi anti-caduta.", "f": 0, "fn": 0}, {"n": 150, "id": "150", "q": "ulcera da pressione, quale è un fattore di rischio? non", "o": ["malnutrizione", "arteriopatia periferica", "incontinenza urinaria", "ridotta mobilità", "malattia articolare cronica"], "a": 4, "c": "cardio", "w": "Malnutrizione, immobilità/ridotta mobilità, incontinenza e arteriopatia sono tutti fattori di rischio per le ulcere da pressione; il file evidenzia la malattia articolare cronica (che immobilizza). ⚠️ Domanda ambigua: più opzioni sono fattori di rischio.", "m": "⚠️ Piaghe: contano immobilità, malnutrizione, incontinenza, umidità.", "f": 1, "fn": 1}, {"n": 151, "id": "151", "q": "quali alterazioni trovi all’ECG in un pz con FA?", "o": ["presenza incostante dell’onda P", "allungamento PR", "QRS largo", "Variabilità battito-battito della morfologia del QRS", "nessuna risposta è corretta"], "a": 4, "c": "varie", "w": "In FA all'ECG manca l'onda P (sostituita da onde f) con R-R irregolarmente irregolare; le opzioni proposte (P incostante, PR lungo, QRS largo, variabilità del QRS) sono tutte imprecise → nessuna.", "m": "FA = niente onda P + R-R caotico.", "f": 0, "fn": 0}, {"n": 152, "id": "155", "q": "in presenza di disfagia oro-faringea", "o": ["Si verificano frequenti sinusiti e riniti", "non è utile adattare la dieta, mentre è utile l’utilizzo della nutrizione artificiale", "sono rari i fenomeni di aspirazione tracheo-bronchiale che possono determinare polmoniti ab- ingestis e asfissia da corpo estraneo", "nessuna delle altre risposte è corretta", "non è mai indicata la nutrizione artificiale nell’anziano"], "a": 3, "c": "ossa", "w": "Nella disfagia orofaringea l'aspirazione è frequente, la dieta va adattata e la nutrizione artificiale può servire: le affermazioni proposte sono tutte errate → nessuna.", "m": "Disfagia orofaringea: aspirazione frequente, dieta da adattare.", "f": 0, "fn": 0}, {"n": 153, "id": "156", "q": "Qual è il farmaco di prima scelta nella terapia dello scompenso cardiaco cronico nell’anziano?", "o": ["dopamina", "ACE-inibitori", "calcio-antagonisti", "diuretici risparmiatori di potassio", "tutte le altre risposte sono corrette"], "a": 1, "c": "cardio", "w": "Il farmaco di prima scelta nello scompenso cronico è l'ACE-inibitore (riduce mortalità). I calcioantagonisti non sono indicati e la dopamina è un inotropo dell'acuto.", "m": "Scompenso cronico: parti dall'ACE-inibitore.", "f": 0, "fn": 0}, {"n": 154, "id": "157", "q": "Relativamente alle fratture da fragilità, quale delle seguenti affermazioni è corretta?", "o": ["sono più frequenti nelle donne in età pre-menopausale e nel giovane adulto", "possono portare a disabilità e morte", "si prevengono con il riposo a letto", "sono spontanee", "il rischio può essere valutato in base al fenotipo di Fried"], "a": 1, "c": "fragilita", "w": "Le fratture da fragilità possono portare a disabilità e morte. Non sono spontanee, non si prevengono col riposo e il rischio non si valuta col fenotipo di Fried.", "m": "Frattura da fragilità = disabilità e morte possibili.", "f": 1, "fn": 1}, {"n": 155, "id": "158", "q": "Mario, 87 anni, affetto da idrocefalo normoteso, presenta un iniziale decadimento cognitivo e un grave disturbo della marcia che ha causato ripetuti episodi di caduta nelle ultime settimane. assume 3 farmaci anti-ipertensivi (Ace-inibitori, calcio-antagonista, diuretico dell’ansa), per cui di recente ha effettuato un monitoraggio pressorio delle 24H che mostra valori medi diurni di 115/60 mmHg. in anamnesi non ha storia di cardiopatia e la funzione renale è conservata. Cosa consiglieresti?", "o": ["monitoraggio dei valori pressori a domicilio mediante automisurazione", "ridurre la terapia se al monitoraggio pressorio sono presenti episodi ipotensivi", "ridurre la terapia sospendendo il diuretico", "potenziare la terapia aggiungendo B-bloc", "mantenere invariata la terapia"], "a": 2, "c": "demenza", "w": "Nell'anziano con idrocefalo normoteso ed episodi ipotensivi, per gestire l'ipertensione conviene ridurre la terapia sospendendo il diuretico (che favorisce disidratazione/ipotensione ortostatica).", "m": "Anziano fragile + ipotensione: togli prima il diuretico.", "f": 0, "fn": 0}, {"n": 156, "id": "160", "q": "La Pulse Wave Velocity valuta:", "o": ["la rigidità arteriosa", "la presenza di placche ateromasiche a livello carotideo", "la presenza di arteropatia periferica degli arti inferiori", "la pressione differenziale", "nessuna delle altre risposte è corretta"], "a": 0, "c": "cardio", "w": "La Pulse Wave Velocity (PWV) misura la rigidità arteriosa (più i vasi sono rigidi, più veloce è l'onda di polso).", "m": "PWV = quanto sono rigide le arterie.", "f": 0, "fn": 0}, {"n": 157, "id": "161", "q": "Nel paziente anziano affetto da ipertensione arteriosa:", "o": ["il rischio cv e ipotensivo non influenzano la scelta della terapia anti-ipertensiva", "rischio cv e ipotensivo sono entrambi alti", "rischio cv e ipotensivo sono entrambi bassi", "rischio cv alto e ipotensivo basso", "rischio cv basso e ipotensivo alto"], "a": 1, "c": "cardio", "w": "Nell'anziano iperteso il rischio cardiovascolare E il rischio ipotensivo (cadute, ipoperfusione) sono ENTRAMBI alti: per questo la terapia va personalizzata.", "m": "Anziano iperteso: rischio doppio (CV + ipotensione).", "f": 0, "fn": 0}, {"n": 158, "id": "162", "q": "I casi di demenza in Italia nel paziente anziano stimati sono circa (linee guida Toscana sindrome demenza 2011):", "o": ["100.000", "1.000.000", "500.000", "3.000.000", "50.000"], "a": 1, "c": "demenza", "w": "In Italia i casi di demenza nell'anziano sono stimati intorno a 1.000.000.", "m": "Demenza in Italia ≈ 1 milione.", "f": 0, "fn": 0}, {"n": 159, "id": "163", "q": "I sintomi psicologici e comportamentali in corso di demenza:", "o": ["si presentano in tutti i casi", "non includono la depressione", "nessuna delle risposte corretta", "comprendono l’attività motoria anomala", "si presentano solo nelle fasi gravi di demenza"], "a": 3, "c": "demenza", "w": "I sintomi psicologici e comportamentali della demenza (BPSD) comprendono l'attività motoria anomala (wandering, affaccendamento), oltre a depressione, apatia, psicosi. Non sono presenti in tutti né solo nelle fasi gravi.", "m": "BPSD: anche il vagabondaggio/affaccendamento motorio.", "f": 0, "fn": 0}, {"n": 160, "id": "164", "q": "Quale dei seguenti non è un effetto collaterale degli anticolinesterasici?", "o": ["broncospasmo", "disturbi gastrointestinali", "bradicardia e sincope", "QT lungo", "nessuna delle precedenti"], "a": 3, "c": "cadute", "w": "Gli anticolinesterasici (rivastigmina, donepezil) danno effetti colinergici: disturbi GI, bradicardia/sincope, broncospasmo. NON causano QT lungo come effetto tipico.", "m": "Anticolinesterasici = effetti colinergici (GI, bradicardia), non QT lungo.", "f": 0, "fn": 0}, {"n": 161, "id": "165", "q": "Quale delle seguenti rappresenta l’eziologia più frequente dello scompenso cardiaco nell’anziano", "o": ["valvulopatia", "aritmia", "cardiomiopatia primitiva", "cardiopatia ischemica", "amiloidosi"], "a": 3, "c": "cardio", "w": "La causa più frequente di scompenso cardiaco nell'anziano è la cardiopatia ischemica (seguita da ipertensione e valvulopatie).", "m": "Scompenso anziano = spesso origine ischemica.", "f": 0, "fn": 0}, {"n": 162, "id": "167", "q": "Uno dei seguenti criteri diagnostici orienta per la diagnosi di delirium piuttosto che di demenza:", "o": ["prevalente deficit di memoria", "patologia cronica progressiva", "esordio improvviso spesso databile", "durata maggiore di 6 mesi", "stato di coscienza mantenuto fino alle fasi più avanzate"], "a": 2, "c": "demenza", "w": "L'esordio improvviso e spesso databile orienta verso il delirium (acuto, fluttuante) piuttosto che la demenza (cronica, progressiva, con coscienza a lungo conservata).", "m": "Esordio improvviso e databile = delirium, non demenza.", "f": 0, "fn": 0}, {"n": 163, "id": "168", "q": "Anna, 76 anni, si sottopone ad una visita geriatrica per un disturbo di memoria presente da alcune settimane. Riferisce anche perdita di interesse per attività che prima svolgeva con piacere, tra cui giardinaggio. Lamenta insonnia e ha scarso appetito, per cui ha perso 3 Kg negli ultimi 3 mesi. Al Mini Mental State Examination totalizza un punteggio di 25/30, alla Geriatric Depression Scale un punteggio di 12/15. Quale tra le seguenti categorie di farmaci potrebbe essere di prima scelta?", "o": ["Antidepressivi triciclici", "SSRI", "Inibitori acetilcolinesterasi", "Benzodiazepine", "Nessuna di quelle citate"], "a": 1, "c": "demenza", "w": "Per un disturbo dell'umore nell'anziano la terapia di scelta sono gli SSRI (meglio tollerati). I triciclici sono da evitare (effetti anticolinergici), le BDZ non curano la depressione.", "m": "Depressione anziano: SSRI di prima scelta.", "f": 0, "fn": 0}, {"n": 164, "id": "169", "q": "Quale non è indice di funzionalità renale", "o": ["MDRD", "Crockroft-gault", "Bis", "Ckd-epi", "Bazzet (è una formula per il calcolo del QT, ndr)"], "a": 4, "c": "rene", "w": "La formula di Bazett serve a correggere il QT, NON è un indice di funzione renale. MDRD, Cockroft-Gault, BIS e CKD-EPI stimano invece il filtrato.", "m": "Bazett = QT, non rene.", "f": 0, "fn": 0}, {"n": 165, "id": "170", "q": "Quale tra questa non rientra nelle fratture da fragilità", "o": ["corpo vertebre (toraciche?)", "epifisi femore", "diafisi femore", "polso", "nessuna"], "a": 2, "c": "fragilita", "w": "La diafisi del femore NON è sede tipica di frattura da fragilità (è da trauma ad alta energia). Lo sono invece collo/epifisi femorale, vertebre e polso.", "m": "Diafisi femorale = trauma vero, non fragilità.", "f": 0, "fn": 0}, {"n": 166, "id": "171", "q": "Lo stato confusionale acuto", "o": ["si manifesta sempre con agitazione psicomotoria", "non è influenzato dalla presenza o meno di un decadimento cognitivo", "può avere come causa sottostante delle patologie organiche", "è una condizione non prevenibile in un paziente anziano ospedalizzato", "è raramente dovuto a reazioni avverse a farmaci"], "a": 2, "c": "demenza", "w": "Lo stato confusionale acuto (delirium) ha quasi sempre una causa organica sottostante (infezione, farmaci, disidratazione...). Non si manifesta sempre con agitazione (esiste la forma ipoattiva) ed è prevenibile.", "m": "Delirium = sintomo di un problema organico da cercare.", "f": 0, "fn": 0}, {"n": 167, "id": "172", "q": "Quale dei seguenti viene utilizzato come screening dei disturbi dell’umore?", "o": ["scala di Tinetti", "scala di Braden", "MMSE", "GDS", "test dell’orologio"], "a": 3, "c": "demenza", "w": "La Geriatric Depression Scale (GDS) è lo strumento di screening dei disturbi dell'umore nell'anziano. Tinetti = cadute, Braden = piaghe, MMSE = cognitività.", "m": "GDS = screening della depressione.", "f": 0, "fn": 0}, {"n": 168, "id": "173", "q": "II farmaco di prima scelta nel trattamento iniziale della M. di Parkinson a 80 anni è rappresentato da: Scegli un'alternativa:", "o": ["Inibitore delle Catecol-O-metil-transferasi", "Levodopa + inibitore della DOPA-decarbossilasi", "Amantadina", "Dopamino-agonista", "Inibitore delle mono-amino-ossidasi"], "a": 1, "c": "parkinson", "w": "A 80 anni la terapia di prima scelta del Parkinson è la levodopa + inibitore della DOPA-decarbossilasi (più efficace e meglio tollerata dei dopamino-agonisti nell'anziano).", "m": "Anziano + Parkinson: parti dalla levodopa.", "f": 0, "fn": 0}, {"n": 169, "id": "174", "q": "Nel trattamento dell’ipertensione arteriosa nell’anziano fragile, quale tra i seguenti farmaci è preferibile evitare?", "o": ["Doxazosina", "Losartan", "può essere qualunque farmaco, a patto che vengano raggiunti i target pressori raccomandati", "Amlodipina", "Perindopril Dalle slide (lezione ipertensione arteriosa, slide pag.17) dice che sono da evitare diuretici ed alfa- bloccanti per il rischio di cadute (ipot. ortostatica)"], "a": 0, "c": "fragilita", "w": "Nell'anziano fragile iperteso vanno evitati alfa-litici (es. doxazosina) e diuretici per il rischio di ipotensione ortostatica e cadute.", "m": "Fragile iperteso: no doxazosina/alfa-litici (fanno cadere).", "f": 0, "fn": 0}, {"n": 170, "id": "175", "q": "La perdita transitoria di coscienza", "o": ["è sempre causata da un trauma cranico", "può essere causata da un attacco ischemico transitorio (TIA)", "può essere dovuta a crisi epilettica generalizzata tonica", "è sempre non traumatica", "è un tipo di sincope"], "a": 2, "c": "cadute", "w": "La perdita transitoria di coscienza può essere dovuta a crisi epilettica generalizzata tonica (non è sempre sincope né sempre traumatica/non traumatica). Il TIA tipicamente NON dà perdita di coscienza.", "m": "Perdita di coscienza transitoria: anche l'epilessia, non solo la sincope.", "f": 0, "fn": 0}, {"n": 171, "id": "177", "q": "quale delle seguenti caratteristiche NON è tipico della sincope vasovagale", "o": ["Sincope preceduta da offuscamento della vista e capogiro", "Sincope avvenuta in luoghi caldi e affollati", "sincope preceduta da sudorazione profusa e pallore", "sincope in corso di ortostatismo prolungato", "sincope preceduta da dispnea"], "a": 4, "c": "cadute", "w": "La dispnea NON è tipica della sincope vasovagale (i prodromi tipici sono offuscamento visivo, sudorazione, pallore, capogiro, in ambienti caldi/affollati o ortostatismo prolungato).", "m": "Vasovagale: pallore e sudore sì, fame d'aria no.", "f": 0, "fn": 0}, {"n": 172, "id": "178", "q": "il parkinsonismo dell’anziano", "o": ["Nessuna delle risposte è corretta", "è sempre secondario a patologie degenerative", "può essere secondario all’uso di procinetici e antipsicotici", "raramente è associato a farmaci", "può essere secondario all’uso di inibitori di pompa e benzodiazepine"], "a": 2, "c": "parkinson", "w": "Il parkinsonismo dell'anziano può essere secondario a farmaci, in particolare procinetici (metoclopramide) e antipsicotici (bloccano i recettori D2): non è sempre degenerativo.", "m": "Parkinsonismo iatrogeno = procinetici e antipsicotici.", "f": 0, "fn": 0}, {"n": 173, "id": "179", "q": "Gli inibitori delle colinesterasi hanno un’efficacia dimostrata in quale stadio della malattia di Alzheimer", "o": ["non hanno efficacia clinica nella malattia di Alzheimer ma prevalentemente in altre tipologie di demenza", "moderato-grave", "lieve-moderato", "grave", "vengono somministrati indipendentemente dallo stadio di malattia"], "a": 2, "c": "demenza", "w": "Gli inibitori delle colinesterasi hanno efficacia dimostrata nell'Alzheimer di grado lieve-moderato (nelle fasi gravi si usa la memantina).", "m": "Anticolinesterasici: Alzheimer lieve-moderato.", "f": 0, "fn": 0}, {"n": 174, "id": "180", "q": "Anna, 83 anni, ospite in RSA. E’ affetta da decadimento cognitivo severo e necessita di assistenza continua per svolgere tutte le BADL, ma si alimenta autonomamente. E’ ipertesa in trattamento con ramipril e amlodipina. Al controllo ha mostrato valori sistolici medi di 115 mmHg. Come giudicheresti il controllo pressorio?", "o": ["Eccessivo, è consigliabile ridurre tp antipertensiva", "Adeguato, ma può essere necessaria una riduzione in corso di episodi sincopali.", "Non ottimale, sarebbe consigliabile un potenziamento della terapia", "Non è rilevante valutare il controllo pressorio in pazienti con grave disabilità, in quanto la pressione arteriosa non ha alcun ruolo prognostico in questi pazienti.", "Ottimo, non è necessario aumentare la terapia."], "a": 0, "c": "demenza", "w": "In una paziente con demenza severa e disabilità grave il controllo pressorio molto basso è eccessivo: conviene ridurre la terapia antipertensiva (per evitare ipoperfusione e cadute).", "m": "Grande disabile con PA bassa: alleggerisci la terapia.", "f": 0, "fn": 0}, {"n": 175, "id": "181", "q": "dopo gli 80 anni di età la malattia di Alzheimer colpisce A. 2,8%", "o": ["15%", "oltre 20%", "5%", "circa 10%"], "a": 1, "c": "demenza", "w": "Dopo gli 80 anni la prevalenza di malattia di Alzheimer supera il 20% (cresce esponenzialmente con l'età).", "m": "Over 80: Alzheimer in oltre 1 su 5.", "f": 0, "fn": 0}, {"n": 176, "id": "182", "q": "La non autonomia in una delle Activities of Daily Living (IADL) di Lawton indica:", "o": ["Disabilità più grave di quella indicata dalla non autonomia in una delle BADL di Kats", "Disabilità MENO grave di quella indicata dalla non autonomia in una delle BADL di Kats", "normale autonomia funzionale", "disabilità sovrapponibile a quella indicata dalla non autonomia in una delle BADL di Kats", "non riguarda la valutazione della disabilità ma della non autosufficienza"], "a": 1, "c": "fragilita", "w": "La non autonomia in una IADL (Lawton) indica una disabilità MENO grave di quella segnalata dalla non autonomia in una BADL (Katz): si perdono prima le attività strumentali, poi quelle di base.", "m": "Si perdono prima le IADL (più complesse), poi le BADL.", "f": 0, "fn": 0}, {"n": 177, "id": "183", "q": "In quale situazione è indicato PM:", "o": ["ipotensione ortostatica", "sindrome seno-carotidea", "sindrome seno carotidea di tipo vasodepressivo", "sindrome seno carotidea di tipo cardioinibitorio"], "a": 3, "c": "cadute", "w": "Il pacemaker è indicato nella sindrome del seno carotideo di tipo CARDIOINIBITORIO (asistolia), non nella forma vasodepressiva (calo pressorio).", "m": "PM solo nella forma cardioinibitoria (cuore che si ferma).", "f": 0, "fn": 0}, {"n": 178, "id": "184", "q": "L’Alzheimer è una malattia familiare?", "o": ["solo nel sesso maschile", "sì, sempre", "no, mai", "nelle famiglie numerose", "raramente, per lo più in forme giovanili"], "a": 4, "c": "demenza", "w": "L'Alzheimer è solo raramente familiare/ereditario, per lo più nelle forme a esordio giovanile (mutazioni APP, PSEN1/2). La maggior parte dei casi è sporadica.", "m": "Alzheimer familiare = raro, soprattutto forme giovanili.", "f": 0, "fn": 0}, {"n": 179, "id": "185", "q": "quale delle seguenti è VERA riguardo all’ osteoporosi:", "o": ["Può essere trattata dopo frattura di femore solo previa valutazione mediante MOC (NO)", "trattamento è indicato in prevenzione primaria e secondaria delle fratture da fragilità", "trattamento indicato solo in prevenzione primaria", "interessa prevalentemente l’osso corticale (NO)", "Consigliata la prescrizione sistematica di bifosfonati nei pz. fragili."], "a": 1, "c": "fragilita", "w": "Il trattamento dell'osteoporosi è indicato sia in prevenzione primaria sia secondaria delle fratture da fragilità (non solo primaria). Interessa prevalentemente l'osso trabecolare e non richiede sempre la MOC dopo frattura di femore.", "m": "Osteoporosi: si tratta sia prima che dopo la frattura.", "f": 0, "fn": 0}, {"n": 180, "id": "187", "q": "Sindrome del camice bianco:", "o": ["È frequente nel pz anziano e espone a rischio sovratrattamento", "Si riduce con l'età", "Raro nell'anziano", "Impone una riduzione della terapia antipertensiva", "Impone una intensificazione della terapia antipertensiva"], "a": 0, "c": "cardio", "w": "La sindrome del camice bianco (ipertensione solo in ambulatorio) è frequente nell'anziano ed espone al rischio di sovratrattamento. Non si riduce con l'età; si smaschera con l'ABPM.", "m": "Camice bianco: pressione alta solo dal medico → rischio di curarlo troppo.", "f": 0, "fn": 0}, {"n": 181, "id": "190", "q": "Il suicidio negli anziani:", "o": ["nell’anziano non è frequente, è più frequente il parasuicidio", "è più frequente negli uomini anziani che nei giovani", "è frequente nelle donne anziane depresse", "può verificarsi in età avanzata ma con frequenza inferiore ai giovani", "si manifesta raramente nell’anziano con depressione. come corretta."], "a": 1, "c": "cardio", "w": "Il suicidio \"riuscito\" è più frequente negli uomini anziani che nei giovani (metodi più letali, depressione sottodiagnosticata). Il parasuicidio prevale invece nei giovani/donne.", "m": "Suicidio: il vero rischio è l'uomo anziano.", "f": 0, "fn": 0}, {"n": 182, "id": "191", "q": "il suicidio:", "o": ["è più frequente negli uomini anziani che nei giovani", "nell’anziano non è frequente, mentre lo sono i parasuicidi", "può verificarsi anche in età avanzata, ma con frequenza inferiore alle classi di età più giovane", "si può presentare con frequenza nelle donne anziane depresse", "si manifesta in un anziano con depressione Dubbio tra A ed E. Si è deciso per la A in accordo con quanto esposto nella slide numero 9 del Mossello che cerchiato questa impennata."], "a": 0, "c": "cardio", "w": "La depressione dell'anziano riduce appetito e introito alimentare, causando malnutrizione e calo ponderale. È più frequente (non più rara) rispetto al giovane, comune in RSA, e il suicidio prevale nel sesso maschile.", "m": "Depressione anziano → mangia meno → dimagrisce.", "f": 0, "fn": 0}, {"n": 183, "id": "192", "q": "quale di questi è un sicuro elemento anamnestico di allerta nella valutazione iniziale della sincope:", "o": ["sincope dopo la rapida assunzione dell’ortostatismo", "sincope dopo puntura venosa", "sincope accompagnata da perdita di urine", "sincope in corso di prolungato ortostatismo", "sincope in clinostatismo"], "a": 4, "c": "cadute", "w": "La sincope in clinostatismo (da sdraiato) è un segno di allarme: orienta verso una causa cardiaca/aritmica, non riflessa. Le sincopi dopo ortostatismo, puntura o minzione sono in genere benigne (riflesse).", "m": "Sincope da sdraiato = campanello d'allarme (pensa al cuore).", "f": 0, "fn": 0}, {"n": 184, "id": "194", "q": "il trattamento dell’incontinenza urinaria nella demenza prevede:", "o": ["la riduzione dell’introito di liquidi giornaliero", "la possibilità di accompagnare il paziente in bagno ad intervalli regolari", "la terapia diuretica", "il posizionamento di un catetere vescicale", "sempre l’utilizzo del pannolone"], "a": 1, "c": "demenza", "w": "Nell'incontinenza del demente la gestione è comportamentale: accompagnare in bagno a intervalli regolari (minzione programmata/prompted voiding). No restrizione idrica, no catetere di routine, no diuretici.", "m": "Demente incontinente: portalo in bagno a orari fissi.", "f": 0, "fn": 0}, {"n": 185, "id": "197", "q": "In caso di fibrillazione atriale di nuova diagnosi:", "o": ["è indicata la cardioversione se il rischio cardioembolico è elevato", "è indicata la cardioversione solo dopo 3 settimane di terapia anticoagulante", "è sempre indicata la cardioversione", "è indicata la cardioversione se l’insorgenza dei sintomi non è databile", "è possibile effettuare cardioversione senza terapia anticoagulante se i sintomi sono insorti da meno di 48h"], "a": 4, "c": "cardio", "w": "Nella FA di nuova insorgenza si può cardiovertire senza anticoagulazione preventiva solo se i sintomi sono iniziati da meno di 48 ore (rischio embolico ancora basso); oltre, servono 3 settimane di TAO o l'eco transesofagea.", "m": "FA <48h: cardioversione subito; oltre, prima anticoagula.", "f": 0, "fn": 0}, {"n": 186, "id": "198", "q": "i Parkinsonismi degenerativi comprendono: NON", "o": ["sclerosi laterale amiotrofica", "degenerazione corticobasale", "Demenza a Corpi di Lewy", "Paralisi sopranucleare progressiva", "Atrofia multisistemica"], "a": 0, "c": "demenza", "w": "I parkinsonismi degenerativi (atipici) sono PSP, MSA, degenerazione corticobasale e demenza a corpi di Lewy. La SLA NON è un parkinsonismo (è una malattia del motoneurone) → è l'opzione \"fuori posto\". ⚠️ Probabile versione \"NON comprendono\".", "m": "Parkinsonismi atipici: PSP, MSA, CBD, Lewy. La SLA no.", "f": 1, "fn": 1}, {"n": 187, "id": "199", "q": "la contemporanea presenza di disturbi della deambulazione, incontinenza urinaria da urgenza e deficit cognitivi vi suggerisce la presenza di:", "o": ["meningoencefalite acuta", "demenza a corpi di Lewy", "M. di Parkinson", "Idrocefalo normoteso", "M. di alzheimer"], "a": 3, "c": "demenza", "w": "La triade di Hakim (disturbo della marcia + incontinenza urinaria + deterioramento cognitivo) è tipica dell'idrocefalo normoteso (potenzialmente reversibile con shunt).", "m": "Marcia + pipì + memoria = idrocefalo normoteso.", "f": 0, "fn": 0}, {"n": 188, "id": "200", "q": "quale delle seguenti affermazione è vera:", "o": ["nell’anziano sarcopenico la creatinina sierica è spesso bassa e può determinare una sovrastima del filtrato renale calcolato con le formule basate sulla creatinina", "nell’anziano sarcopenico la creatinina sierica è spesso bassa e può determinare una sottostima del filtrato renale calcolato con le formule basate sulla creatinina", "nell’anziano sarcopenico la creatinina sierica è spesso alta e può determinare una sovrastima del filtrato renale calcolato con le formule basate sulla creatinina", "nell’anziano sarcopenico la creatinina sierica è spesso alta e può determinare una sottostima del filtrato renale calcolato con le formule basate sulla creatinina", "nessuna delle altre risposte è corretta"], "a": 0, "c": "rene", "w": "Nell'anziano sarcopenico la creatinina è spesso bassa (poco muscolo) e le formule basate su di essa SOVRASTIMANO il filtrato.", "m": "Sarcopenia: creatinina bassa → GFR sovrastimato.", "f": 0, "fn": 0}, {"n": 189, "id": "201", "q": "Nel rene senile si osserva:", "o": ["una riduzione dell’attività del sistema renina-angiotensina", "un aumento del flusso plasmatico renale", "un aumento della frazione di filtrazione", "un aumento della capacità dei tubuli di concentrare le urine", "un aumento del numero dei glomeruli funzionanti"], "a": 2, "c": "rene", "w": "Nel rene senile aumenta la frazione di filtrazione nei glomeruli residui (iperfiltrazione compensatoria), mentre si riducono numero di glomeruli, flusso plasmatico renale e funzione tubulare.", "m": "Rene vecchio: i glomeruli rimasti iperfiltrano.", "f": 0, "fn": 0}, {"n": 190, "id": "202", "q": "In quale demenza si rilevano caratteristiche fluttuazioni cognitive:", "o": ["idrocefalo normoteso", "malattia di Alzheimer", "demenza fronto-temporale", "demenza a corpi di Lewy", "demenza associata a malattia di Parkinson"], "a": 3, "c": "demenza", "w": "Le fluttuazioni cognitive (attenzione/vigilanza oscillanti) sono tipiche della demenza a corpi di Lewy (insieme a parkinsonismo e allucinazioni visive).", "m": "Cognizione che oscilla + allucinazioni = corpi di Lewy.", "f": 0, "fn": 0}, {"n": 191, "id": "206", "q": "nella maggior parte dei casi la fase iniziale della M. di Alzheimer si caratterizza per la comparsa di:", "o": ["disturbi mnesici", "allucinazioni uditive", "disturbi della deambulazione", "allucinazioni visive", "disturbi del linguaggio"], "a": 0, "c": "demenza", "w": "Nella maggior parte dei casi l'Alzheimer esordisce con disturbi mnesici (memoria episodica recente). Linguaggio e marcia si alterano più tardivamente.", "m": "Alzheimer comincia dalla memoria.", "f": 0, "fn": 0}, {"n": 192, "id": "207", "q": "Quale delle seguenti affermazioni relative alla sincope nell’anziano è FALSA:", "o": ["è spesso preceduta da prodromi fugaci e di minore intensità", "nessuna delle altre risposte è vera", "può essere presente amnesia retrograda per cui il paziente non ricorda prodromi", "i prodromi sono generalmente prolungati", "può manifestarsi come caduta a dinamica inspiegata"], "a": 3, "c": "cadute", "w": "Nell'anziano i prodromi della sincope sono spesso FUGACI e di minore intensità (non prolungati): l'affermazione \"prodromi prolungati\" è la falsa. Possibile amnesia retrograda dell'episodio.", "m": "Anziano: prodromi corti o assenti, non lunghi.", "f": 0, "fn": 0}, {"n": 193, "id": "208", "q": "Quali valori di pressione arteriosa sistolica (PAS) possono essere considerati sicuri nel grande anziano iperteso e fragile (“safety range”):", "o": ["dipende dai valori di pressione arteriosa diastolica", "qualunque valore di PAS minore di 160 mmHg", "PAS 110-130 mmHg", "Nessuna delle altre risposte è corretta", "PAS 130-150 mmHg"], "a": 4, "c": "fragilita", "w": "Nel grande anziano valori di PAS considerati sicuri sono ~130-150 mmHg (target meno aggressivo per evitare ipoperfusione/cadute).", "m": "Grande anziano: sistolica 130-150, non più bassa.", "f": 0, "fn": 0}, {"n": 194, "id": "209", "q": "Quale dei seguenti non è un fattore di rischio per la comparsa di ulcere da pressione:", "o": ["anemia", "malnutrizione", "piastrinopenia", "disidratazione", "incontinenza sfinterica"], "a": 2, "c": "cardio", "w": "La piastrinopenia NON è un fattore di rischio per ulcere da pressione. Lo sono anemia, malnutrizione, disidratazione, incontinenza (e immobilità).", "m": "Piaghe: contano anemia/nutrizione/umidità, non le piastrine.", "f": 0, "fn": 0}, {"n": 195, "id": "212", "q": "L’ipersensibilità seno-carotideo:", "o": ["Si definisce come “asistolia superiore o uguale ai 3 secondi e/o un calo della PAS superiore o uguale a 25 mmHg senza riproduzione dei sintomi”", "Si definisce come “asistolia superiore o uguale ai 3 secondi e/o un calo della PAS superiore o uguale a 30 mmHg senza riproduzione dei sintomi", "Si definisce come “asistolia superiore o uguale ai 3 secondi e/o un calo della PAS superiore o uguale a 20 mmHg senza riproduzione dei sintomi", "Si definisce come “asistolia superiore o uguale ai 3 secondi e/o un calo della PAS superiore o uguale a 40 mmHg senza riproduzione dei sintomi", "Si definisce come “asistolia superiore o uguale ai 3 secondi e/o un calo della PAS superiore o uguale a 50 mmHg SENZA riproduzione dei sintomi"], "a": 4, "c": "cardio", "w": "L'ipersensibilità del seno carotideo si definisce come asistolia ≥3 secondi e/o calo della PAS ≥50 mmHg durante il massaggio, senza riproduzione dei sintomi.", "m": "Seno carotideo ipersensibile: pausa ≥3 sec o PAS giù ≥50.", "f": 0, "fn": 0}, {"n": 196, "id": "213", "q": "I sintomi psicologici e comportamentali della demenza:", "o": ["Non comprendono mai l’apatia", "Richiedono sempre un trattamento farmacologico", "Comprendono apatia, aggressività e sintomi psicotici ma raramente disturbi della sfera affettiva", "Possono includere sintomi psicotici come allucinazioni o deliri", "Sono sempre presenti nelle fasi più avanzate di malattia"], "a": 3, "c": "demenza", "w": "I sintomi psicologici e comportamentali della demenza (BPSD) possono includere sintomi psicotici come allucinazioni e deliri, oltre ad apatia, aggressività e disturbi affettivi. Non sempre presenti né sempre da trattare con farmaci.", "m": "BPSD: anche allucinazioni e deliri.", "f": 0, "fn": 0}, {"n": 197, "id": "214", "q": "Geriatric Depression Scale (GDS):", "o": ["Serve per individuare i pazienti con depressione che necessitano di trattamento farmacologico", "Viene utilizzata per lo screening dei sintomi depressivi nel paziente con demenza grave", "Consente di distinguere episodi di depressione maggiore e minore", "Consente di porre diagnosi di depressione", "Consente di sospettare un disturbo dell’umore"], "a": 4, "c": "demenza", "w": "La Geriatric Depression Scale è uno strumento di screening: consente di SOSPETTARE un disturbo dell'umore, non di porre diagnosi né di stabilire la terapia.", "m": "GDS = sospetto, non diagnosi.", "f": 0, "fn": 0}, {"n": 198, "id": "215", "q": "Nella classificazione delle ulcere da pressione si distinguono:", "o": ["2 stadi", "3 stadi", "4 stadi", "5 stadi", "6 stadi"], "a": 2, "c": "cardio", "w": "Le ulcere da pressione si classificano in 4 stadi (dall'eritema non sbiancante alla perdita a tutto spessore con esposizione di muscolo/osso).", "m": "Piaghe: 4 stadi.", "f": 0, "fn": 0}, {"n": 199, "id": "216", "q": "Quale delle seguenti è vera rispetto ai percorsi riabilitativi negli anziani sottoposti ad intervento chirurgico per frattura del femore?", "o": ["la riabilitazione domiciliare può essere utilmente proposta a pazienti con demenza o delirium", "la riabilitazione intensiva offre maggiori possibilità di recupero funzionale e motorio a pazienti con demenza", "la riabilitazione domiciliare può essere proposta solo ad anziani cognitivamente integri e precedentemente autosufficienti", "vengono scelti indipendentemente dal livello funzionale precedentemente alla caduta", "comprendono percorsi di riabilitazione intensiva in strutture ospedaliere, non a domicilio Correzione Prof. Mossello 16/06"], "a": 0, "c": "demenza", "w": "La riabilitazione domiciliare può essere proposta anche a pazienti con demenza o delirium (la riabilitazione intensiva ospedaliera offre meno vantaggi in questi pazienti). Va scelta in base al livello funzionale pre-evento.", "m": "Demente/delirante: meglio riabilitare a casa.", "f": 0, "fn": 0}, {"n": 200, "id": "218", "q": "La valutazione dell’autonomia ADL nell’anziano:", "o": ["è generalmente inutile dopo un intervento acuto", "predice il rischio di mortalità anche in corso di malattia acuta", "riduce la disabilità", "serve a fare diagnosi", "nessuna delle altre risposte è corretta (corretta mossello)"], "a": 1, "c": "fragilita", "w": "La valutazione dell'autonomia ADL predice il rischio di mortalità, anche in corso di malattia acuta: la funzione è un marker prognostico potente.", "m": "ADL = predice la prognosi, anche nell'acuto.", "f": 0, "fn": 0}, {"n": 201, "id": "219", "q": "Quale farmaco ha dimostrato di ridurre la mortalità nei pazienti anziani affetti da scompenso cardiaco a frazione d’eiezione preservata?", "o": ["furosemide", "antialdosteronico", "ACE-inibitore", "sacubitril/valsartan", "nessuna delle risposte è corretta"], "a": 4, "c": "cardio", "w": "Il file segna \"nessuna\" (E). ⚠️ Attenzione: ACE-i, ARNI (sacubitril/valsartan), beta-bloccanti e antialdosteronici hanno dimostrato di ridurre la mortalità nello scompenso a FE ridotta; nell'anziano molto fragile l'evidenza è più limitata. Verifica con le slide.", "m": "⚠️ Da verificare: di norma ACE-i/ARNI/BB/MRA riducono la mortalità.", "f": 1, "fn": 1}, {"n": 202, "id": "220", "q": "Quale tra i seguenti NON è uno dei segni “cardinali” della malattia di Parkinson?", "o": ["nessuna delle risposte è corretta", "tremore a riposo", "disfagia", "ipertono plastico", "bradicinesia"], "a": 2, "c": "parkinson", "w": "I segni cardinali del Parkinson sono bradicinesia, rigidità plastica, tremore a riposo e instabilità posturale. La disfagia NON è cardinale (è tardiva).", "m": "Disfagia non è un segno cardinale del Parkinson.", "f": 0, "fn": 0}, {"n": 203, "id": "221", "q": "Quale tra i seguenti NON è un fattore di rischio di ulcere da pressione?", "o": ["arteriopatia obliterante", "incontinenza urinaria", "malnutrizione", "patologia articolare degenerativa", "ridotta mobilità"], "a": 3, "c": "cardio", "w": "Secondo il file la patologia articolare degenerativa NON è fattore di rischio di ulcere da pressione; lo sono arteriopatia, incontinenza, malnutrizione e ridotta mobilità.", "m": "Piaghe: il rischio è l'immobilità, non l'artrosi in sé.", "f": 0, "fn": 0}, {"n": 204, "id": "222", "q": "L’acronimo DRIP si riferisce a:", "o": ["Cause di Delirium", "Cause di incontinenza urinaria acuta", "Cause di cadute", "Cause di demenza", "Nessuna delle altre è corretta Sta per: - D elirium - R estricted mobility - I nfection - P harmaceutical oliuria"], "a": 1, "c": "demenza", "w": "L'acronimo DRIP riassume le cause reversibili di incontinenza urinaria acuta: Delirium, Restricted mobility, Infection/Inflammation/Impaction, Pharmaceuticals/Polyuria.", "m": "DRIP = cause reversibili di incontinenza.", "f": 0, "fn": 0}, {"n": 205, "id": "223", "q": "Le placche amiloidi, tipiche della malattia di Alzheimer sono definite come:", "o": ["depositi extracellulari costituiti da un nucleo centrale di fibrille di beta-amiloide, circondate da un anello di neuriti distrofici e microglia/astrociti/reattivi", "accumuli di alfa-sinucleina e ferro depositati nelle regioni temporali", "depositi extracellulari di proteine con conformazione anomala a tipo beta-foglietto", "accumuli di neuriti distrofici contenenti agglomerati di proteine associati a microtubuli", "placche senili formate da neuroni invecchiati e/o degenerati, aspecifiche e riscontrabili nel “cervello anziano”"], "a": 0, "c": "demenza", "w": "Le placche amiloidi dell'Alzheimer sono depositi EXTRAcellulari con nucleo di fibrille di beta-amiloide circondato da neuriti distrofici e microglia/astrociti reattivi. I grovigli neurofibrillari (tau) sono invece intracellulari.", "m": "Placche = beta-amiloide fuori dai neuroni (i grovigli tau sono dentro).", "f": 0, "fn": 0}, {"n": 206, "id": "224", "q": "L’incontinenza da urgenza si associa a:", "o": ["ipoattività detrusoriale", "deficit sfinterico con ipoattività detrusoriale", "deficit sfinterico con iperattività detrusoriale", "iperattività detrusoriale", "deficit sfinterico con normale attività detrusoriale"], "a": 3, "c": "cute", "w": "L'incontinenza da urgenza è dovuta a iperattività detrusoriale (il detrusore si contrae senza controllo). Lo sfintere è di solito integro.", "m": "Urgenza = detrusore iperattivo.", "f": 0, "fn": 0}, {"n": 207, "id": "225", "q": "L’effetto camice bianco:", "o": ["è raro nel paziente anziano", "impone un’intensificazione della terapia anti-ipertensiva", "impone una riduzione della terapia anti-ipertensiva", "è frequente nel paziente anziano ed espone al rischio di sovratrattamento", "si riduce con l’età"], "a": 3, "c": "cardio", "w": "L'effetto camice bianco è frequente nell'anziano ed espone al rischio di sovratrattamento (PA alta solo in ambulatorio). Non è raro e non si riduce con l'età.", "m": "Camice bianco frequente nell'anziano → non curare in eccesso.", "f": 0, "fn": 0}, {"n": 208, "id": "227", "q": "il paziente con pseudodemenza depressiva: scegli un’alternativa:", "o": ["presenta sintomi depressivi tipicamente refrattari alle terapie farmacologiche", "presenta sintomi depressivi che beneficiano del trattamento con inibitori delle colinesterasi", "presenta un deficit cognitivo reversibile con il trattamento antidepressivo", "lamenta un deficit soggettivo di memoria, ma presenta una normale performance cognitiva ai test di screening cognitivo", "presenta una demenza aggravata dalla presenza di depressione"], "a": 2, "c": "demenza", "w": "Nella pseudodemenza depressiva il deficit cognitivo è reversibile con il trattamento antidepressivo (il \"deficit\" è secondario alla depressione, non a neurodegenerazione).", "m": "Pseudodemenza: curi la depressione e la \"demenza\" sparisce.", "f": 0, "fn": 0}, {"n": 209, "id": "228", "q": "Quale delle seguenti affermazioni sul monitoraggio pressorio nelle 24h è vera:", "o": ["Non è utile nel paziente anziano iperteso, in quanto sono sufficienti le misurazioni cliniche", "È utile per la valutazione del controllo pressorio, ma non ha alcun valore prognostico", "È scarsamente impiegato nell’anziano perché risente dell’effetto camice bianco", "Nessuna delle altre risposta è vera", "Può essere utile nell’anziano con storia di sincope, per la ricerca di episodi ipotensivi"], "a": 4, "c": "cadute", "w": "Il monitoraggio pressorio 24h è utile nell'anziano con storia di sincope, per smascherare episodi ipotensivi (oltre che per valutare il controllo e il dipping notturno).", "m": "ABPM utile nel sincopale: cerca i cali pressori.", "f": 0, "fn": 0}, {"n": 210, "id": "229", "q": "Le possibili manifestazioni di scompenso cardiaco nell’anziano NON comprendono:", "o": ["Astenia", "Nessuna delle risposte è corretta", "Delirium", "Ipotensione arteriosa", "Afasia"], "a": 4, "c": "demenza", "w": "L'afasia NON rientra tra le manifestazioni di scompenso cardiaco. Lo scompenso nell'anziano può dare astenia, delirium, ipotensione, dispnea (presentazioni anche atipiche), non un deficit di linguaggio.", "m": "Scompenso: astenia/confusione sì, afasia no.", "f": 0, "fn": 0}, {"n": 211, "id": "230", "q": "In un paziente che presenta una malattia di Alzheimer di grado lieve-moderato ed incontinenza urinaria da urgenza, cosa consiglieresti per una migliore gestione della continenza?", "o": ["Accompagnare il paziente in bagno ad intervalli regolari (minzione programmata)", "Posizionamento di pannolone", "Posizionamento di catetere vescicale", "Assunzione di alfa-litici la será prima di coricarsi", "Restrizione idrica a minore di 0.5L/die"], "a": 0, "c": "demenza", "w": "Nell'Alzheimer lieve-moderato con incontinenza la strategia è la minzione programmata (accompagnare in bagno a intervalli regolari). Pannolone/catetere/restrizione idrica non sono prima scelta.", "m": "Incontinenza nel demente: bagno a orari, non catetere.", "f": 0, "fn": 0}, {"n": 212, "id": "231", "q": "Il loop recorder:", "o": ["è controindicato nel paziente 80enne", "è utilizzato al solo scopo di ricerca scientifica", "è un dispositivo impiantabile per il monitoraggio ECG prolungato", "è un dispositivo esterno per il monitoraggio ECG continuo che dura minimo 36 mesi"], "a": 2, "c": "varie", "w": "Il loop recorder è un dispositivo IMPIANTABILE per il monitoraggio ECG prolungato (mesi-anni), utile nelle sincopi inspiegate o sospette aritmiche e nell'ictus criptogenetico.", "m": "Loop recorder = registratore ECG sottopelle a lungo termine.", "f": 0, "fn": 0}, {"n": 213, "id": "232", "q": "Quale non fa parte dei criteri del modello di fragilità di L. Fried (simile alla 130?):", "o": ["Comorbidità", "riduzione della velocità dei movimenti", "la perdita di peso", "la debolezza", "il basso livello di attività"], "a": 0, "c": "fragilita", "w": "La comorbidità NON fa parte del fenotipo di Fried (è un costrutto distinto). Il fenotipo comprende perdita di peso, debolezza (hand grip), affaticabilità, lentezza del cammino, ridotta attività fisica.", "m": "Fried = 5 item fisici; la comorbilità è separata.", "f": 0, "fn": 0}, {"n": 214, "id": "234", "q": "Una caduta non spiegata?", "o": ["deve essere indagata come episodio sincopale perché nell’anziano è molto frequente l’amnesia retrograda dell’episodio.", "Una caduta non spiegata può mascherare un evento sincopale nel paziente anziano", "Tutte le cadute non spiegate sono eventi sincopali", "Le cadute non spiegate hanno la stessa prognosi delle cadute accidentali", "Le cadute non aumentano il rischio di istituzionalizzazione"], "a": 0, "c": "cadute", "w": "Una caduta non spiegata va indagata come possibile sincope, perché nell'anziano è frequente l'amnesia retrograda dell'episodio (non ricorda di essere svenuto). Non tutte le cadute non spiegate sono però sincopali.", "m": "Caduta inspiegata = forse sincope dimenticata.", "f": 0, "fn": 0}, {"n": 215, "id": "236", "q": "La terapia occupazionale nella malattia di Alzheimer:", "o": ["Può ridurre l’impatto della malattia sullo stato funzionale ed i sintomi comportamentali", "E’ riservata ai malati nei Nuclei Alzheimer", "E’ inutile nella maggior parte dei casi", "può essere fatta solo a domicilio", "è finalizzata al reinserimento lavorativo"], "a": 0, "c": "demenza", "w": "La terapia occupazionale nell'Alzheimer può ridurre l'impatto della malattia sullo stato funzionale e i disturbi comportamentali (non mira al reinserimento lavorativo).", "m": "Terapia occupazionale: meno disabilità e meno BPSD.", "f": 0, "fn": 0}, {"n": 216, "id": "238", "q": "La riduzione della pressione nelle ore notturne (“dipping”):", "o": ["è generalmente conservata nel paziente con ipertensione clinostatica", "è spesso assente nel paziente anziano, ma non ha alcun impatto sul rischio cv", "è generalmente conservato nel paziente anziano", "è spesso assente nel paziente anziano", "non è un parametro rilevante da indagare nel paziente anziano Nella lezione su elearning dice \"è spesso abolito nel pz anziano\" e anche che la sua assenza correla con MACE (Major Adverse Cardiovascular Events)"], "a": 3, "c": "cardio", "w": "Il \"dipping\" (calo pressorio notturno fisiologico) è spesso ASSENTE nell'anziano (pattern non-dipper/reverse-dipper), e la sua assenza correla con maggiori eventi cardiovascolari.", "m": "Anziano: spesso la pressione non cala di notte (non-dipper).", "f": 0, "fn": 0}, {"n": 217, "id": "240", "q": "Qual è la classica triade sintomatologica della stenosi aortica?", "o": ["Dispepsia, sincope e dolore trafittivo interscapolare", "astenia, dispnea e dolore toracico", "sincope, dispnea e cardiopalmo", "dispnea, sincope e dolore toracico", "cefalea dolore toracico e sincope"], "a": 3, "c": "cadute", "w": "La triade classica della stenosi aortica è dispnea, sincope (da sforzo) e dolore toracico/angina.", "m": "Stenosi aortica: Dispnea, Sincope, Dolore toracico.", "f": 0, "fn": 0}, {"n": 218, "id": "241", "q": "Quale dei seguenti tipi di incontinenza urinaria persistente è nettamente più frequente nel sesso femminile?", "o": ["da sforzo", "funzionale", "da rigurgito", "da urgenza", "mista"], "a": 0, "c": "cute", "w": "L'incontinenza nettamente più frequente nella donna è quella da sforzo (debolezza del pavimento pelvico/sfintere).", "m": "Donna = incontinenza da sforzo.", "f": 0, "fn": 0}, {"n": 219, "id": "242", "q": "Quale di questi elementi NON appartiene al modello operativo di fragilità proposto da L Fried?", "o": ["Numero di cadute maggiori di 3 negli ultimi 6 mesi", "Facile affaticabilità", "Ridotta velocità del cammino", "Ridotta forza muscolare", "perdita di peso Fried e Coll. (2001) propongono una definizione operativa, utile sia al riconoscimento della fragilità sia Ridotta attività fisica (valutabile con la scala PASE) 4. Riduzione della velocità del cammino (su percorso noto > 7’’ a percorrere 5 m.) (Fragilità = 3 item presenti) 5."], "a": 0, "c": "fragilita", "w": "Un numero di cadute >3 in 6 mesi NON fa parte del modello operativo di Fried (le cadute sono un esito della fragilità, non un criterio). I 5 criteri sono peso, debolezza, affaticabilità, lentezza, ridotta attività.", "m": "Le cadute non sono un criterio di Fried (ne sono la conseguenza).", "f": 0, "fn": 0}, {"n": 220, "id": "243", "q": "Quale tra le seguenti affermazioni riguardo al rene senile è FALSA:", "o": ["aumenta la filtrazione a livello dei glomeruli residui", "si riduce la funzione tubulare", "si riduce il flusso plasmatico renale", "si riduce il numero dei glomeruli funzionanti", "Si riduce la filtrazione a livello dei glomeruli residui"], "a": 4, "c": "rene", "w": "Nel rene senile la filtrazione nei glomeruli RESIDUI AUMENTA (iperfiltrazione compensatoria): dire che \"si riduce\" è l'affermazione FALSA. Si riducono invece numero di glomeruli, flusso plasmatico e funzione tubulare.", "m": "Rene vecchio: i glomeruli superstiti filtrano di più, non di meno.", "f": 0, "fn": 0}, {"n": 221, "id": "244", "q": "una signora di 73 anni si trova in un luogo affollato ed ha una sincope. Si siede e le passa. che tipo di sincope è? ( non ricordo la formulazione precisa )", "o": ["cardiaca", "vasovagale", "situazionale"], "a": 1, "c": "cadute", "w": "Sincope in luogo affollato che si risolve sedendosi: è vasovagale (riflessa), una volta esclusa la causa cardiaca.", "m": "Affollamento + passa da seduta = vasovagale.", "f": 1, "fn": 1}, {"n": 222, "id": "246", "q": "paziente con protesi valvolare viene sottoposto ad una TURP e sviluppa endocardite. quale patogeno sarà più probabilmente coinvolto?", "o": ["Enterococcus faecalis", "Streptococcus pneumoniae", "MRSA"], "a": 0, "c": "cure", "w": "Dopo TURP in portatore di protesi valvolare, l'endocardite è tipicamente da enterococco (Enterococcus faecalis), per origine genito-urinaria del germe.", "m": "Endocardite post-urologica = enterococco.", "f": 1, "fn": 1}, {"n": 223, "id": "249", "q": "Il trattamento dell’ipotensione ortostatica può comprendere:", "o": ["nessuna delle risposte è vera", "B-bloccanti", "impianto di pacemaker", "utilizzo di fascia addominale", "calcio antagonisti"], "a": 3, "c": "cadute", "w": "Il trattamento dell'ipotensione ortostatica comprende misure fisiche come la fascia addominale (riduce il pooling venoso). Beta-bloccanti e calcioantagonisti la peggiorano; il pacemaker non c'entra.", "m": "Ortostatica: fascia addominale e misure fisiche.", "f": 0, "fn": 0}, {"n": 224, "id": "250", "q": "Quali fra i seguenti sottotipi di scompenso è più tipico nel paziente anziano?", "o": ["HFmrEF", "HFrEF", "HFpEF", "scompenso cardiaco congestizio", "scompenso cardiaco destro"], "a": 2, "c": "cardio", "w": "Lo scompenso più tipico dell'anziano (specie donna iperteso/diabetico) è l'HFpEF, a frazione d'eiezione preservata.", "m": "Anziano = HFpEF.", "f": 0, "fn": 0}, {"n": 225, "id": "251", "q": "le cadute nell’anziano :", "o": ["non possono essere standardizzate", "richiedono spesso visita ortopedica", "spesso sono motivo di accesso al pronto soccorso", "non richiedono la modifica della terapia"], "a": 2, "c": "cadute", "w": "Le cadute nell'anziano sono spesso motivo di accesso al pronto soccorso (e di ospedalizzazione/istituzionalizzazione).", "m": "Cadute = frequente motivo di PS.", "f": 0, "fn": 0}, {"n": 226, "id": "254", "q": "Causa NON reversibile di incontinenza:", "o": ["Tp diuretica", "Delirium", "Cistite", "Fecaloma", "Nessuna Reminder: le cause potenzialmente reversibili sono riassumibili nell’acronimo DRIP. D - elirium R - estricted mobility I - nfection, Inflammation, Impaction P - olyuria, Pharmaceuticals"], "a": 4, "c": "demenza", "w": "Tutte le opzioni (diuretici, delirium, cistite, fecaloma) sono cause REVERSIBILI di incontinenza (DRIP) → la causa \"non reversibile\" è \"nessuna\" di queste.", "m": "Tutte reversibili (DRIP) → \"nessuna\" non lo è.", "f": 0, "fn": 0}, {"n": 227, "id": "256", "q": "La malattia di Parkinson è dovuta ad una neurodegenerazione a carico:", "o": ["Del sistema limbico", "Nessuna delle altre risposte è corretta", "Del secondo motoneurone spinale", "Del sistema nigro-striatale", "Delle vie piramidali"], "a": 3, "c": "parkinson", "w": "La malattia di Parkinson è dovuta a neurodegenerazione del sistema nigro-striatale (perdita dei neuroni dopaminergici della substantia nigra).", "m": "Parkinson = via nigro-striatale che si spegne.", "f": 0, "fn": 0}, {"n": 228, "id": "257", "q": "Quale tra i seguenti NON è una possibile manifestazione di depressione nell’anziano?", "o": ["Tutti i sintomi citati nelle altre risposte potrebbero essere manifestazioni di depressione nell’anziano", "Cefalea", "Insonnia", "Calo ponderale", "Declino dell’autonomia nelle attività quotidiane"], "a": 0, "c": "fragilita", "w": "Tutti i sintomi elencati (cefalea, insonnia, calo ponderale, declino funzionale) possono essere manifestazioni di depressione nell'anziano, che è spesso atipica/somatica → la risposta è \"tutti potrebbero esserlo\".", "m": "Depressione anziano: spesso mascherata da sintomi fisici.", "f": 0, "fn": 0}, {"n": 229, "id": "258", "q": "Recenti studi osservazionali relativi all’ipertensione nell’anziano suggeriscono che", "o": ["La relazione tra pressione arteriosa e outcome avversi è simile nel pz fit e nell’anziano fragile", "Valori pressori più bassi si associano ad un aumento del rischio di mortalità nell’anziano fragile", "Non si osserva alcuna associazione tra pressione arteriosa e mortalità", "Nell’anziano fragile è consigliabile un target di PA sistolica &lt; 130 mmHg", "Valori pressori più bassi si associano ad una riduzione del rischio di mortalità nell’anziano fragile La spiegazione è riportata nella video lezione \"La personalizzazione del trattamento antiipertensivo nell'anziano\" studio SNACK."], "a": 1, "c": "fragilita", "w": "Negli studi sull'anziano FRAGILE, valori pressori più bassi si associano ad AUMENTO della mortalità (curva a J): nel fragile non vale \"più basso è meglio\".", "m": "Nel fragile, pressione troppo bassa = più morti.", "f": 0, "fn": 0}, {"n": 230, "id": "260", "q": "Quale di queste non è a rischio di verificarsi
