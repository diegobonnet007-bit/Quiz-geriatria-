<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="description" content="Quiz di preparazione all'esame di Geriatria — 343 domande con spiegazioni e memo.">
<title>Quiz di Geriatria</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230f766e'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='19' fill='%23fff' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#edefea; --paper:#ffffff; --paper-2:#f7f8f5;
  --ink:#1b2723; --muted:#5c6a63; --faint:#8b958f;
  --line:#e0e4dd; --line-2:#eaede6;
  --accent:#0f766e; --accent-ink:#0a5750; --accent-soft:rgba(15,118,110,.10); --accent-softer:rgba(15,118,110,.06);
  --ok:#2f8f48; --ok-bg:rgba(47,143,72,.12); --ok-line:rgba(47,143,72,.34);
  --ko:#cb4a4a; --ko-bg:rgba(203,74,74,.10); --ko-line:rgba(203,74,74,.30);
  --warn:#a4760a; --warn-bg:rgba(164,118,10,.10); --warn-line:rgba(164,118,10,.30);
  --shadow-sm:0 1px 2px rgba(27,39,35,.05);
  --shadow:0 1px 2px rgba(27,39,35,.05),0 10px 28px -16px rgba(15,118,110,.26);
  --r-lg:18px; --r-md:13px; --r-sm:11px; --r-xs:7px;
  --ff-disp:'Fraunces',Georgia,serif;
  --ff:'Spline Sans',system-ui,-apple-system,sans-serif;
}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--ff);background:var(--bg);color:var(--ink);min-height:100dvh;line-height:1.55;
  background-image:radial-gradient(rgba(15,118,110,.04) 1px,transparent 1px);background-size:22px 22px}
main{max-width:680px;margin:0 auto;padding:22px 18px 56px}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
p{line-height:1.62}
h1{font-family:var(--ff-disp);font-weight:600;letter-spacing:-.02em;color:var(--ink);font-optical-sizing:auto}

/* buttons */
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn{display:flex;width:100%;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 16px;border-radius:var(--r-md);border:1px solid var(--line);background:var(--paper);
  color:var(--ink);font-size:15px;font-weight:500;text-align:left;box-shadow:var(--shadow-sm);
  transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;margin-bottom:10px}
.btn:hover{background:var(--paper-2);border-color:#d3d9d0}
.btn:active{transform:scale(.985)}
.btn .arr{color:var(--faint);font-size:16px;transition:transform .18s ease}
.btn:hover .arr{transform:translateX(3px);color:var(--accent)}
.btn-primary{justify-content:center;background:var(--accent);border-color:var(--accent);color:#fff;
  font-weight:600;box-shadow:0 1px 2px rgba(10,87,80,.18),0 10px 22px -12px rgba(15,118,110,.5)}
.btn-primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sim{background:linear-gradient(180deg,#13837a,#0c5f58);border-color:#0c5f58;color:#fff;font-weight:600}
.btn-sim:hover{background:linear-gradient(180deg,#0f766e,#0a534d)}
.btn-ghost{justify-content:center;background:transparent;border:1px solid var(--line);color:var(--muted);
  font-size:13px;font-weight:500;box-shadow:none}
.btn-ghost:hover{background:var(--paper-2);color:var(--ink)}
.btn-back{display:inline-flex;width:auto;gap:7px;padding:9px 14px;background:transparent;border:1px solid var(--line);
  color:var(--muted);font-size:13px;font-weight:500;border-radius:99px;margin-bottom:18px;box-shadow:none}
.btn-back:hover{background:var(--paper-2);color:var(--ink)}

/* home header */
.hero{text-align:center;padding:26px 0 18px}
.mark{width:62px;height:62px;border-radius:18px;background:linear-gradient(160deg,#13837a,#0b524c);
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;
  box-shadow:0 10px 26px -10px rgba(15,118,110,.55);font-family:var(--ff-disp);font-weight:600;font-size:30px;color:#fff}
.hero h1{font-size:30px}
.hero .sub{color:var(--muted);font-size:13.5px;margin-top:6px}
.hero .sub b{color:var(--accent-ink);font-weight:600}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin:18px 0 4px}
.stat{background:var(--paper);padding:13px 10px;text-align:center}
.stat .v{font-family:var(--ff-disp);font-weight:600;font-size:22px;line-height:1}
.stat .l{font-size:10.5px;color:var(--faint);margin-top:5px;letter-spacing:.02em}

/* tabs */
.tabs{display:flex;gap:7px;margin:18px 0 16px;background:var(--paper-2);padding:5px;border-radius:var(--r-md);border:1px solid var(--line)}
.tab{flex:1;padding:9px;border-radius:9px;color:var(--muted);font-size:13.5px;font-weight:600;text-align:center;
  transition:background .18s,color .18s}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--paper);color:var(--accent-ink);box-shadow:var(--shadow-sm)}

.eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:2px 2px 11px}

/* category cards */
.cat{display:flex;align-items:center;gap:13px;width:100%;padding:13px 15px 13px 13px;border-radius:var(--r-md);
  border:1px solid var(--line);background:var(--paper);box-shadow:var(--shadow-sm);margin-bottom:9px;
  position:relative;overflow:hidden;transition:transform .18s,background .18s,border-color .18s}
.cat:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);opacity:.8}
.cat:hover{background:var(--paper-2);border-color:#d3d9d0;transform:translateY(-1px)}
.cat:active{transform:scale(.99)}
.cat .ico{font-size:20px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:var(--accent-softer);border-radius:11px;flex-shrink:0}
.cat .body{flex:1;min-width:0}
.cat .nm{font-weight:600;font-size:14.5px}
.cat .ct{color:var(--faint);font-size:12px;margin-top:2px}
.ring{flex-shrink:0;width:34px;height:34px}
.ring text{font-family:var(--ff);font-size:10px;font-weight:600;fill:var(--accent-ink)}

/* quiz */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.topbar .pos{color:var(--muted);font-size:13px;font-weight:600}
.topbar .pos .cat-tag{color:var(--faint);font-weight:500}
.topbar .right{display:flex;align-items:center;gap:8px}
.qid{color:#aab2ab;font-size:12px}
.flagb{font-size:10.5px;color:var(--warn);background:var(--warn-bg);border:1px solid var(--warn-line);
  border-radius:var(--r-xs);padding:2px 7px;font-weight:600}
.bar{height:5px;background:var(--line-2);border-radius:99px;overflow:hidden;margin-bottom:20px}
.bar .fill{height:100%;background:linear-gradient(90deg,#13837a,#0f766e);border-radius:99px;transition:width .42s cubic-bezier(.4,0,.2,1)}
.qcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 18px;
  margin-bottom:14px;box-shadow:var(--shadow)}
.qtext{font-size:16.5px;font-weight:500;line-height:1.5;text-wrap:pretty}
.opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;padding:12px 14px;margin-bottom:9px;
  border-radius:var(--r-sm);border:1px solid var(--line);background:var(--paper);color:var(--muted);font-size:14px;
  line-height:1.45;transition:transform .15s,background .15s,border-color .15s,color .15s;box-shadow:var(--shadow-sm)}
.opt:hover{background:var(--paper-2);border-color:#d3d9d0;color:var(--ink)}
.opt:active{transform:scale(.99)}
.opt .lab{flex-shrink:0;width:22px;height:22px;border-radius:7px;background:var(--paper-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--faint);margin-top:1px;transition:all .15s}
.opt .tx{flex:1}
.opt.sel{background:var(--accent-soft);border-color:var(--accent);color:var(--ink)}
.opt.sel .lab{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.ok{background:var(--ok-bg);border-color:var(--ok-line);color:#1f5e2e}
.opt.ok .lab{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.ko{background:var(--ko-bg);border-color:var(--ko-line);color:#8f2f2f}
.opt.ko .lab{background:var(--ko);border-color:var(--ko);color:#fff}
.opt .mk{flex-shrink:0;font-weight:700;margin-top:1px}
.opt[disabled]{cursor:default}
.opt[disabled]:hover{transform:none}

/* explanation */
.exp{border-radius:var(--r-md);padding:15px 16px;margin:14px 0;border:1px solid var(--line);background:var(--paper);
  box-shadow:var(--shadow-sm);animation:rise .28s ease}
.exp.is-ok{background:linear-gradient(180deg,rgba(47,143,72,.07),var(--paper));border-color:var(--ok-line)}
.exp.is-ko{background:linear-gradient(180deg,rgba(203,74,74,.06),var(--paper));border-color:var(--ko-line)}
.exp .head{font-weight:700;font-size:13.5px;margin-bottom:9px;display:flex;gap:7px;align-items:baseline}
.exp.is-ok .head{color:#236b32}
.exp.is-ko .head{color:#a83b3b}
.exp .why{color:var(--ink);font-size:13.5px;line-height:1.6}
.exp .why .k{color:var(--muted);font-weight:600}
.memo{background:var(--accent-softer);border:1px solid var(--accent-soft);border-left:3px solid var(--accent);
  border-radius:var(--r-sm);padding:10px 12px;margin-top:11px;font-size:13px;color:var(--accent-ink);line-height:1.5}
.memo .t{display:block;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:3px}
.note{background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:var(--r-sm);
  padding:9px 12px;margin-top:10px;font-size:12px;color:#7a5a08;line-height:1.5}
.note b{color:var(--warn)}

/* results */
.result{text-align:center;padding:18px 0 8px}
.result .emo{font-size:46px}
.result h1{font-size:25px;margin-top:6px}
.result .catline{color:var(--faint);font-size:13px;margin-top:4px}
.grade{font-family:var(--ff-disp);font-weight:600;font-size:62px;line-height:1;margin:14px 0 2px}
.grade small{font-size:24px;color:var(--faint);font-weight:500}
.result .pct{color:var(--muted);font-size:14px}
.result .lode{display:inline-block;margin-top:8px;font-size:12px;font-weight:600;color:var(--accent-ink);
  background:var(--accent-soft);border:1px solid var(--accent-soft);border-radius:99px;padding:3px 12px}
.sectitle{font-weight:600;font-size:14px;margin:24px 2px 12px;display:flex;align-items:center;gap:7px}
.wrong{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.wrong .wtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.wrong .wq{color:var(--ink);font-size:13.5px;line-height:1.5;font-weight:500;margin-bottom:9px}
.wrong .ans{font-size:12.5px;margin-bottom:3px;display:flex;gap:7px;align-items:flex-start}
.wrong .ans.ko{color:#a83b3b}
.wrong .ans.ok{color:#236b32}
.wrong .wwhy{color:var(--muted);font-size:12.5px;line-height:1.55;margin-top:9px}
.wrong .wwhy .k{color:var(--accent-ink);font-weight:600}
.row{display:flex;gap:10px;margin-top:20px}
.row .btn{flex:1;justify-content:center;margin-bottom:0}

/* empty state */
.empty{background:var(--paper);border:1px dashed var(--line);border-radius:var(--r-lg);padding:22px;text-align:center;margin:16px 0;box-shadow:var(--shadow-sm)}
.empty .ttl{font-family:var(--ff-disp);font-weight:600;font-size:18px}
.empty p{color:var(--muted);font-size:13.5px;margin-top:6px}

.btn-wrong{background:rgba(203,74,74,.08);border-color:rgba(203,74,74,.25);color:#a83b3b;font-weight:600}
.btn-wrong:hover{background:rgba(203,74,74,.13)}
.btn-wrong .arr{color:rgba(203,74,74,.5)}
.wbadge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;
  border-radius:99px;background:var(--ko);color:#fff;font-size:11px;font-weight:700;padding:0 5px;margin-left:4px}
.foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:26px;line-height:1.6}

@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:rise .26s ease}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:420px){.hero h1{font-size:26px}.grade{font-size:54px}}
</style>
</head>

<script>
const Q=[{"n": 1, "id": "1", "q": "Quale tra le seguenti è la causa più frequente di insufficienza renale cronica nell’anziano?", "o": ["DM", "LES", "Amiloidosi", "Iperuricemia", "Vasculite"], "a": 0, "c": "rene", "w": "Il diabete mellito è la prima causa di malattia renale cronica nell'anziano (nefropatia diabetica), seguito dall'ipertensione/nefroangiosclerosi. LES, amiloidosi, iperuricemia e vasculiti sono cause possibili ma molto più rare.", "m": "Anziano + IRC → pensa prima al diabete.", "f": 0, "fn": 0}, {"n": 2, "id": "2", "q": "Nel paziente con FA non valvolare il beneficio clinico netto della terapia anticoagulante:", "o": ["Aumenta con l’età", "Nessuna delle risposte è corretta", "Non esistono evidenze scientifiche in merito", "Diminuisce con l’età", "Non dipende dall’età"], "a": 0, "c": "cardio", "w": "Nella FA non valvolare il rischio embolico cresce con l'età più del rischio emorragico, quindi il beneficio clinico NETTO dell'anticoagulazione aumenta con l'età: l'età avanzata non è una controindicazione ma un motivo in più per anticoagulare.", "m": "Più anni = più beneficio netto dall'anticoagulante.", "f": 0, "fn": 0}, {"n": 3, "id": "3", "q": "Nello stadio 3 delle ulcere da pressione si ha interessamento:", "o": ["Cute e sottocute, fino alla fascia muscolare", "Cute e strutture ossee sottostanti", "Solo epidermide", "Solo cute (epidermide+derma)", "cute, sottocute, muscoli, ossa"], "a": 0, "c": "cardio", "w": "Lo stadio 3 dell'ulcera da pressione è a tutto spessore: interessa cute e sottocute fino alla fascia muscolare (ma non oltre). Lo stadio 1 è solo eritema, il 2 epidermide+derma, il 4 arriva a muscolo/osso.", "m": "Stadio 3 = giù fino alla fascia, non oltre.", "f": 0, "fn": 0}, {"n": 4, "id": "4", "q": "la CAM è una scala utilizzata per fare diagnosi di:", "o": ["morte cerebrale", "Demenza a corpi di Lewy", "Delirium", "Alzheimer", "Idrocefalo normotipo"], "a": 2, "c": "demenza", "w": "La CAM (Confusion Assessment Method) è lo strumento di screening/diagnosi del delirium, basato su esordio acuto e fluttuante, inattenzione, pensiero disorganizzato e alterato livello di coscienza.", "m": "CAM = il test del delirium.", "f": 0, "fn": 0}, {"n": 5, "id": "5", "q": "RSA, quale è corretta:", "o": ["I ricoveri temporanei non riguardano gli anziani con demenza", "I ricoveri sono sempre permanenti", "La quota sociale è a carico della ASL di residenza dell’assistito", "I ricoveri temporanei possono avere scopo di sollievo assistenziale", "I ricoveri non dovrebbero essere mai permanenti"], "a": 3, "c": "demenza", "w": "I ricoveri in RSA possono essere temporanei, anche con finalità di sollievo (respite care) per il caregiver. Non sono sempre permanenti né esclusi per i dementi; la quota sociale è in genere a carico dell'utente/Comune, non della ASL.", "m": "RSA: anche ricoveri di sollievo temporanei.", "f": 0, "fn": 0}, {"n": 6, "id": "6", "q": "Prevenzione Delirium in ospedale:", "o": ["non comprende la correzione di eventuali deficit sensoriali", "Richiede spesso la presenza dei mezzi di contenzione", "Richiede un adeguato riposo a letto durante la giornata", "Si basa sull’uso di specifiche terapie psicofarmacologiche", "Comprende la mobilizzazione precoce del paziente"], "a": 4, "c": "demenza", "w": "La prevenzione del delirium è non farmacologica e multicomponente: mobilizzazione precoce, riorientamento, correzione dei deficit sensoriali, sonno notturno fisiologico. NON si basa su psicofarmaci né su contenzione, e il riposo a letto va evitato.", "m": "Prevenzione delirium = muovere, orientare, niente sedativi.", "f": 0, "fn": 0}, {"n": 7, "id": "7", "q": "I criteri attualmente utilizzati per la diagnosi di demenza (National Institute on Aging, 2011):", "o": ["non richiedono l’interferenza con lo svolgimento delle attività abituali", "comprendono la presenza di alterazioni motorie", "comprendono la presenza di alterazioni di personalità e comportamento", "richiedono necessariamente la presenza di deficit di memoria", "richiedono presenza contemporanea di deficit di linguaggio, prassia e gnosia"], "a": 2, "c": "demenza", "w": "I criteri NIA-AA 2011 includono l'interferenza con le attività abituali e le alterazioni di personalità/comportamento. Non richiedono obbligatoriamente il deficit di memoria (può mancare nelle forme non amnesiche) né la compresenza di tutti i domini.", "m": "Demenza = interferisce con la vita quotidiana, non serve per forza la memoria.", "f": 0, "fn": 0}, {"n": 8, "id": "7bis", "q": "(molto simile alla 7…) I criteri attualmente utilizzati per la diagnosi di demenza (National Institute on Aging, 2011):", "o": ["Richiedono l’interferenza con lo svolgimento delle attività abituali", "Escludono le forme ad insorgenza improvvisa", "Non includono la presenza di alterazioni della personalità e comportamento", "Richiedono necessariamente la presenza di deficit di memoria", "Comprendono la presenza di alterazioni motorie Alterazione"], "a": 0, "c": "demenza", "w": "I criteri NIA-AA 2011 includono l'interferenza con le attività abituali e le alterazioni di personalità/comportamento. Non richiedono obbligatoriamente il deficit di memoria (può mancare nelle forme non amnesiche) né la compresenza di tutti i domini.", "m": "Demenza = interferisce con la vita quotidiana, non serve per forza la memoria.", "f": 0, "fn": 0}, {"n": 9, "id": "8", "q": "Quale NON è una sindrome geriatrica:", "o": ["Delirium", "Fragilità", "Cadute", "Ictus", "Incontinenza urinaria"], "a": 3, "c": "demenza", "w": "L'ictus è una malattia d'organo, non una sindrome geriatrica. Delirium, fragilità, cadute e incontinenza sono sindromi geriatriche (multifattoriali, aspecifiche, tipiche dell'età avanzata).", "m": "Sindromi geriatriche: delirium, fragilità, cadute, incontinenza. L'ictus no.", "f": 0, "fn": 0}, {"n": 10, "id": "9", "q": "La malattia di Parkinson tipicamente all’esordio colpisce:", "o": ["Arti superiore bilateralmente", "Arti inferiori bilateralmente", "Nervi cranici", "La muscolatura del tronco", "Nessuna delle risposte"], "a": 4, "c": "parkinson", "w": "Il Parkinson esordisce tipicamente in modo ASIMMETRICO/unilaterale a un arto (spesso superiore), non bilateralmente: per questo nessuna delle opzioni (tutte bilaterali) è corretta.", "m": "Parkinson esordisce da un lato solo.", "f": 0, "fn": 0}, {"n": 11, "id": "10", "q": "Nell’anziano i valori di pressione arteriosa rilevati mediante monitoraggio pressorio delle 24 h sono spesso:", "o": ["Inferiori a quelli rilevati in ambiente medico", "Sovrapponibili a quelli rilevati in ambiente medico", "Superiori a quelli rilevati in ambiente medico", "Il monitoraggio pressorio nelle 24 h non è indicato nel paziente anziano"], "a": 0, "c": "cardio", "w": "Per la rigidità arteriosa, l'ABPM nell'anziano mostra spesso valori INFERIORI a quelli misurati in ambulatorio: c'è frequente effetto camice bianco. Il monitoraggio è anzi molto utile in questa popolazione.", "m": "ABPM anziano: spesso più basso dell'ambulatorio (camice bianco).", "f": 0, "fn": 0}, {"n": 12, "id": "11", "q": "Nell’anziano iperteso, la valutazione del livello di fragilità:", "o": ["E’ utile per individuare i pazienti a maggior rischio di eventi avversi in caso di un eccessivo abbassamento dei valori pressori", "Non ha alcuna utilità nell’ambito della gestione del trattamento antiipertensivo", "È utile per individuare i pazienti in cui NON è indicato il trattamento dell’ipertensione", "È utile solo nell’anziano >80 anni"], "a": 0, "c": "fragilita", "w": "Nell'anziano iperteso la valutazione della fragilità serve a identificare chi è a maggior rischio di eventi avversi (cadute, ipoperfusione) se la pressione viene abbassata troppo: guida l'intensità del trattamento, non lo esclude.", "m": "Fragilità = quanto posso abbassare la pressione senza far danni.", "f": 0, "fn": 0}, {"n": 13, "id": "12", "q": "Valutazione dell’anziano con caduta:", "o": ["richiede generalmente l’accesso in PS", "comprende la valutazione cognitivo-comportamentale", "richiede visita ortopedica", "non comprende la revisione della terapia farmacologica", "non può essere standardizzata slide cadute 2, p.3: Valutazione multidimensionale del rischio cadute → valutazione cognitivo-comportamentale"], "a": 1, "c": "demenza", "w": "La valutazione dell'anziano caduto è multidimensionale e comprende l'aspetto cognitivo-comportamentale (oltre a farmaci, vista, equilibrio, ambiente): non si limita a ortopedia o PS.", "m": "Anziano che cade: valuta anche testa e farmaci, non solo l'osso.", "f": 0, "fn": 0}, {"n": 14, "id": "13", "q": "Il piano assistenziale individualizzato comprende:", "o": ["Anamnesi, EO, esami laboratorio, terapia", "Problemi, obiettivi, interventi, verifica", "diagnosi, prognosi, terapia, riabilitazione", "Assistenza domiciliare, Centro diurno, RSA", "Assistenza infermieristica, riabilitazione, supporto sociale"], "a": 1, "c": "cure", "w": "Il piano assistenziale individualizzato segue lo schema Problemi → Obiettivi → Interventi → Verifica. È un ciclo dinamico di pianificazione, non un semplice elenco diagnostico-terapeutico.", "m": "PAI = Problemi, Obiettivi, Interventi, Verifica.", "f": 0, "fn": 0}, {"n": 15, "id": "14", "q": "Quale tra i seguenti segni neurologici è necessariamente presente per la diagnosi di Parkinson:", "o": ["tremore a riposo", "Tremore d’azione", "Ipertono plastico", "Alterazione dei riflessi posturali", "Bradicinesia"], "a": 4, "c": "parkinson", "w": "La bradicinesia è il segno OBBLIGATORIO per la diagnosi di Parkinson, associata ad almeno uno tra rigidità plastica e tremore a riposo. Il tremore a riposo da solo non è indispensabile.", "m": "Senza bradicinesia non c'è Parkinson.", "f": 0, "fn": 0}, {"n": 16, "id": "15", "q": "In quale dei seguenti pazienti con incontinenza urinaria è indicato il posizionamento di catetere vescicale", "o": ["Paziente con incontinenza da sforzo", "Paziente con fecaloma", "Paziente con incontinenza in corso di infezione vie urinarie", "Paziente con demenza grave", "Paziente con ulcera da pressione sacrale al 4°stadio"], "a": 4, "c": "demenza", "w": "Il catetere vescicale è giustificato quando serve a guarire un'ulcera da pressione sacrale di stadio avanzato (4°) mantenendo asciutta la cute. Demenza, IVU o incontinenza da sforzo NON sono di per sé indicazioni al catetere.", "m": "Catetere solo se serve davvero (es. ulcera sacrale che deve restare asciutta).", "f": 0, "fn": 0}, {"n": 17, "id": "16", "q": "Sintomatologia depressiva dell’anziano:", "o": ["Può essere causa di malnutrizione e calo ponderale", "È causa di suicidio soprattutto nel sesso femminile", "È rara in RSA", "È una condizione meno frequente rispetto ai giovani", "Nessuna delle precedenti"], "a": 0, "c": "nutrizione", "w": "La depressione dell'anziano riduce appetito e introito alimentare, causando malnutrizione e calo ponderale. È più frequente (non più rara) rispetto al giovane, comune in RSA, e il suicidio prevale nel sesso maschile.", "m": "Depressione anziano → mangia meno → dimagrisce.", "f": 0, "fn": 0}, {"n": 18, "id": "17", "q": "Dei vari tipi di demenza dell’anziano la malattia di Alzheimer rappresenta:", "o": ["circa un terzo", "60%", "100%", "80%", "20%"], "a": 1, "c": "demenza", "w": "La malattia di Alzheimer è di gran lunga la demenza più frequente, circa il 50-60% di tutte le demenze. La vascolare è la seconda (15-20%).", "m": "Alzheimer ≈ 60% delle demenze.", "f": 0, "fn": 0}, {"n": 19, "id": "18", "q": "Un signore di 81 anni giunge alla tua attenzione per episodi sincopali ricorrenti (<1/set t), alcuni dei quali traumatici, nonostante l’attuazione di misure comportamentali adeguate. Red Flag assenti. Non ha ipotensione ortostatica, l’ECG è nella norma. Non altre patologie di rilievo in anamnesi. Come Procederesti?", "o": ["Ecocolor-doppler dei tronchi sovraortici", "Esecuzione di un holter cardiaco nelle 24 ore", "Esecuzione di Tilt Table test", "Esecuzione di Tilt Table test + massaggio seni carotidei", "Non eseguire ulteriori accertamenti e consigliare calze elasto-compressive"], "a": 3, "c": "cadute", "w": "In un anziano con sincopi ricorrenti inspiegate (al termine della valutazione iniziale negativa) sono indicati tilt table test e massaggio dei seni carotidei.", "m": "Sincopi oscure: tilt test + massaggio carotideo.", "f": 0, "fn": 0}, {"n": 20, "id": "19", "q": "Lo score HAS-BLED:", "o": ["Ha un punteggio massimo di 3", "Valuta il rischio tromboembolico nei pazienti con FA", "Non tiene conto dell’età del paziente", "Valuta il rischio di sanguinamento maggiore in corso di FA", "Nessuna delle precedenti"], "a": 3, "c": "cardio", "w": "Lo HAS-BLED stima il rischio di SANGUINAMENTO maggiore nei pazienti con FA in anticoagulazione (l'embolico è il CHA2DS2-VASc). Considera anche l'età (>65 anni dà punti).", "m": "HAS-BLED = rischio sanguinamento; CHA2DS2-VASc = rischio ictus.", "f": 0, "fn": 0}, {"n": 21, "id": "20", "q": "Quale di queste affermazioni sull’utilizzo della gastrostomia endoscopica percutanea (PEG) nella demenza grave:", "o": ["previene efficacemente l’aspirazione del cibo", "Riduce rischio mortalità", "Migliora qualità della vita", "Migliora l’autonomia funzionale", "Nessuna delle precedenti"], "a": 4, "c": "demenza", "w": "La PEG nella demenza avanzata non ha mostrato benefici: non previene l'aspirazione, non riduce la mortalità, non migliora qualità di vita né autonomia. Quindi nessuna delle affermazioni positive è corretta.", "m": "PEG nella demenza: nessun beneficio dimostrato.", "f": 0, "fn": 0}, {"n": 22, "id": "21", "q": "Quale tra le seguenti prove NON è compresa nel MMSE:", "o": ["copiare un disegno", "Ricordare il mese dell’anno", "Eseguire un comando scritto", "Ripetere all’indietro di una parola lettera per lettera", "Ricordare la propria data di nascita"], "a": 4, "c": "demenza", "w": "Il MMSE NON chiede la propria data di nascita (è una memoria troppo radicata, poco sensibile). Esplora orientamento, memoria, attenzione/calcolo, linguaggio e prassia costruttiva.", "m": "MMSE non chiede la data di nascita.", "f": 0, "fn": 0}, {"n": 23, "id": "22", "q": "Quale delle seguenti complicanze è più frequente dopo un intervento di frattura del femore?", "o": ["Demenza", "Delirium", "Ictus", "Sepsi", "Infezione protesi Il libro specifica che nel 50% dei casi è il Delirium. In più, la domanda 6, molto simile a senso, è un’ulteriore conferma."], "a": 1, "c": "demenza", "w": "Il delirium è la complicanza più frequente dopo chirurgia per frattura di femore nell'anziano (fino al 50%). Va prevenuto e riconosciuto precocemente.", "m": "Post-frattura femore = occhio al delirium.", "f": 0, "fn": 0}, {"n": 24, "id": "23", "q": "La scala delle Basic Activities of Daily Living (BADL) di Katz comprende:", "o": ["3 item", "2 item", "5 item", "4 item", "6 item"], "a": 4, "c": "fragilita", "w": "La scala BADL di Katz comprende 6 item: bagno, vestirsi, toilette, trasferimenti, continenza, alimentazione.", "m": "Katz = 6 attività di base.", "f": 0, "fn": 0}, {"n": 25, "id": "24", "q": "Nella valutazione del BMI nell’anziano quale affermazione NON è corretta", "o": ["BMI ridotto può essere indicatore di disidratazione", "Per la valutazione della statura ci si avvale di formule fondate sulla distanza tallone-ginocchio", "BMI elevato non è sempre indicatore di aumento di massa grassa", "Per l’anziano ci sono classi specifiche di BMI", "Nell’anziano generalmente non è indicata"], "a": 3, "c": "varie", "w": "Per l'anziano NON esistono classi di BMI specifiche (si usano quelle generali, pur con i limiti): questa è l'affermazione falsa. Le altre sono vere (BMI basso può indicare disidratazione, statura stimabile da tallone-ginocchio, BMI alto non sempre = grasso).", "m": "Niente classi di BMI dedicate all'anziano.", "f": 0, "fn": 0}, {"n": 26, "id": "25", "q": "Quale tra le seguenti NON rientra tra le manifestazioni atipiche dello scompenso cardiaco nell’anziano?", "o": ["Alterazioni dell’alvo", "Assenza dispnea da sforzo", "Disturbi cognitivo comportamentali", "Alterazioni minzionali", "Riduzione performance fisica Correzione Prof. Mossello 16/06 linee guida ESC: reduced exercise tolerance, è nominato tra le manifestazioni TIPICHE."], "a": 0, "c": "demenza", "w": "La ridotta tolleranza allo sforzo è una manifestazione TIPICA, non atipica, dello scompenso. Le manifestazioni atipiche nell'anziano sono quelle aspecifiche: confusione, alterazioni dell'alvo o minzionali, calo della performance.", "m": "Scompenso anziano: spesso si maschera (confusione, alvo, minzione).", "f": 0, "fn": 0}, {"n": 27, "id": "26", "q": "Nel paziente anziano con storia di ripetute cadute non spiegate:", "o": ["è sempre possibile escludere l’eziologia sincopale raccogliendo un’anamnesi accurata", "Non trova indicazione l’approfondimento neuro autonomico", "È sufficiente prevenire le nuove cadute mediante la correzione delle cause ambientali", "È fondamentale eseguire una valutazione multidimensionale"], "a": 3, "c": "fragilita", "w": "Le cadute ripetute non spiegate richiedono una valutazione multidimensionale (anche per smascherare sincopi misconosciute): l'anamnesi da sola non basta a escludere la sincope e l'approfondimento neuro-autonomico è indicato.", "m": "Cadute non spiegate = valutazione a 360°, non solo l'ambiente.", "f": 0, "fn": 0}, {"n": 28, "id": "27", "q": "L’uso dei mezzi di contenzione:", "o": ["è consentito solo quando non è possibile controllare il paziente e il personale è scarso", "Riduce la paura di cadere ma non è efficace nel ridurre le cadute", "È sconsigliato in ospedale ma autorizzato in RSA se vi è un elevato rischio di caduta", "Può causare agitazione nel paziente ma è efficace nel ridurre il rischio di cadute", "Nessuna delle precedenti"], "a": 4, "c": "cadute", "w": "I mezzi di contenzione non riducono le cadute (possono aumentarle e causare agitazione/lesioni) e non sono giustificati da carenza di personale: nessuna delle affermazioni è corretta.", "m": "Contenzione: non protegge dalle cadute, fa danni.", "f": 0, "fn": 0}, {"n": 29, "id": "28", "q": "Nell’incontinenza da urgenza:", "o": ["Si caratterizza per la perdita di minime quantità di urina", "La perdita di urine avviene durante tosse o starnuti", "Perdita di urine esclusivamente diurna", "È causata da deficit di funzione dello sfintere", "La perdita di urine può essere sia diurna che notturna"], "a": 4, "c": "cute", "w": "L'incontinenza da urgenza (da iperattività detrusoriale) dà perdita improvvisa e abbondante, sia diurna che notturna. Le piccole perdite con tosse/sforzo sono invece tipiche dell'incontinenza da sforzo.", "m": "Urgenza = perdite improvvise, giorno e notte.", "f": 0, "fn": 0}, {"n": 30, "id": "29", "q": "valvulopatia più frequente nell’anziano:", "o": ["Insuff. aortica", "Insuff. tricuspide", "Insuff. mitralica", "Stenosi aortica", "Stenosi mitralica"], "a": 3, "c": "varie", "w": "La stenosi aortica è la valvulopatia più frequente nell'anziano (degenerativa/calcifica).", "m": "Anziano + soffio = pensa alla stenosi aortica.", "f": 0, "fn": 0}, {"n": 31, "id": "30", "q": "Quali sono i sintomi di una stenosi aortica?", "o": ["Dispnea, sincope e dolore toracico", "astenia, dispnea, dolore toracico", "sincope, dispnea, cardiopalmo", "cefalea, dolore toracico, sincope", "dispnea, sincope, dolore trafittivo interscapolare"], "a": 0, "c": "cadute", "w": "La triade classica della stenosi aortica è dispnea, sincope (da sforzo) e angina/dolore toracico.", "m": "Stenosi aortica: Dispnea, Sincope, Dolore (toracico).", "f": 0, "fn": 0}, {"n": 32, "id": "31", "q": "Quale nell'invecchiamento fisiologico è vera:", "o": ["Il neurotrasmettitore più deficitario è acetilcolina", "Vi è tipicamente un rallentamento dell’elaborazione delle informazioni", "Le capacità linguistiche sono solitamente integre", "L’atrofia della sostanza grigia è nettamente maggiore di quella della sostanza bianca", "nessuna delle precedenti Domanda dibattuta: era stata segnata come giusta la B, ma vista questa slide pensiamo sia più corretta la C in quanto nella slide si sottolinea come, rispetto all'Alzheimer, nell'invecchiamento fisiologico il rallentamento cognitivo sia preponderante rispetto ai deficit di memoria, ma non per questo dice che sia una presentazione tipica, mentre il linguaggio lo dà come integro a prescindere. 16/06 PROBABILMENTE VERRà MODIFICATA DAL DOCENTE PERCHè RITENEVA GIUSTA SIA LA B CHE LA C"], "a": 2, "c": "demenza", "w": "Nell'invecchiamento fisiologico le capacità linguistiche restano integre; tipico è un rallentamento dell'elaborazione (ma il deficit di memoria non è preponderante). Domanda dibattuta tra B e C: il file segna C.", "m": "Invecchiamento sano: linguaggio conservato.", "f": 0, "fn": 0}, {"n": 33, "id": "32", "q": "La sincope che avviene in seguito alla minzione è di tipo:", "o": ["Vasovagale", "Situazionale", "Cardiaca", "Atipica", "Disautonomica"], "a": 1, "c": "fragilita", "w": "La sincope post-minzionale è una sincope SITUAZIONALE (un sottotipo di sincope riflessa/neuromediata legata a uno stimolo specifico).", "m": "Minzione/tosse/defecazione → sincope situazionale.", "f": 0, "fn": 0}, {"n": 34, "id": "33", "q": "Signora di 80 aa con decadimento cognitivo, MMSE di 24 ecc. Quale approfondimento diagnostico eseguiresti inizialmente?", "o": ["PET encefalo con Fluorodesossiglucosio", "RMN encefalo e valutazione neuropsicologica", "SPECT con DATscan", "Non è necessario alcun approfondimento visto il risultato del MMSE", "PET cerebrale con traccianti specifici di amiloide e ricerca di biomarcatori liquorali"], "a": 1, "c": "demenza", "w": "Con MMSE 24 (deficit lieve) l'iter prevede RMN encefalo + valutazione neuropsicologica per caratterizzare il quadro. PET amiloide e DATscan sono di secondo livello/casi selezionati.", "m": "Decadimento lieve: RMN + neuropsicologia per primi.", "f": 0, "fn": 0}, {"n": 35, "id": "34", "q": "Quali di questi NON è un disturbo ‘non motorio’ associato al Parkinson?", "o": ["Ipotensione ortostatica", "Anosmia", "Allucinazioni visive", "Incontinenza urinaria da sforzo", "Stipsi Dalla lezione sul Parkinson ipotensione ortostatica, stipsi e incontinenza da URGENZA sono considerati sintomi vegetativi, quindi ad esclusione resta l'incontinenza da sforzo (avendo già scartato anosmia e allucinazioni)"], "a": 3, "c": "cadute", "w": "Tra i sintomi NON motori del Parkinson ci sono anosmia, allucinazioni visive, ipotensione ortostatica, stipsi e incontinenza da URGENZA. L'incontinenza da SFORZO non rientra (è un problema sfinterico, non disautonomico).", "m": "Disautonomia Parkinson: urgenza sì, sforzo no.", "f": 0, "fn": 0}, {"n": 36, "id": "35", "q": "La scala di Hoehn-Yahr si utilizza per:", "o": ["Valutare la capacità cognitiva in corso di Parkinson", "Per valutare i disturbi non motori del Parkinson", "Valutare performance arti inferiori", "Per identificare lo stadio del Parkinson", "Valutare la fragilità dell’anziano"], "a": 3, "c": "demenza", "w": "La scala di Hoehn-Yahr stadia la gravità (progressione) della malattia di Parkinson.", "m": "Hoehn-Yahr = stadio del Parkinson.", "f": 0, "fn": 0}, {"n": 37, "id": "36", "q": "Nel paziente anziano la malnutrizione è tipicamente:", "o": ["Selettiva per difetto di vitamine ed oligoelementi", "Frequente a domicilio ma rara in ospedale", "Non selettiva, da carenza calorico-proteica", "In eccesso, che conduce ad obesità", "Selettivo, per difetto di proteine e vitamine"], "a": 2, "c": "nutrizione", "w": "Nell'anziano la malnutrizione è tipicamente NON selettiva, da carenza calorico-proteica globale (non solo vitaminica).", "m": "Malnutrizione anziano = manca tutto (calorie + proteine).", "f": 0, "fn": 0}, {"n": 38, "id": "37", "q": "Quali di questi parametri non rientra nella CHA2DS2-VASc", "o": ["Ipertensione", "Scompenso o disfunzione ventricolare sx", "Età maggiore di 75", "Ipercolesterolemia", "DM"], "a": 3, "c": "cardio", "w": "Il CHA2DS2-VASc considera scompenso, ipertensione, età, diabete, ictus, malattia vascolare e sesso. NON include l'ipercolesterolemia.", "m": "CHA2DS2-VASc: niente colesterolo.", "f": 0, "fn": 0}, {"n": 39, "id": "38", "q": "L'incontinenza da sforzo si associa a:", "o": ["Iperattività detrusoriale", "Deficit sfinterico con normale attività detrusoriale", "Deficit sfinterico con ipoattività detrusoriale", "Ipoattività detrusoriale", "Deficit sfinterico con iperattività detrusoriale"], "a": 1, "c": "cute", "w": "L'incontinenza da sforzo è dovuta a deficit sfinterico con detrusore normale: la perdita avviene quando aumenta la pressione addominale (tosse, sforzo).", "m": "Sforzo = sfintere debole, detrusore ok.", "f": 0, "fn": 0}, {"n": 40, "id": "39", "q": "Quali delle seguenti scale valuta il rischio di ulcere da pressione:", "o": ["Scala di tinetti", "Nessuna", "Barthel", "Braden", "Fried"], "a": 3, "c": "fragilita", "w": "La scala di Braden valuta il rischio di ulcere da pressione. Tinetti = equilibrio/cadute, Barthel = autonomia, Fried = fragilità.", "m": "Braden = rischio piaghe.", "f": 0, "fn": 0}, {"n": 41, "id": "40", "q": "La valutazione socio-economica:", "o": ["è inutile nel paziente autosufficiente", "non fa parte della valutazione dello stato di salute", "Comprende la valutazione dello stress del caregiver", "è un indice di fragilità", "non comprende la valutazione del reddito"], "a": 2, "c": "fragilita", "w": "La valutazione socio-economica fa parte della valutazione multidimensionale e comprende anche lo stress del caregiver e il reddito: è sempre utile.", "m": "VMD include anche il caregiver e il contesto sociale.", "f": 0, "fn": 0}, {"n": 42, "id": "41", "q": "La valutazione neuropsicologica :", "o": ["È necessaria per caratterizzare lo stato psicoaffettivo dell’anziano", "È raramente indicata nell’iter diagnostico della demenza", "È scarsamente utile in presenza di disturbi cognitivi lievi", "Serve a valutare l’efficienza delle diverse funzioni cognitive in caso di sospetta demenza"], "a": 3, "c": "demenza", "w": "La valutazione neuropsicologica serve a misurare l'efficienza delle diverse funzioni cognitive in caso di sospetta demenza (è anzi molto utile anche nei deficit lievi).", "m": "Neuropsicologia = mappa delle funzioni cognitive.", "f": 0, "fn": 0}, {"n": 43, "id": "42", "q": "In presenza di disfagia orofaringea:", "o": ["Nessuna corretta", "non è mai indicata la nutrizione artificiale nell’anziano", "si verificano frequenti sinusiti e riniti", "non è utile adattare la dieta, mentre è utile l’utilizzo della nutrizione artificiale", "sono rari i fenomeni di aspirazione tracheo-bronchiale che possono determinare polmonite"], "a": 0, "c": "ossa", "w": "Nella disfagia orofaringea l'aspirazione tracheo-bronchiale è FREQUENTE (non rara), la modifica della dieta È utile e la nutrizione artificiale può essere indicata: tutte le opzioni sono false → nessuna corretta. (Domanda senza evidenziatura nel file: risposta dedotta.)", "m": "Disfagia orofaringea: aspirazione frequente, dieta da adattare.", "f": 1, "fn": 1}, {"n": 44, "id": "43", "q": "Quale delle seguenti relative alla ipotensione ortostatica è vera:", "o": ["Rara nel paziente anziano", "è una riduzione della pressione diastolica di almeno 20 mmHg dalla posizione eretta", "è definita come una riduzione della sistolica di almeno 10 mmHg dalla posizione eretta", "associata ad aumento di mortalità", "si può diagnosticare SOLO tramite tilt table test"], "a": 3, "c": "cadute", "w": "L'ipotensione ortostatica si associa ad aumento di mortalità. È frequente nell'anziano, si definisce come calo ≥20 mmHg di sistolica (o ≥10 di diastolica) entro 3 min dall'ortostatismo, e si diagnostica al letto, non solo col tilt test.", "m": "OI = calo ≥20/10 in piedi, aumenta la mortalità.", "f": 0, "fn": 0}, {"n": 45, "id": "44", "q": "Quale tra le seguenti NON è un effetto collaterale tipico della terapia con diuretici dell’ansa nel paziente anziano affetto da scompenso cardiaco.", "o": ["Iperkaliemia", "Ipernatremia", "Ipotensione ortostatica", "Insufficienza renale acuta", "Incontinenza urinaria"], "a": 0, "c": "cadute", "w": "I diuretici dell'ansa causano IPOkaliemia, non iperkaliemia. Tra gli effetti tipici: ipernatremia/disidratazione, ipotensione ortostatica, IRA pre-renale, incontinenza.", "m": "Furosemide → perdi potassio (ipoK), non iperK.", "f": 0, "fn": 0}, {"n": 46, "id": "45", "q": "La difficoltà nel riconoscere oggetti e/o volti è definita come", "o": ["agnosia", "nessuna risposta è corretta", "amnesia", "aprassia", "afasia"], "a": 0, "c": "demenza", "w": "L'agnosia è l'incapacità di riconoscere oggetti/volti pur con organi di senso integri. Amnesia = memoria, aprassia = gesti, afasia = linguaggio.", "m": "Agnosia = non riconosco, ma vedo bene.", "f": 0, "fn": 0}, {"n": 47, "id": "46", "q": "Nell’anziano con frattura del femore sono validi i seguenti principi di trattamento", "o": ["se è presente instabilità clinica, chirurgia precoce entro le 48 ore", "mobilizzazione precoce solo per i pazienti cognitivamente integri e autonomi prima della frattura, negli altri casi è raccomandato il riposo a letto", "trattamento chirurgico non prima di 48 ore per tutti i pazienti", "nessuna risposta è corretta", "chirurgia più precoce possibile e comunque entro le 48 ore, salvo i casi di instabilità clinica"], "a": 4, "c": "demenza", "w": "La frattura di femore va operata il più precocemente possibile, comunque entro 48 ore, salvo instabilità clinica che imponga di stabilizzare prima. La mobilizzazione precoce vale per tutti.", "m": "Femore: opera entro 48h e mobilizza subito.", "f": 0, "fn": 0}, {"n": 48, "id": "47", "q": "La Short Physical Performance Battery (SPPB):", "o": ["è una scala validata per la determinazione degli esiti nei pazienti con ictus", "non predice il rischio di mortalità", "è una scala di valutazione della disabilità", "è un indice di qualità della vita", "può identificare soggetti anziani autonomi, ma a rischio di disabilità"], "a": 4, "c": "fragilita", "w": "La SPPB identifica anziani autonomi ma a rischio di disabilità (predice declino funzionale e mortalità). Valuta equilibrio, velocità del cammino e alzata dalla sedia.", "m": "SPPB = spia di disabilità futura nell'autonomo.", "f": 0, "fn": 0}, {"n": 49, "id": "48", "q": "Quale dei seguenti NON è uno dei segni cardinali del Parkinson?", "o": ["Ipertono plastico", "Bradicinesia", "Nessuna", "Disfagia", "Tremore a riposo"], "a": 3, "c": "parkinson", "w": "I segni cardinali del Parkinson sono bradicinesia, rigidità plastica, tremore a riposo (e instabilità posturale). La disfagia NON è un segno cardinale (è una complicanza tardiva).", "m": "Disfagia non è cardinale nel Parkinson.", "f": 0, "fn": 0}, {"n": 50, "id": "49", "q": "L’ipotensione ortostatica su base disautonomica può essere dovuta a:", "o": ["Diuretici", "Ipersensibilità senocarotidea vasodepressiva", "disfunzione del nodo seno atriale", "amiloidosi"], "a": 3, "c": "fragilita", "w": "L'ipotensione ortostatica disautonomica (da insufficienza autonomica) può derivare dall'amiloidosi (neuropatia autonomica). Diuretici e ipersensibilità seno-carotidea danno meccanismi diversi (non disautonomici primari).", "m": "Disautonomia + ipotensione → pensa anche all'amiloidosi.", "f": 0, "fn": 0}, {"n": 51, "id": "50", "q": "La forma di ipertensione arteriosa caratteristica dell’anziano è:", "o": ["Ipertensione maligna", "ipertensione sistolica isolata", "ipertensione sisto-diastolica", "ipertensione borderline", "ipertensione diastolica isolata"], "a": 1, "c": "cardio", "w": "La forma tipica dell'anziano è l'ipertensione sistolica isolata, dovuta alla rigidità dei grandi vasi (sistolica alta, diastolica normale/bassa).", "m": "Anziano = sistolica isolata.", "f": 0, "fn": 0}, {"n": 52, "id": "51", "q": "La terapia con anticoagulanti orali diretti:", "o": ["Ha un rischio di sanguinamento trascurabile", "Non è indicata in presenza di IRC grave", "comporta un rischio di sanguinamento intracranico superiore al warfarin", "sconsigliata generalmente nell'anziano", "richiede un monitoraggio continuo dei parametri della coagulazione"], "a": 1, "c": "cardio", "w": "I DOAC non sono indicati nell'IRC grave (alcuni controindicati con ClCr molto bassa). Hanno comunque rischio emorragico, MINORE rischio di emorragia intracranica vs warfarin e non richiedono monitoraggio dell'INR.", "m": "DOAC: stop se rene molto compromesso.", "f": 0, "fn": 0}, {"n": 53, "id": "52", "q": "La presenza di delirium nell’anziano:", "o": ["aumenta rischio di mortalità, ma non il peggioramento della disabilità", "nessuna", "influenza il rischio di disabilità ma non di mortalità", "deve suggerire la presenza di ictus", "si associa ad una degenza più breve Da slide delirium 3, pag 7."], "a": 1, "c": "demenza", "w": "Il delirium aumenta SIA il rischio di mortalità SIA il peggioramento della disabilità (e allunga la degenza): le singole affermazioni parziali sono false → nessuna.", "m": "Delirium peggiora tutto: mortalità, disabilità, degenza.", "f": 0, "fn": 0}, {"n": 54, "id": "53", "q": "Il delirium ipocinetico:", "o": ["è spesso misconosciuto in un paziente anziano ospedalizzato", "Non influenza la prognosi del paziente", "è raramente presente in un paziente anziano ospedalizzato", "è il sottotipo più facilmente identificabile di delirium", "nessuna delle alternative è corretta Vedi spiegazione domanda sopra."], "a": 0, "c": "demenza", "w": "Il delirium ipocinetico (forma ipoattiva, paziente apatico/sonnolento) è spesso misconosciuto perché silente, ed ha prognosi peggiore.", "m": "Delirium ipoattivo = il più subdolo e pericoloso.", "f": 0, "fn": 0}, {"n": 55, "id": "54", "q": "La terapia farmacologica del delirium…", "o": ["Consiste nell’uso di antidepressivi", "Aumenta la mortalità perché ha tanti effetti collaterali", "Farmaci antipsicotici (", "????", "???"], "a": 2, "c": "demenza", "w": "Gli antipsicotici per l'agitazione nella demenza vanno usati con cautela: possono dare effetti collaterali anche gravi e aumentano la mortalità (warning su cardio/cerebrovascolare).", "m": "Antipsicotici nei dementi: aumentano la mortalità.", "f": 1, "fn": 1}, {"n": 56, "id": "55", "q": "Il signor Mario presenta un disturbo dell’umore per il quale hai prescritto sertralina. Mai disturbi analoghi, mai assunto antidepressivi prima. trattamento? Quanto tempo per vedere gli effetti del", "o": ["2-3 GG", "Fino a 8 settimane", "circa 1 anno", "circa 6 mesi", "5-10 GG"], "a": 1, "c": "psiche", "w": "Con un SSRI come la sertralina l'effetto clinico completo può richiedere fino a 6-8 settimane (latenza di azione).", "m": "SSRI: fino a 6-8 settimane per fare effetto.", "f": 0, "fn": 0}, {"n": 57, "id": "55bis", "q": ") Il signor Mario presenta un disturbo dell’umore per il quale hai prescritto sertralina. Mai disturbi analoghi, mai assunto antidepressivi prima. Ti chiede il farmaco, tu per quanto tempo dovrà assumere cosa rispondi?", "o": ["7-10 gg", "Almeno 2 settimane", "Almeno 2 anni", "Almeno 6 mesi", "Almeno 2 mesi Ricapitolando: ● Tempo per vedere l’effetto del farmaco → fino 8 SETTIMANE ● Per quanto tempo deve assumerlo → almeno 6 MESI"], "a": 3, "c": "farmaco", "w": "Con un SSRI come la sertralina l'effetto clinico completo può richiedere fino a 6-8 settimane (latenza di azione).", "m": "SSRI: fino a 6-8 settimane per fare effetto.", "f": 0, "fn": 0}, {"n": 58, "id": "56", "q": "Quale tra le seguenti classi di farmaci non sono indicate dalle linee guida per trattare lo scompenso cardiaco a frazione di eiezione ridotta:", "o": ["Antagonisti recettori dei mineralcorticoidi", "alfa-litici", "inibitori neprilisina e del recettore dell’angiotensina", "beta-bloccanti", "ACEi"], "a": 1, "c": "cardio", "w": "Gli alfa-litici NON sono terapia dello scompenso. I cardini sono ACE-i/ARNI, beta-bloccanti, antialdosteronici (e SGLT2i).", "m": "Alfa-litici fuori dallo scompenso.", "f": 0, "fn": 0}, {"n": 59, "id": "57", "q": "Relativamente alla frattura del femore prossimale quale delle seguenti è corretta?", "o": ["incidenza aumenta fino a 75 anni e poi cala", "metà dei pazienti ha demenza preesistente", "nessuna", "non aumenta mortalità", "il 50% muore entro un anno Correzione Prof. Mossello 16/06 La mortalità aumenta ed è del 30% a un anno, diventa del 50% MA dopo 5 anni. L'incidenza aumenta del 60% soprattutto dopo gli 80 anni. Di comune accordo, si è scelto di mettere la C."], "a": 1, "c": "demenza", "w": "Circa metà dei pazienti con frattura di femore prossimale ha già una demenza preesistente. (Per mortalità/incidenza il file segna comunque B; nota la correzione: mortalità ~30% a 1 anno.)", "m": "Femore + demenza: spesso vanno insieme.", "f": 0, "fn": 0}, {"n": 60, "id": "58", "q": "Malattia di Alzheimer:", "o": ["nessuna", "andamento fluttuante", "tipica dei giovani adulti più che degli anziani", "può oggi essere diagnosticata con certezza, in base a criteri clinici e strumentali", "è una malattia neurodegenerativa ad andamento progressivo nell’arco di 10 anni"], "a": 4, "c": "demenza", "w": "L'Alzheimer è una malattia neurodegenerativa a decorso lentamente progressivo (anni). Non ha andamento fluttuante (quello è la demenza a corpi di Lewy) e colpisce gli anziani.", "m": "Alzheimer = declino lento e progressivo.", "f": 0, "fn": 0}, {"n": 61, "id": "59", "q": "Rientra nelle IADL:", "o": ["nessuna", "tutte", "scegliere vestiti", "usare WC", "doccia"], "a": 0, "c": "fragilita", "w": "Le opzioni proposte (scegliere i vestiti, usare il WC, doccia) sono BADL, non IADL → nessuna è una IADL. Le IADL sono attività strumentali (telefono, spesa, farmaci, finanze, trasporti).", "m": "Vestirsi/WC/doccia = BADL, non IADL.", "f": 0, "fn": 0}, {"n": 62, "id": "61", "q": "Nei pazienti con sincope da ipotensione ortostatica recidivante nonostante una scrupolosa aderenza alla terapia, si può considerare il trattamento con la MIDODRINA. Qual è il suo principio farmacodinamico?", "o": ["Alfa1-agonista", "H1-agonista", "Beta1-agonista", "Beta3-agonista", "Alfa2-antagonista"], "a": 0, "c": "cadute", "w": "Nell'ipotensione ortostatica recidivante refrattaria si usa la MIDODRINA, un alfa1-agonista (vasocostrittore).", "m": "Midodrina = alfa1-agonista per l'ipotensione ortostatica.", "f": 0, "fn": 0}, {"n": 63, "id": "62", "q": "Delirium nell’anziano", "o": ["nessuna", "suggerisce ictus", "si associa a degenza più breve", "influenza rischio di disabilità", "aumenta rischio mortalità"], "a": 4, "c": "demenza", "w": "Il delirium aumenta il rischio di mortalità (oltre a disabilità e durata della degenza).", "m": "Delirium = più rischio di morte.", "f": 0, "fn": 0}, {"n": 64, "id": "63", "q": "Quale farmaco causa IRA?", "o": ["digitale", "calcio antagonisti", "antidepressivi", "oppioidi", "FANS"], "a": 4, "c": "ossa", "w": "I FANS possono causare IRA (pre-renale per vasocostrizione dell'arteriola afferente, e nefrite interstiziale). Digitale, calcioantagonisti, oppioidi non sono nefrotossici diretti tipici.", "m": "FANS + anziano = rischio rene.", "f": 0, "fn": 0}, {"n": 65, "id": "64", "q": "Quale dei seguenti eventi avversi può presentarsi più frequentemente in un paziente in terapia con SSRI (inibitori della ricaptazione della serotonina)?", "o": ["Discinesie tardive", "Iposodiemia", "Aumento dei valori pressori", "Iperkaliemia", "Tachicardia"], "a": 1, "c": "varie", "w": "Gli SSRI possono causare iposodiemia (SIADH), evento avverso frequente nell'anziano. Le discinesie sono da antipsicotici, l'iperkaliemia da ACE-i.", "m": "SSRI nell'anziano → controlla il sodio.", "f": 0, "fn": 0}, {"n": 66, "id": "65", "q": "Quale delle seguenti affermazioni relative all’incontinenza urinaria è FALSA?", "o": ["Viene raramente indagata dal medico", "E’ una conseguenza fisiologica dell’invecchiamento", "In RSA è presente in circa 1 paziente su 2", "La sua prevalenza aumenta con l’età", "E’ più frequente nel sesso femminile"], "a": 1, "c": "cute", "w": "L'incontinenza urinaria NON è una conseguenza fisiologica/inevitabile dell'invecchiamento (è patologica e trattabile): questa è l'affermazione falsa. È sottoindagata, frequente in RSA, aumenta con l'età ed è più comune nelle donne.", "m": "L'incontinenza non è normale invecchiare.", "f": 0, "fn": 0}, {"n": 67, "id": "66", "q": "Incontinenza Urinaria Femminile più comune:", "o": ["da urgenza", "mista", "funzionale", "da sforzo", "da rigurgito"], "a": 3, "c": "cute", "w": "L'incontinenza da urgenza (da iperattività detrusoriale) dà perdita improvvisa e abbondante, sia diurna che notturna. Le piccole perdite con tosse/sforzo sono invece tipiche dell'incontinenza da sforzo.", "m": "Urgenza = perdite improvvise, giorno e notte.", "f": 0, "fn": 0}, {"n": 68, "id": "67", "q": "Quale tra i seguenti approfondimenti diagnostici non rientra nella flow-chart per la diagnosi di scompenso cardiaco?", "o": ["Esami ematici comprensivi di NT-pro BNP", "ecografia toracica", "TC coronarica", "ecocardiogramma", "Elettrocardiogramma Il dubbio era con la alternativa B. In realtà l’eco toracica si può usare, nello SC acuto, per valutare se è presente un edema polmonare (presenza di \"linee B\")"], "a": 2, "c": "cardio", "w": "Nella flow-chart dello scompenso entrano ECG, esami con NT-proBNP, ecocardiogramma ed eco toracica (linee B). La TC coronarica NON è di routine.", "m": "Scompenso: niente coro-TC di routine.", "f": 0, "fn": 0}, {"n": 69, "id": "68", "q": "La perdita involontaria di urina coincidente con la tosse o il riso suggerisce diagnosi di:", "o": ["incontinenza urinaria da rigurgito", "incontinenza urinaria reversibile", "incontinenza urinaria da sforzo", "incontinenza urinaria da urgenza"], "a": 2, "c": "cute", "w": "La perdita di urina con tosse/riso è l'incontinenza da sforzo (aumento pressione addominale + sfintere incompetente).", "m": "Tosse/riso → perdo urina = da sforzo.", "f": 0, "fn": 0}, {"n": 70, "id": "69", "q": "Il trattamento farmacologico dell’agitazione nella demenza:", "o": ["si basa principalmente su classi di farmaci antipertensivi", "non è solitamente efficace per sintomi psicotici quali allucinazioni o deliri", "nessuna", "può determinare effetti collaterali anche gravi e aumentare il rischio di mortalità", "è solitamente ben sicuro e tollerato"], "a": 3, "c": "demenza", "w": "Gli antipsicotici per l'agitazione nella demenza vanno usati con cautela: possono dare effetti collaterali anche gravi e aumentano la mortalità (warning su cardio/cerebrovascolare).", "m": "Antipsicotici nei dementi: aumentano la mortalità.", "f": 0, "fn": 0}, {"n": 71, "id": "70", "q": "causa di istituzionalizzazione in un paziente affetto da demenza:", "o": ["patologie mediche intercorrenti", "desiderio di vivere in comunità", "disturbi comportamentali", "disturbo cognitivo", "disturbi iatrogeni da farmaci"], "a": 2, "c": "demenza", "w": "La principale causa di istituzionalizzazione nel demente sono i disturbi del comportamento (BPSD), più del deficit cognitivo puro.", "m": "A mandare in RSA è il comportamento, non solo la memoria.", "f": 0, "fn": 0}, {"n": 72, "id": "71", "q": "Il centro diurno per anziani:", "o": ["nessuna è corretta", "accoglie persone con un buon supporto familiare", "ha finalità di socializzazione", "accoglie anziani soli ed autonomi", "accoglie persone con disabilità e disagio sociale"], "a": 4, "c": "fragilita", "w": "Il centro diurno accoglie persone con disabilità e disagio sociale (non gli anziani soli e autonomi), con finalità anche assistenziali e di sollievo per la famiglia.", "m": "Centro diurno = disabilità + disagio sociale.", "f": 0, "fn": 0}, {"n": 73, "id": "72", "q": "Quale dei seguenti interventi diagnostico-terapeutici non è indicato in presenza di fibrillazione atriale ad elevata frequenza ventricolare:", "o": ["Nessuna delle altre risposte è corretta", "Il trattamento dei segni di scompenso", "Il controllo del ritmo", "Il monitoraggio degli indici di necrosi miocardica", "Il controllo della frequenza"], "a": 3, "c": "cardio", "w": "In FA il monitoraggio degli enzimi di necrosi miocardica non è indicato di routine: serve controllo di frequenza/ritmo, gestione dello scompenso e prevenzione embolica.", "m": "FA: non si dosano le troponine di routine.", "f": 0, "fn": 0}, {"n": 74, "id": "73", "q": "Il Mild Cognitive Impairment:", "o": ["E’ la fase lieve della demenza", "E’ una compromissione cognitiva che si accompagna a declino funzionale", "E’ una compromissione cognitiva che si accompagna a depressione", "E’ una condizione normale nell’anziano", "Può precedere lo sviluppo di demenza"], "a": 4, "c": "demenza", "w": "Il Mild Cognitive Impairment è un deficit cognitivo SENZA significativo impatto funzionale, che può precedere la demenza (rischio di conversione).", "m": "MCI = anticamera (possibile) della demenza, autonomia conservata.", "f": 0, "fn": 0}, {"n": 75, "id": "74", "q": "Quale tra le seguenti scale è validata per quantificare i sintomi di Parkinson?", "o": ["IADL", "GDS", "UPDRS", "BADL", "Hoen & Yahr"], "a": 2, "c": "fragilita", "w": "La UPDRS è la scala validata per quantificare i sintomi del Parkinson. Hoehn-Yahr ne stadia la gravità ma non quantifica i sintomi nel dettaglio.", "m": "UPDRS = misura dei sintomi del Parkinson.", "f": 0, "fn": 0}, {"n": 76, "id": "75", "q": "Nei pazienti con FA permanente in terapia con Warfarin, il valore di INR deve rimanere nel range terapeutico:", "o": ["1-2.5", "2.5-3.5", "2-3", "3-4", "0-2"], "a": 2, "c": "cardio", "w": "Con warfarin nella FA l'INR target è 2-3.", "m": "INR target FA = 2-3.", "f": 0, "fn": 0}, {"n": 77, "id": "75bis", "q": ") Nel paziente in terapia con warfarin in quale circostanza non è necessario un monitoraggio stretto dell' INR:", "o": ["Cadute", "scarsa assunzione verdure a foglia larga", "Angiopatia amiloide cerebrale", "Sanguinamenti gastrointestinali", "Nessuna L'INR va monitorato sempre e comunque."], "a": 4, "c": "cadute", "w": "L'INR del warfarin va SEMPRE monitorato (cadute, dieta, sanguinamenti, angiopatia richiederebbero ancora più attenzione): nessuna situazione esonera dal controllo.", "m": "Warfarin = INR sempre sotto controllo.", "f": 0, "fn": 0}, {"n": 78, "id": "76", "q": "Le attività di base della vita quotidiana (BADL) comprendono:", "o": ["Scegliere i propri vestiti", "Tutte le altre risposte sono corrette", "Fare i lavori domestici", "NEssuna delle altre risposte è corretta", "Preparare un pasto"], "a": 0, "c": "fragilita", "w": "Scegliere i propri vestiti è una BADL (attività di base del vestirsi). Lavori domestici e preparare un pasto sono IADL.", "m": "Vestirsi = BADL; cucinare/pulire = IADL.", "f": 0, "fn": 0}, {"n": 79, "id": "77", "q": "Quale fra questi non è un fattore di rischio per Malattia di Alzheimer?", "o": ["Elevata scolarità", "Storia familiare di Malattia di Alzheimer", "Iperomocisteinemia", "Ipertensione arteriosa", "Scarsa attività fisica"], "a": 0, "c": "demenza", "w": "L'elevata scolarità è un fattore PROTETTIVO (riserva cognitiva), non di rischio, per l'Alzheimer. Familiarità, iperomocisteinemia, ipertensione e sedentarietà aumentano il rischio.", "m": "Più scuola = più riserva cognitiva (protegge).", "f": 0, "fn": 0}, {"n": 80, "id": "78", "q": "Tutti i seguenti farmaci possono causare incontinenza nell’anziano TRANNE:", "o": ["BDZ", "alfa-bloccanti", "ACE-inibitori", "Diuretici", "Nessuna delle altre risposte è corretta"], "a": 2, "c": "ossa", "w": "Gli ACE-inibitori NON causano incontinenza. La possono causare benzodiazepine, alfa-bloccanti e diuretici.", "m": "ACE-i non bagnano il letto.", "f": 0, "fn": 0}, {"n": 81, "id": "79", "q": "Quale delle seguenti affermazioni relativa alla RSA è vera:", "o": ["Accoglie persone con disabilità, spesso grave, e disagio sociale", "Deve essere consigliata a tutte le persone con grave disabilità", "Accoglie persone con disabilità da lieve a grave con un discreto supporto familiare", "Accoglie anziani soli ma relativamente autonomi", "Nessuna delle altre risposte è corretta"], "a": 0, "c": "fragilita", "w": "La RSA accoglie persone con disabilità spesso grave e disagio sociale. Non è indicata indistintamente a tutti i disabili e non è per anziani autonomi.", "m": "RSA = disabilità grave + fragilità sociale.", "f": 0, "fn": 0}, {"n": 82, "id": "81", "q": "Quale tra queste NON rientra tra le caratteristiche delle sindromi geriatriche:", "o": ["Si presentano con segni e sintomi specifici", "Hanno un’eziologia multifattoriale", "Tendono a presentarsi insieme", "Hanno un impatto negativo sulla prognosi del paziente", "Sono l’espressione clinica della disfunzione di multipli sistemi dell’organismo Dalle slide sul delirium, a proposito delle sindromi geriatriche → “Sono condizioni tipiche dell'età avanzata, manifestazione aspecifica della disfunzione di multiple funzioni dell'organismo. Hanno fattori di rischio comune, tendono a presentarsi insieme e si associano ad una prognosi peggiore”. Di comune accordo si considera corretta la A."], "a": 0, "c": "demenza", "w": "Le sindromi geriatriche si presentano in modo ASPECIFICO (non con segni/sintomi specifici): questa è la caratteristica FALSA. Sono multifattoriali, tendono a coesistere e peggiorano la prognosi.", "m": "Sindromi geriatriche: presentazione aspecifica.", "f": 0, "fn": 0}, {"n": 83, "id": "83", "q": "La valutazione dell’autonomia ADL nell’anziano:", "o": ["Nessuna delle altre risposte è corretta", "Riduce la disabilità", "Serve a fare la diagnosi di malattia", "È generalmente inutile dopo un evento acuto", "Predice il rischio di mortalità anche in corso di malattia acuta Correzione Prof. Mosello 16/06"], "a": 4, "c": "fragilita", "w": "La valutazione ADL predice il rischio di mortalità anche durante la malattia acuta (la funzione è un potente indicatore prognostico).", "m": "Quanto è autonomo = quanto rischia. ADL = prognosi.", "f": 0, "fn": 0}, {"n": 84, "id": "84", "q": "Quale tra i seguenti farmaci rappresenta un’opzione di prima linea per il trattamento dell’ipertensione arteriosa nell’anziano:", "o": ["bisoprololo", "Furosemide", "Terazosina", "Nitrati transdermici", "Ramipril"], "a": 4, "c": "cardio", "w": "Tra i farmaci di prima linea per l'ipertensione c'è il ramipril (ACE-i). Beta-bloccanti, alfa-litici (terazosina) e nitrati non sono prima scelta nell'anziano.", "m": "Prima linea pressione anziano: ACE-i (ramipril).", "f": 0, "fn": 0}, {"n": 85, "id": "85", "q": "Nella malattia di Parkinson:", "o": ["I sintomi principali sono di tipo motorio", "I disturbi sono maggiormente dovuti a disfunzione del SNA", "Predomina il deficit di linguaggio", "Predomina il deficit di memoria", "I sintomi principali sono di tipo psichiatrico comportamentale"], "a": 0, "c": "demenza", "w": "Nel Parkinson i sintomi principali sono motori (bradicinesia, rigidità, tremore). I disturbi cognitivi/disautonomici sono presenti ma non dominano l'esordio.", "m": "Parkinson = malattia del movimento.", "f": 0, "fn": 0}, {"n": 86, "id": "86", "q": "Le cadute nell’anziano:", "o": ["sono quasi sempre complicate da una frattura di femore o bacino", "sono quasi sempre l’effetto di una perdita transitoria di coscienza", "rappresentano una sindrome geriatrica", "sono più frequenti che nei bambini", "sono rare nelle malattie neurologiche"], "a": 2, "c": "fragilita", "w": "Le cadute sono una sindrome geriatrica (multifattoriale). Non sono quasi sempre fratturative né sincopali, sono frequenti nelle malattie neurologiche e nei bambini cadere è diverso (meccanica/conseguenze).", "m": "Cadute = sindrome geriatrica.", "f": 0, "fn": 0}, {"n": 87, "id": "87", "q": "In un paziente di 89 anni, sottopeso, ricoverato da oltre un mese per ictus determinante emiplegia sn:", "o": ["è consigliabile valutare la funzione renale utilizzando la formula di Cockroft Gault", "è possibile che le formule basate sulla creatinina forniscano una sottostima della funzione renale", "è preferibile valutare la funzione renale mediante la clearance della creatinina", "è preferibile valutare la funzione renale mediante le formule basate sulla cistatina", "è consigliabile valutare la funzione renale mediante una qualunque tra le formule basate sulla creatinina"], "a": 3, "c": "rene", "w": "Nel paziente molto anziano, sottopesato e sarcopenico le formule basate sulla creatinina sono inaffidabili (poca massa muscolare → creatinina falsamente bassa): meglio usare formule basate sulla cistatina C.", "m": "Sarcopenico → usa la cistatina, non la creatinina.", "f": 0, "fn": 0}, {"n": 88, "id": "88", "q": "Qual è la definizione di disfagia?", "o": ["Qualsiasi alterazione o disturbo della deglutizione definito come sintomo, quindi riferito dal paziente, o come segno, quindi riconosciuto dal medico", "Una qualsiasi alterazione o disturbo della deglutizione riferito dal paziente, molto prevalente nella popolazione anziana", "Un disturbo della deglutizione specifico della persona anziana determinante una polmonite ab- ingestis", "Un disturbo della deglutizione diagnosticata dal medico durante l’atto masticatorio della persona anziana", "Un disturbo della deglutizione specifico della persona anziana determinante sintomi come tosse e/o insufficienza respiratoria anche senza dimostrazione di polmonite ab ingestis."], "a": 0, "c": "nutrizione", "w": "La disfagia è qualsiasi alterazione della deglutizione, riferita dal paziente (sintomo) o riconosciuta dal medico (segno): definizione ampia, non limitata all'anziano o alla polmonite.", "m": "Disfagia = problema di deglutizione, come sintomo o come segno.", "f": 0, "fn": 0}, {"n": 89, "id": "89", "q": "Quando è giusto sospettare la disfagia in un paziente anziano?", "o": ["In tutti i pazienti con età superiore a 87 anni se maschi, 90 anni se donne", "Nessuna delle altre risposte è corretta", "Solo dopo il primo episodio di broncopolmonite ab ingestis", "Solo nei pazienti con demenza conclamata e/o delirium, di qualsiasi età", "In tutti i pazienti a rischio (malattie neurologiche, alterato stato di coscienza, disabilità gravi, dopo somministrazioni di alcune categorie di farmaci) e in tutti i pazienti che manifestino segni e/o sintomi suggestivi o complicanze"], "a": 4, "c": "demenza", "w": "Va sospettata disfagia in TUTTI i pazienti a rischio (malattie neurologiche, coscienza alterata, disabilità grave, certi farmaci) e in chi ha segni/sintomi o complicanze: non serve aspettare la polmonite né limitarsi ai dementi.", "m": "Sospetta la disfagia nei pazienti a rischio, prima delle complicanze.", "f": 0, "fn": 0}, {"n": 90, "id": "90", "q": "Giovanni, 85 anni, iperteso in terapia con Ramipril, presenta uno scarso controllo dei valori pressori. Conduce una vita attiva e svolge regolare attività fisica in palestra; è affetto anche da diabete (in buon compenso glicometabolico) e lieve ipercolesterolemia. Con quale farmaco potenzieresti la terapia anti- ipertensiva?", "o": ["Furosemide", "Nessuno, perché oltre gli 80 anni è preferibile mantenere una monoterapia", "Amlodipina", "Cerotto di nitrati", "Doxazosina"], "a": 2, "c": "cardio", "w": "Se la pressione resta scarsamente controllata con un ACE-i, lo step è aggiungere un secondo farmaco di prima linea (calcioantagonista, es. amlodipina), non un alfa-litico o i nitrati.", "m": "Pressione non a target con ACE-i → aggiungi un calcioantagonista.", "f": 0, "fn": 0}, {"n": 91, "id": "91", "q": "il modello di cogestione ortopedico-geriatrica:", "o": ["si associa ad un aumento dei costi sanitari globali", "si associa a maggiore incidenza di complicanze intra-operatorie e post-operatorie", "nessuna", "si associa ad allungamento della degenza ospedaliera", "si associa ad un migliore recupero funzionale e ad una riduzione della mortalità"], "a": 4, "c": "fragilita", "w": "Il modello di co-gestione ortopedico-geriatrica (orthogeriatrics) migliora il recupero funzionale e riduce mortalità e complicanze, senza allungare la degenza né aumentare i costi globali.", "m": "Ortopedia + geriatria insieme = meno morti, miglior recupero.", "f": 0, "fn": 0}, {"n": 92, "id": "92", "q": "La principale causa di Demenza secondaria (15-20% delle demenze totali) è:", "o": ["demenza di origine vascolare", "idrocefalo normoteso", "nessuna", "demenza fronto-temporale", "demenza da deficit vitaminico"], "a": 0, "c": "demenza", "w": "La demenza vascolare è la principale causa di demenza secondaria (≈15-20% del totale), seconda solo all'Alzheimer fra tutte le demenze.", "m": "Seconda demenza in assoluto = vascolare.", "f": 0, "fn": 0}, {"n": 93, "id": "93", "q": "La psicoterapia nell’anziano:", "o": ["è preferibile alla terapia farmacologica, soprattutto in caso di depressione maggiore", "è molto efficace, ma solo se il paziente non assume terapia psicofarmacologica", "è generalmente poco utile", "ha chiare evidenze di efficacia, soprattutto l’approccio cognitivo-comportamentale", "è indicata ma solo nell’approccio psico-analitico"], "a": 3, "c": "demenza", "w": "La psicoterapia nell'anziano ha efficacia documentata, in particolare l'approccio cognitivo-comportamentale (utile anche associato ai farmaci).", "m": "Anziano depresso: la CBT funziona davvero.", "f": 0, "fn": 0}, {"n": 94, "id": "94", "q": "Quale delle seguenti affermazioni è vera?", "o": ["Nessuna delle altre risposte è corretta", "Nell’anziano sarcopenico la creatinina sierica è spesso alta e può determinare una sottostima del filtrato renale calcolato con le formule basate sulla creatinina.", "Nell’anziano sarcopenico la creatinina sierica è spesso alta e può determinare una sovrastima del filtrato renale calcolato con le formule basate sulla creatinina.", "Nell’anziano sarcopenico la creatinina sierica è spesso bassa e può determinare una sovrastima del filtrato renale calcolato con le formule basate sulla creatinina.", "Nell’anziano sarcopenico la creatinina sierica è spesso bassa e può determinare una sottostima del filtrato renale calcolato con le formule basate sulla creatinina"], "a": 3, "c": "rene", "w": "Nell'anziano sarcopenico la creatinina sierica è spesso BASSA (poca massa muscolare la produce), quindi le formule basate sulla creatinina SOVRASTIMANO il filtrato (sembra più sano di quanto sia).", "m": "Poco muscolo → creatinina bassa → GFR sovrastimato.", "f": 0, "fn": 0}, {"n": 95, "id": "95", "q": "Relativamente alle fratture da fragilità, quale delle seguenti affermazioni è corretta?", "o": ["Possono portare a disabilità e morte", "Sono più frequenti nelle donne in età premenopausale e nel giovane adulto", "Si prevengono con il riposo a letto", "Il rischio può essere valutato in base al fenotipo di Fried", "Sono spontanee"], "a": 0, "c": "fragilita", "w": "Le fratture da fragilità possono portare a disabilità e morte (es. femore). Non sono spontanee, non si prevengono col riposo a letto e il rischio si valuta con FRAX/MOC (non col fenotipo di Fried).", "m": "Frattura da fragilità = evento serio, non banale.", "f": 0, "fn": 0}, {"n": 96, "id": "96", "q": "Per fare diagnosi di malattia di Alzheimer lieve?", "o": ["Può essere utile eseguire una angioTC dei vasi intracranici", "È generalmente necessaria l’esecuzione di test neuropsicologici", "Non è indicato eseguire una TC cranio", "È necessario effettuare una PET con tracciante per amiloide", "È sempre necessario effettuare una RM encefalo"], "a": 1, "c": "demenza", "w": "Per l'Alzheimer lieve sono generalmente necessari i test neuropsicologici (caratterizzano il deficit). PET amiloide e biomarcatori liquorali sono di secondo livello, non obbligatori di routine.", "m": "Alzheimer lieve: neuropsicologia prima della PET.", "f": 0, "fn": 0}, {"n": 97, "id": "97", "q": "Quale dei seguenti servizi non è compreso nella rete dei servizi per l’anziano?", "o": ["Nessuna delle altre risposte è corretta", "RSA", "Centro Diurno", "Ambulatorio specialistico", "Ospedale per acuti"], "a": 0, "c": "cure", "w": "RSA, centro diurno, ambulatorio specialistico e ospedale per acuti fanno TUTTI parte della rete dei servizi per l'anziano → nessuna è esclusa.", "m": "Rete dei servizi: c'è dentro tutto.", "f": 0, "fn": 0}, {"n": 98, "id": "98", "q": "La neurodegenerazione tipica della malattia di Parkinson è associata alla presenza di:", "o": ["Aggregati neurofibrillari", "Corpi inclusi", "Corpi di Lewy", "Placche di beta-amiloide", "Nessuna delle altre risposte è corretta"], "a": 2, "c": "demenza", "w": "La malattia di Parkinson è caratterizzata dall'accumulo di alfa-sinucleina in corpi di Lewy nei neuroni dopaminergici della substantia nigra. Le placche di beta-amiloide e i grovigli neurofibrillari sono dell'Alzheimer.", "m": "Parkinson = corpi di Lewy (alfa-sinucleina).", "f": 0, "fn": 0}, {"n": 99, "id": "99", "q": "In un paziente con recente infarto del miocardio, la presenza di sintomi depressivi:", "o": ["Può influenzare positivamente la prognosi del paziente", "Pone indicazione al trattamento con benzodiazepine", "Non necessita di trattamento specifico perché direttamente correlata alla patologia di base", "Non modifica in alcun modo la prognosi", "Può influenzare negativamente la prognosi del paziente"], "a": 4, "c": "cardio", "w": "I sintomi depressivi dopo un infarto peggiorano la prognosi (minore aderenza, peggiori outcome CV) e vanno trattati. Le benzodiazepine non sono la risposta.", "m": "Depressione post-IMA = prognosi peggiore.", "f": 0, "fn": 0}, {"n": 100, "id": "100", "q": "Con l’avanzare dell’età l’incidenza della sincope:", "o": ["Si mantiene costante", "Si attesta intorno a 52/1000 persone/anno", "Aumenta", "Diminuisce"], "a": 2, "c": "cadute", "w": "L'incidenza della sincope aumenta con l'età (curva a campana con picco nel grande anziano), per maggiore disautonomia, comorbilità e politerapia.", "m": "Più anni = più sincopi.", "f": 0, "fn": 0}, {"n": 101, "id": "101", "q": "La causa più frequente di sincope nell’anziano è:", "o": ["Cardiaca aritmica", "Cardiaca strutturale", "Ipotensione ortostatica", "Cerebrovascolare Da linee guida fatte anche da Ungar su giornaledicardiologia: in linea teorica la prima causa resta la riflessa, ma tra le indicate è la ipotensione"], "a": 2, "c": "cadute", "w": "Tra le opzioni la causa più frequente di sincope nell'anziano è l'ipotensione ortostatica (la riflessa resta teoricamente prima in generale, ma nell'anziano l'ortostatica è preminente).", "m": "Anziano che sviene → pensa all'ipotensione ortostatica.", "f": 0, "fn": 0}, {"n": 102, "id": "102", "q": "Il delirium secondo il DSM-V:", "o": ["Si manifesta nel giro di ore o giorni ed è caratterizzato prevalentemente da un disturbo dell’attenzione e della consapevolezza dell’ambiente circostante", "Si manifesta nel giro di mesi ed è caratterizzato prevalentemente da un disturbo dell’attenzione e della consapevolezza dell’ambiente circostante", "Nessuna delle altre risposte è corretta", "Si manifesta nel giro di poche ore ed è caratterizzato da un disturbo solamente della memoria a breve termine", "È associato ad un grave disturbo dello stato di vigilanza (stato di coma)"], "a": 0, "c": "demenza", "w": "Il delirium (DSM-5) insorge in ore-giorni con disturbo prevalente dell'ATTENZIONE e della consapevolezza dell'ambiente, fluttuante. Non insorge in mesi (quella è la demenza) e non è un coma.", "m": "Delirium = attenzione che salta, esordio in ore, fluttuante.", "f": 0, "fn": 0}, {"n": 103, "id": "103", "q": "Quale tra le seguenti NON è una conseguenza della malnutrizione calorico-proteica nell’anziano:", "o": ["Aumentato rischio di cadute", "Aumentato rischio di infarto miocardico", "Rischio di lesioni da pressione", "Aumentato rischio di infezioni", "Perdita di massa muscolare"], "a": 1, "c": "cadute", "w": "La malnutrizione calorico-proteica aumenta il rischio di cadute, infezioni, lesioni da pressione e sarcopenia, ma NON è una causa diretta di infarto miocardico.", "m": "Malnutrizione: infezioni, piaghe, cadute. Non l'infarto.", "f": 0, "fn": 0}, {"n": 104, "id": "104", "q": "La vitamina D per la prevenzione di cadute e fratture, secondo le attuali conoscenze:", "o": ["Dovrebbe essere somministrata a dosi elevate periodiche (es. 300.000 UI ogni 6 mesi)", "Dovrebbe essere somministrata a piccole dosi quotidiani (es. 800 UI al giorno), ma è efficace solo se assunta fin dall’età giovane adulta", "Dovrebbe essere somministrata a piccole dosi quotidiani (es. 800 UI al giorno), ma solo agli anziani in buono stato di salute", "Non è indicata", "Dovrebbe essere somministrata a piccole dosi quotidiane (es. 800 UI al giorno), ma solo agli anziani fragili e disabili"], "a": 4, "c": "fragilita", "w": "La vitamina D va data a basse dosi quotidiane (es. 800 UI/die) e il beneficio su cadute/fratture è dimostrato soprattutto negli anziani fragili e disabili (carenti). Le megadosi periodiche possono aumentare le cadute.", "m": "Vit. D: poco ogni giorno, soprattutto nei fragili. No megadosi.", "f": 0, "fn": 0}, {"n": 105, "id": "105", "q": "Un’ulcera da pressione con escara può essere classificata come:", "o": ["ulcera da pressione stadio 2", "Ulcera da pressione di stadio 3 o 4, ma una corretta stadiazione è possibile solo dopo la rimozione dell’escara", "Ulcera da pressione stadio 4", "Ulcera da pressione stadio 3", "Ulcera da pressione stadio 1"], "a": 1, "c": "cardio", "w": "Un'ulcera coperta da escara è di stadio 3 o 4, ma è NON stadiabile con precisione finché non si rimuove l'escara (che nasconde la profondità).", "m": "Escara sopra = non stadiabile finché non la togli.", "f": 0, "fn": 0}, {"n": 106, "id": "106", "q": "A quale stadio corrisponde un’ulcera da pressione che si presenta come flittene:", "o": ["Stadio I", "Stadio III", "Stadio II", "Non è stadiabile perché non è possibile valutarne la profondità", "Stadio IV"], "a": 2, "c": "cardio", "w": "L'ulcera che si presenta come flittene (bolla) è di stadio 2 (perdita parziale di spessore: epidermide ± derma superficiale).", "m": "Flittene/vescica = stadio 2.", "f": 0, "fn": 0}, {"n": 107, "id": "107", "q": "Quanti punti possono essere assegnati al Mini Mental State Examination (MMSE)?", "o": ["60", "5", "30", "15", "100"], "a": 2, "c": "demenza", "w": "I ricoveri in RSA possono essere temporanei, anche con finalità di sollievo (respite care) per il caregiver. Non sono sempre permanenti né esclusi per i dementi; la quota sociale è in genere a carico dell'utente/Comu
