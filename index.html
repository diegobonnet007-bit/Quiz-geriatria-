const MODES=[{l:"10 domande",n:10},{l:"15 domande",n:15},{l:"20 domande",n:20},{l:"30 domande",n:30},{l:"🎓 Simulazione Test (50)",n:50}];
const LS_KEY="quiz-em-hist";

// Persistenza robusta: prova localStorage, poi cookie come fallback (utile su Safari / modalita privata)
function lsAvailable(){
  try{const t="__t";localStorage.setItem(t,t);localStorage.removeItem(t);return true}catch{return false}
}
function setCookie(name,val,days){
  try{
    const d=new Date();d.setTime(d.getTime()+days*24*60*60*1000);
    document.cookie=name+"="+encodeURIComponent(val)+";expires="+d.toUTCString()+";path=/;SameSite=Lax";
  }catch{}
}
function getCookie(name){
  try{
    const m=document.cookie.match(new RegExp("(?:^|; )"+name+"=([^;]*)"));
    return m?decodeURIComponent(m[1]):null;
  }catch{return null}
}
function loadH(){
  if(lsAvailable()){
    try{const v=localStorage.getItem(LS_KEY);if(v)return JSON.parse(v)}catch{}
  }
  try{const c=getCookie(LS_KEY);if(c)return JSON.parse(c)}catch{}
  return {};
}
function saveH(h){
  const s=JSON.stringify(h);
  if(lsAvailable()){try{localStorage.setItem(LS_KEY,s)}catch{}}
  setCookie(LS_KEY,s,365);
}
function clearH(){
  if(lsAvailable()){try{localStorage.removeItem(LS_KEY)}catch{}}
  setCookie(LS_KEY,"",-1);
}

// Store separato per le domande sbagliate (lista di id)
// Usa bitmask base64 invece di JSON per stare nei 4KB del cookie anche con 259 domande
const WRONG_KEY="quiz-em-wrong";
const TOTAL_Q=259;
function encodeWrong(arr){
  try{
    const bytes=Math.ceil(TOTAL_Q/8);
    const bits=new Uint8Array(bytes);
    arr.forEach(id=>{const i=id-1;bits[i>>3]|=(1<<(i&7));});
    return btoa(String.fromCharCode(...bits));
  }catch{return JSON.stringify(arr)}
}
function decodeWrong(str){
  try{
    // prova prima bitmask base64
    if(str&&!/^\[/.test(str)){
      const raw=atob(str);
      const arr=[];
      for(let i=0;i<TOTAL_Q;i++){
        const byte=raw.charCodeAt(i>>3);
        if(byte&(1<<(i&7)))arr.push(i+1);
      }
      return arr;
    }
    // fallback: vecchio formato JSON
    return JSON.parse(str);
  }catch{return []}
}
function loadWrong(){
  if(lsAvailable()){
    try{const v=localStorage.getItem(WRONG_KEY);if(v)return decodeWrong(v)}catch{}
  }
  try{const c=getCookie(WRONG_KEY);if(c)return decodeWrong(c)}catch{}
  return [];
}
function saveWrong(arr){
  const s=encodeWrong(arr);
  if(lsAvailable()){try{localStorage.setItem(WRONG_KEY,s)}catch{}}
  setCookie(WRONG_KEY,s,365);
}
function clearWrong(){
  if(lsAvailable()){try{localStorage.removeItem(WRONG_KEY)}catch{}}
  setCookie(WRONG_KEY,"",-1);
}

function wShuffle(all,h){
  const mx=Math.max(...Object.values(h),1);
  return [...all].map(q=>({q,w:mx-(h[q.id]||0)+1}))
    .sort((a,b)=>b.w*Math.random()-a.w*Math.random()).map(x=>x.q);
}

let state={screen:"home",tab:"all",questions:[],cur:0,sel:null,answers:[],confirmed:false,size:null,history:loadH(),wrongSet:loadWrong(),catId:null};

function totalSeen(){return Object.values(state.history).reduce((a,b)=>a+b,0)}

function setState(patch){
  const sy=window.scrollY||window.pageYOffset;
  state={...state,...patch};
  render();
  // ripristina scroll: evita il salto in cima su iOS a ogni tap
  if(patch.sel!==undefined||patch.confirmed!==undefined){
    window.scrollTo(0,sy);
  }
}

function startSession(n,catId,wrongOnly){
  let pool=Q;
  if(wrongOnly){
    pool=Q.filter(q=>state.wrongSet.includes(q.id));
  }else if(catId){
    const cat=CATS.find(c=>c.id===catId);
    if(cat)pool=Q.filter(q=>cat.ids.includes(q.id));
  }
  if(pool.length===0)return;
  const qs=wShuffle(pool,state.history).slice(0,Math.min(n,pool.length));
  setState({screen:"quiz",questions:qs,cur:0,sel:null,answers:[],confirmed:false,size:n,catId:catId||null,wrongMode:!!wrongOnly});
}

function confirmAns(){
  if(state.sel===null)return;
  const q=state.questions[state.cur];
  const newH={...state.history,[q.id]:(state.history[q.id]||0)+1};
  saveH(newH);
  // aggiorna l'elenco delle sbagliate: aggiungi se errata, rimuovi se corretta
  let newWrong=[...state.wrongSet];
  if(state.sel!==q.ans){
    if(!newWrong.includes(q.id))newWrong.push(q.id);
  }else{
    newWrong=newWrong.filter(id=>id!==q.id);
  }
  saveWrong(newWrong);
  setState({confirmed:true,history:newH,wrongSet:newWrong,
    answers:[...state.answers,{qId:q.id,chosen:state.sel,correct:q.ans}]});
}

function nextQ(){
  if(state.cur+1>=state.questions.length)setState({screen:"results"});
  else setState({cur:state.cur+1,sel:null,confirmed:false});
}

function render(){
  const app=document.getElementById("app");
  if(state.screen==="home")app.innerHTML=renderHome();
  else if(state.screen==="cat")app.innerHTML=renderCat();
  else if(state.screen==="cat-size")app.innerHTML=renderCatSize();
  else if(state.screen==="quiz")app.innerHTML=renderQuiz();
  else app.innerHTML=renderResults();
}

function renderHome(){
  const h=state.history,seen=Object.keys(h).length,tot=totalSeen();
  const cov=Math.round((seen/Q.length)*100);
  const nWrong=state.wrongSet.length;
  // Rileva se localStorage non è disponibile (modalità privata Safari o file:// con ITP)
  const noLS=!lsAvailable();
  const iosBanner=noLS?`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start">
    <span style="font-size:18px;flex-shrink:0">⚠️</span>
    <div>
      <div style="font-size:13px;font-weight:600;color:#fde68a;margin-bottom:3px">Storage limitato</div>
      <div style="font-size:12px;color:#94a3b8;line-height:1.5">I progressi vengono salvati come cookie. Per la massima affidabilità su Safari/iOS apri questo file da <strong style="color:#e2e8f0">Safari → Condividi → Aggiungi a Home</strong> oppure usa il pulsante Esporta qui sotto.</div>
    </div>
  </div>`:"";
  return`<div class="home-header">
    <div class="home-icon">🏥</div>
    <h1>Quiz Emergenze Mediche</h1>
    <p class="home-sub">259 domande · Spiegazioni · Memo mnemonici</p>
  </div>
  ${iosBanner}
  ${tot>0?`<div class="stats">
    <div class="stat"><div class="stat-val" style="color:#818cf8">${seen}</div><div class="stat-lbl">domande viste</div></div>
    <div class="sep"></div>
    <div class="stat"><div class="stat-val" style="color:#38bdf8">${cov}%</div><div class="stat-lbl">copertura</div></div>
    <div class="sep"></div>
    <div class="stat"><div class="stat-val" style="color:#ef4444">${nWrong}</div><div class="stat-lbl">da rivedere</div></div>
  </div>`:""}
  ${nWrong>0
    ? `<button class="btn btn-mode" style="background:linear-gradient(135deg,#ef4444,#f97316);border:none;color:#fff" onclick="startSession(${nWrong},null,true)">🔁 Ripassa solo le sbagliate (${nWrong})<span>→</span></button>`
    : `<div class="btn btn-mode" style="opacity:.5;cursor:default;border-style:dashed">🔁 Solo le sbagliate <span style="font-weight:400;font-size:12px">— nessuna ancora</span></div>`}
  <div class="tab-row">
    <button class="tab${state.tab==="all"?" active":""}" onclick="setState({tab:'all'})">🎲 Tutte</button>
    <button class="tab${state.tab==="cat"?" active":""}" onclick="setState({tab:'cat'})">📚 Per argomento</button>
  </div>
  ${state.tab==="all"
    ? MODES.map((m,i)=>`<button class="btn btn-mode${i===4?" btn-sim":""}" onclick="startSession(${m.n},null)">${m.l}<span>→</span></button>`).join("")
    : CATS.map(c=>{
        const done=c.ids.filter(id=>h[id]).length;
        return`<button class="cat-btn" onclick="setState({screen:'cat',catId:'${c.id}'})">
          <span class="cat-icon">${c.icon}</span>
          <div class="cat-info">
            <div class="cat-name">${c.name}</div>
            <div class="cat-count">${c.ids.length} domande · ${done} viste</div>
          </div>
          <span class="cat-arrow">→</span>
        </button>`;}).join("")
  }
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn btn-ghost" style="flex:1" onclick="exportData()">📤 Esporta progressi</button>
    <button class="btn btn-ghost" style="flex:1" onclick="importData()">📥 Importa</button>
  </div>
  ${tot>0?`<button class="btn btn-ghost" style="margin-top:4px" onclick="resetH()">Azzera storico</button>`:""}`;
}

function renderCat(){
  const cat=CATS.find(c=>c.id===state.catId);
  const pool=Q.filter(q=>cat.ids.includes(q.id));
  const sizes=[5,10,15,pool.length];
  const uniq=[...new Set(sizes)].filter(n=>n<=pool.length).sort((a,b)=>a-b);
  return`<button class="btn btn-back" onclick="setState({screen:'home'})">← Indietro</button>
  <div style="margin-bottom:20px">
    <div style="font-size:32px;margin-bottom:8px">${cat.icon}</div>
    <h1>${cat.name}</h1>
    <p style="color:#64748b;font-size:13px;margin-top:4px">${pool.length} domande disponibili</p>
  </div>
  <p style="color:#94a3b8;font-size:13px;margin-bottom:14px">Quante domande vuoi fare?</p>
  ${uniq.map(n=>`<button class="btn btn-mode" onclick="startSession(${n},'${cat.id}')">${n===pool.length?"Tutte ("+n+")":n+" domande"}<span>→</span></button>`).join("")}`;
}

function renderQuiz(){
  const{questions:qs,cur,sel,confirmed}=state;
  const q=qs[cur];
  const pct=((cur+(confirmed?1:0))/qs.length*100);
  const isRight=confirmed&&sel===q.ans;
  const cat=state.catId?CATS.find(c=>c.id===state.catId):null;
  return`
  <div class="meta">
    <span class="meta-l">${cur+1} / ${qs.length}${cat?" · "+cat.icon:""}</span>
    <div class="meta-r">
      ${q.flag?'<span class="badge">⚠️ LG</span>':""}
      <span style="color:#4a5568">#${q.id}</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="card"><p style="font-size:15px;font-weight:500;color:#e2e8f0">${q.q}</p></div>
  ${q.opts.map((o,i)=>{
    let cls="opt";
    if(!confirmed&&sel===i)cls+=" selected";
    if(confirmed&&i===q.ans)cls+=" correct";
    if(confirmed&&sel===i&&i!==q.ans)cls+=" wrong";
    const mark=confirmed?(i===q.ans?" ✓":(sel===i?" ✗":"")):"";
    return`<button class="${cls}" onclick="selectOpt(${i})"><span class="opt-lbl">${String.fromCharCode(65+i)}</span><span style="flex:1">${o}</span>${mark?`<span>${mark}</span>`:""}
    </button>`;
  }).join("")}
  ${confirmed?`<div class="exp ${isRight?"ok":"ko"}">
    <div class="exp-title" style="color:${isRight?"#86efac":"#fca5a5"}">${isRight?"✓ Risposta corretta!":"✗ Sbagliata — Corretta: "+q.opts[q.ans]}</div>
    <div class="exp-why"><strong style="color:#94a3b8">Perché: </strong>${q.why}</div>
    <div class="memo"><span>MEMO </span>${q.memo}</div>
    ${q.flag?`<div class="flag"><span>⚠️ NOTA LG </span>Potenziale discrepanza con le linee guida correnti.</div>`:""}
  </div>`:""}
  <button class="btn btn-primary" onclick="${confirmed?"nextQ()":"confirmAns()"}">${confirmed?(state.cur+1>=state.questions.length?"Vedi risultati →":"Avanti →"):"Conferma risposta"}</button>
  <button class="btn btn-ghost" onclick="setState({screen:'home'})">Abbandona sessione</button>`;
}

function renderResults(){
  const{answers,questions,size,catId}=state;
  const score=answers.filter(a=>a.chosen===a.correct).length;
  const pct=Math.round(score/questions.length*100);
  const col=pct>=80?"#22c55e":pct>=60?"#f59e0b":"#ef4444";
  const wrong=answers.filter(a=>a.chosen!==a.correct);
  const cat=catId?CATS.find(c=>c.id===catId):null;
  const is50=questions.length===50;
  const voto30=is50?Math.round((score/50)*30):null;
  const votoColor=voto30>=28?"#22c55e":voto30>=24?"#f59e0b":voto30>=18?"#f97316":"#ef4444";
  const votoLabel=voto30===30?"30 🏆":voto30>=28?"28-29 🎉":voto30>=24?"Buono 📚":voto30>=18?"Sufficiente 💪":"Insufficiente 😤";
  return`<div style="text-align:center;padding:24px 0 20px">
    <div style="font-size:52px;margin-bottom:10px">${pct>=80?"🎉":pct>=60?"📚":"💪"}</div>
    <h1 style="margin-bottom:4px">Sessione completata</h1>
    ${cat?`<p style="color:#64748b;font-size:13px;margin-top:4px">${cat.icon} ${cat.name}</p>`:""}
    <div class="score-pct" style="color:${col}">${pct}%</div>
    <p style="color:#64748b">${score} corrette su ${questions.length}</p>
    ${state.wrongMode&&state.wrongSet.length===0?`<p style="color:#22c55e;font-size:14px;font-weight:600;margin-top:10px">🎯 Hai svuotato la lista delle sbagliate! Ottimo lavoro.</p>`:""}
    ${state.wrongMode&&state.wrongSet.length>0?`<p style="color:#f59e0b;font-size:13px;margin-top:10px">Restano ${state.wrongSet.length} domande da rivedere.</p>`:""}
    ${is50?`<div style="margin-top:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px">
      <p style="color:#94a3b8;font-size:12px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Voto simulato</p>
      <div style="font-size:58px;font-weight:800;color:${votoColor};line-height:1">${voto30}</div>
      <div style="font-size:13px;color:#64748b;margin-top:2px">/ 30 &nbsp;·&nbsp; ${votoLabel}</div>
      <div style="margin-top:12px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${Math.min((voto30/30)*100,100)}%;background:linear-gradient(90deg,${votoColor},${votoColor}99);border-radius:3px;transition:width .5s"></div>
      </div>
      <p style="color:#4a5568;font-size:11px;margin-top:10px">Calcolato su 50 domande con scala proporzionale a /30</p>
    </div>`:""}
  </div>
  ${wrong.length>0?`<div class="section-title"><span style="color:#ef4444">✗</span>Risposte errate (${wrong.length})</div>
  ${wrong.map(a=>{
    const q=Q.find(x=>x.id===a.qId);
    return`<div class="wrong-item">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="color:#4a5568;font-size:11px">#${q.id}</span>
        ${q.flag?'<span class="badge">⚠️ LG</span>':""}
      </div>
      <div class="wrong-q">${q.q}</div>
      <div class="wrong-ans ko">✗ ${q.opts[a.chosen]}</div>
      <div class="wrong-ans ok">✓ ${q.opts[q.ans]}</div>
      <div class="wrong-why"><span>Perché: </span>${q.why}</div>
      <div class="memo"><span>MEMO </span>${q.memo}</div>
    </div>`;}).join("")}`:""}
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startSession(${size},'${catId||""}',${state.wrongMode?"true":"false"})">🔄 Nuova sessione</button>
    <button class="btn" onclick="setState({screen:'home'})">🏠 Home</button>
  </div>`;
}

window.startSession=startSession;
window.selectOpt=function(i){if(!state.confirmed)setState({sel:i})};
window.confirmAns=confirmAns;
window.nextQ=nextQ;
window.setState=setState;
window.resetH=function(){clearH();clearWrong();state.history={};state.wrongSet=[];render()};

// Esporta/importa progressi — safety net per Safari/iOS
window.exportData=function(){
  const payload=JSON.stringify({h:state.history,w:state.wrongSet,v:1,ts:Date.now()});
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(payload).then(()=>showToast("✓ Copiato negli appunti!")).catch(()=>showPromptExport(payload));
  }else{
    showPromptExport(payload);
  }
};
window.importData=function(){
  const raw=prompt("Incolla qui i tuoi dati di backup:");
  if(!raw)return;
  try{
    const d=JSON.parse(raw);
    if(d&&d.h&&d.w){
      state.history=d.h;
      state.wrongSet=d.w;
      saveH(d.h);
      saveWrong(d.w);
      render();
      showToast("✓ Progressi ripristinati!");
    }else{throw new Error("formato non valido")}
  }catch{showToast("❌ Dati non validi");}
};
function showPromptExport(payload){
  prompt("Copia questi dati per fare un backup (seleziona tutto e copia):",payload);
}
function showToast(msg){
  const t=document.createElement("div");
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;padding:10px 18px;border-radius:20px;font-size:14px;font-family:-apple-system,sans-serif;z-index:9999;border:1px solid rgba(255,255,255,.12);pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

render();
</script>
