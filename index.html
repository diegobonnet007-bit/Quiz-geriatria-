iperidrosi", "stipsi"], "a": 2, "c": "ossa", "w": "Nel Basedow dell'anziano il sintomo più frequente è il cardiopalmo/tachicardia (fibrillazione atriale), non il gozzo né l'esoftalmo (che sono meno evidenti nell'anziano). L'astenia è aspecifica.", "m": "Basedow anziano = soprattutto cardiopalmo/FA.", "f": 0, "fn": 0}, {"n": 375, "id": "T28", "q": "quale dei seguenti test di laboratorio è il più sensibile indice di ipotiroidismo?", "o": ["T3", "T4", "Ab anti-TPO", "TSH", "uptake di radioiodio"], "a": 3, "c": "ossa", "w": "Il TSH è il test più sensibile per la funzione tiroidea: si alza precocemente nell'ipotiroidismo anche quando T3 e T4 sono ancora nella norma (ipotiroidismo subclinico).", "m": "Ipotiroidismo: primo a segnalarlo è il TSH.", "f": 0, "fn": 0}, {"n": 376, "id": "T29", "q": "quale sindrome non dà ipereosinofilia", "o": ["sarcoidosi", "leucemia linfatica cronica", "asma", "sindrome di lofgren", "parassitosi"], "a": 1, "c": "cardio", "w": "La leucemia linfatica cronica NON dà ipereosinofilia (anzi, è una proliferazione di linfociti B maturi). L'eosinofilia è tipica di parassitosi, asma, sarcoidosi e sindrome di Löfgren.", "m": "LLC = linfociti, non eosinofili.", "f": 0, "fn": 0}, {"n": 377, "id": "T30", "q": "tramite quale via daresti i broncodilatatori in un paziente con BPCO riacutizzata", "o": ["per os", "inalatoria", "ev"], "a": 1, "c": "ossa", "w": "I broncodilatatori nella BPCO riacutizzata si danno per via inalatoria (aerosol/MDI con distanziatore): massima efficacia locale, minimi effetti sistemici.", "m": "BPCO riacutizzata → broncodilatatori per inalazione.", "f": 0, "fn": 0}, {"n": 378, "id": "T31", "q": "quanti item ha il MMSE", "o": ["5", "12", "30", "60", "90"], "a": 2, "c": "demenza", "w": "Il MMSE ha 30 item (orientamento, memoria, attenzione/calcolo, richiamo, linguaggio, prassia costruttiva) e un punteggio massimo di 30.", "m": "MMSE = 30 item, punteggio 0–30.", "f": 0, "fn": 0}, {"n": 379, "id": "T32", "q": "Amiodarone e sotalolo che classi di farmaci antiaritmici sono ?", "o": ["prima", "seconda", "terza", "quarta", "sono classi diverse"], "a": 2, "c": "cardio", "w": "Amiodarone e sotalolo sono entrambi farmaci antiaritmici di classe III (bloccanti dei canali del potassio, che prolungano il potenziale d'azione e il periodo refrattario).", "m": "Amiodarone + sotalolo = classe III (bloccano il K⁺).", "f": 0, "fn": 0}, {"n": 380, "id": "T33", "q": "Controindicazioni test da sforzo", "o": ["post-infarto", "stenosi aortica moderata grave", "insufficienza mitralica moderata-grave", "intervento chirurgico di rivascolarizzazione miocardica", "pz con angina da sforzo"], "a": 1, "c": "cardio", "w": "Controindicazione al test da sforzo è la stenosi aortica moderata-grave (rischio di sincope/morte improvvisa durante lo sforzo). Il post-infarto stabile, l'angina da sforzo e le altre condizioni elencate non sono controindicazioni assolute.", "m": "Test da sforzo: no con stenosi aortica severa.", "f": 0, "fn": 0}, {"n": 381, "id": "T34", "q": "farmaco da dare per la tachiaritmia in crisi tireotossica", "o": ["atenololo", "propanololo", "amiodarone", "digossina", "verapamil"], "a": 1, "c": "cardio", "w": "Nella crisi tireotossica la tachicardia/aritmia va trattata con propranololo (beta-bloccante non selettivo): blocca anche la conversione periferica di T4 in T3. L'atenololo è meno efficace perché non blocca la conversione periferica.", "m": "Tireotossicosi + tachicardia → propranololo (non atenololo).", "f": 0, "fn": 0}, {"n": 382, "id": "T35", "q": "quale disionia è associata ad alcalosi metabolica ?", "o": ["iponatremia", "iperkaliemia", "ipokaliemia", "ipernatremia", "ipercloremia"], "a": 2, "c": "ossa", "w": "L'ipokaliemia (K⁺ basso) si associa ad alcalosi metabolica: H⁺ entra nella cellula in scambio con K⁺ (per mantenere l'elettroneutralità) → pH extracellulare sale.", "m": "Alcalosi metabolica ↔ ipokaliemia (si accompagnano sempre).", "f": 0, "fn": 0}, {"n": 383, "id": "T36", "q": "causa di pseudoipoparatiroidismo", "o": ["refrattarietà degli organi bersaglio al PTH", "deficit vit d", "deficit PTh", "deficit di entrambe", "iperfosforemia"], "a": 0, "c": "ossa", "w": "Lo pseudoipoparatiroidismo è causato da refrattarietà degli organi bersaglio al PTH (resistenza recettoriale/post-recettoriale): il PTH è elevato ma non funziona → ipocalcemia e iperfosfatemia.", "m": "Pseudoipoparatiroidismo = gli organi non ascoltano il PTH.", "f": 0, "fn": 0}, {"n": 384, "id": "T37", "q": "quale tra queste non è una causa da deficit vit B12", "o": ["gravidanza", "sprue tropicale", "intossicazione protossido d'azoto", "malnutrizione", "anemia perniciosa"], "a": 2, "c": "ossa", "w": "L'intossicazione da protossido d'azoto (N₂O) ossida la vitamina B12 inattivandola (cobalamina), ma non è una causa di carenza da deficit di assorbimento come la sprue o l'anemia perniciosa. ⚠️ Dibattuto: il N₂O causa deficit funzionale, non da malassorbimento.", "m": "N₂O non causa malassorbimento di B12, ma la inattiva (deficit funzionale).", "f": 1, "fn": 1}, {"n": 385, "id": "T38", "q": "punteggio MMSE <21 fa porre diagnosi di", "o": ["nrmale livello cognitivo", "decadimento cognitivo", "demenza di alzheimer", "demenza multinfartuale", "sindrome depressiva maggiore"], "a": 1, "c": "demenza", "w": "Un MMSE <21 indica decadimento cognitivo significativo (non fa diagnosi eziologica: potrebbe essere Alzheimer, vascolare o altro). Non è diagnosi di normalità né di demenza specifica.", "m": "MMSE <21 = decadimento cognitivo (non dice il tipo).", "f": 0, "fn": 0}, {"n": 386, "id": "T39", "q": "L' Incontinenza urinaria quando tossisci che tipo di incontinenza è?", "o": ["incontinenza da urgenza", "incontinenza da sforzo", "incontinenza da rigurgito", "incontinenza funzionale", "incontinenza urinaria acuta"], "a": 1, "c": "fragilita", "w": "Perdita di urina con la tosse/sforzo = incontinenza da sforzo (stress incontinence): aumento della pressione addominale su uno sfintere incompetente. L'urgenza dà perdite improvvise senza trigger meccanico.", "m": "Tosse → pipì = incontinenza da sforzo.", "f": 0, "fn": 0}, {"n": 387, "id": "T40", "q": "Sintomi iniziali in alzheimer", "o": ["disturbi del linguaggio", "disturbi della deambulazione", "disturbi mnesici", "allucinazioni uditive", "allucinazioni visive"], "a": 2, "c": "demenza", "w": "I sintomi iniziali dell'Alzheimer sono i disturbi mnesici (memoria episodica recente): il paziente dimentica eventi recenti pur ricordando quelli remoti. Linguaggio e deambulazione si alterano più tardi.", "m": "Alzheimer inizia dalla memoria (episodica recente).", "f": 0, "fn": 0}, {"n": 388, "id": "T42", "q": "quale non è un sintomo di sindrome uremica", "o": ["nausea", "vomito", "anoressia", "stipsi", "crampi"], "a": 3, "c": "ossa", "w": "La sindrome uremica dà nausea, vomito, anoressia, crampi muscolari, prurito, asterixis. La stipsi NON è un sintomo tipico (anzi, la diarrea uremica è possibile); la stipsi è più legata a immobilità/farmaci.", "m": "Uremia: nausea, vomito, crampi. La stipsi non è tipica.", "f": 0, "fn": 0}, {"n": 389, "id": "T43", "q": "i betabloccanti nell'anziano", "o": ["Sono sempre controindicati", "non sono mai controindicati", "sono controindicati in caso di DM", "hanno le stesse controindicazioni dell'adulto", "sono controindicati nello scompenso cardiaco"], "a": 3, "c": "cardio", "w": "I beta-bloccanti nell'anziano hanno le stesse controindicazioni dell'adulto (BAV avanzato, asma, shock cardiogeno). Non sono controindicati nel DM né nello scompenso (anzi, nei pazienti stabili con HFrEF sono indicati).", "m": "Beta-bloccanti anziano: stesse controindicazioni dell'adulto.", "f": 0, "fn": 0}, {"n": 390, "id": "T44", "q": "Quale parametro usi per il follow up polimialigia ?", "o": ["VES", "PCR", "C3 del complemento", "fibrinogeno", "LDH"], "a": 0, "c": "ossa", "w": "Il follow-up della polimialgia reumatica si basa sulla VES (eritrosedimentazione): è il marker più sensibile di attività di malattia e guida la riduzione dello steroide.", "m": "Polimialgia: segui la VES per gestire la terapia.", "f": 0, "fn": 0}, {"n": 391, "id": "T45", "q": "Mgus quale tra questi non è un criterio", "o": ["plasmacellule midollari >10%", "plasmacellule midollari <10%", "assenza di sintomi clinici", "proteinuria di Bence Jones <1g/24h", "stabilità della componente monoclonale nel follow up"], "a": 0, "c": "ossa", "w": "Il criterio che ESCLUDE la MGUS (e orienta verso il mieloma) è la presenza di plasmacellule midollari >10% (nel mieloma >10%, nella MGUS <10%). Gli altri criteri della MGUS sono: componente monoclonale <3g/dL, assenza di danno d'organo, stabilità nel follow-up.", "m": "MGUS: plasmacellule <10%. Sopra il 10% → mieloma.", "f": 0, "fn": 0}, {"n": 392, "id": "T46", "q": "Quale tra questi NON è presente in Parkinson?", "o": ["tremore a riposo", "paralisi spastica", "paralisi plastica", "seborrea", "depressione"], "a": 1, "c": "cardio", "w": "Nel Parkinson NON c'è paralisi spastica (che è un segno piramidale/corticospinale). C'è rigidità plastica (extrapiramide), tremore a riposo, seborrea e depressione come sintomi non motori.", "m": "Parkinson: rigidità plastica, non spastica.", "f": 0, "fn": 0}, {"n": 393, "id": "T47", "q": "nell'arterite a cellule giganti la VES è generalmente", "o": ["normale", "tra 20 e 30 nella prima ora", "tra 30 e 40 alla prima ora", "fino a 80-100 alla prima ora", "aumentata in misura del tutto variabile"], "a": 3, "c": "ossa", "w": "Nell'arterite a cellule giganti (Horton) la VES è tipicamente molto elevata, spesso >80–100 mm alla prima ora. Valori normali o bassi rendono la diagnosi improbabile.", "m": "Horton = VES molto alta (>80–100 mm/h).", "f": 0, "fn": 0}, {"n": 394, "id": "T48", "q": "NSE marcatore di quale tumore", "o": ["microcitoma", "epatocarcinoma", "K bronchiale", "adenoK pancreatico", "linfoma gastrico"], "a": 0, "c": "ossa", "w": "L'NSE (Neuron-Specific Enolase) è un marcatore del carcinoma polmonare a piccole cellule (microcitoma). È usato anche per i tumori neuroendocrini in genere.", "m": "NSE = microcitoma polmonare.", "f": 0, "fn": 0}, {"n": 395, "id": "T49", "q": "la valutazione iniziale del vecchio secondo le nuove linee guida della ESC prevede", "o": ["anamnesi + EO", "anamnesi + EO + ECG", "anamnesi + EO + ECG + massaggio dei seni", "nessuna di queste"], "a": 1, "c": "fragilita", "w": "La valutazione iniziale della sincope secondo ESC 2018 comprende anamnesi + esame obiettivo + ECG. Il massaggio dei seni carotidei è una procedura di II livello (non incluso nel primo step). ⚠️ Domanda con nota nel file originale.", "m": "Sincope (ESC): primo step = anamnesi + EO + ECG.", "f": 1, "fn": 1}, {"n": 396, "id": "T50", "q": "quale non è una condizione tipica della demenza multinfartuale", "o": ["ipertensione arteriosa", "ipercolesterolemia", "anamnesi positiva per TIA", "andamento progressivo", "insorgenza a gradini"], "a": 3, "c": "cardio", "w": "La demenza multinfartuale (vascolare) ha andamento \"a gradini\" (non progressivo lento), si associa a ipertensione, ipercolesterolemia e storia di TIA. L'andamento progressivo è tipico dell'Alzheimer, non della vascolare.", "m": "Demenza vascolare: a gradini, non progressiva.", "f": 0, "fn": 0}, {"n": 397, "id": "T51", "q": "S1Q3 + BBDx, dove lo trovi questo reperto ecgrafico?", "o": ["IMA posteriore", "IMA laterale", "pericardite essudativa", "tamponamento cardiaco", "tromboembolia polmonare"], "a": 4, "c": "cardio", "w": "S1Q3 + BBDx è il pattern ECG classico (anche se non il più frequente) dell'embolia polmonare massiva: segno di sovraccarico acuto del ventricolo destro.", "m": "S1Q3 + BBDx = embolia polmonare.", "f": 0, "fn": 0}, {"n": 398, "id": "T52", "q": "contributo della sistole atriale al riempimento ventricolare nel vecchio è:", "o": ["maggiore che nel giovane", "minore che nel giovane", "uguale al giovane", "la sistole atriale non contribuisce al riempimento ventricolare", "si riduce se bradicardia"], "a": 0, "c": "cardio", "w": "Nell'anziano la sistole atriale contribuisce MAGGIORMENTE al riempimento ventricolare rispetto al giovane: il ventricolo sinistro è meno compliante (disfunzione diastolica), quindi dipende di più dalla \"spinta\" atriale.", "m": "Anziano: la sistole atriale conta di più (ventricolo rigido).", "f": 0, "fn": 0}, {"n": 399, "id": "T53", "q": "Controindicazione relativa alla fibrinolisi?", "o": ["Età avanzata", "Trauma recente", "Emorragia da ulcera gastrica in atto", "Emorragia intracranica"], "a": 1, "c": "demenza", "w": "Il trauma recente è una controindicazione RELATIVA alla fibrinolisi. L'emorragia intracranica e i sanguinamenti attivi (ulcera) sono controindicazioni ASSOLUTE; l'età avanzata da sola non è controindicazione.", "m": "Fibrinolisi: trauma recente = controindicazione relativa.", "f": 0, "fn": 0}, {"n": 400, "id": "T54", "q": "Quale tra queste NON è una scala/parametro di funzionalità cardiovascolare?", "o": ["Windsor", "Rapporto VO2/VE", "Rapporto VCO2/VE", "VO2max", "Soglia anaerobia"], "a": 0, "c": "fragilita", "w": "La scala di Windsor non è un parametro di funzionalità cardiovascolare. VO2max, soglia anaerobica e i rapporti ventilatori (VO2/VE, VCO2/VE) sono parametri del test cardiopolmonare.", "m": "Windsor non è una scala cardiovascolare.", "f": 0, "fn": 0}, {"n": 401, "id": "T55", "q": "Test al D-xiloso per cosa lo usi?", "o": ["Sindrome malassorbimento", "anemia megaloblastica", "DM2", "DM1", "diabete insipido"], "a": 0, "c": "ossa", "w": "Il test al D-xilosio valuta l'assorbimento intestinale prossimale (digiuno): se la D-xilosio non appare nelle urine dopo somministrazione orale, c'è malassorbimento intestinale (non pancreatico).", "m": "D-xilosio = test di assorbimento intestinale (sindrome da malassorbimento).", "f": 0, "fn": 0}, {"n": 402, "id": "T56", "q": "alterazioni di laboratorio nella cid", "o": ["trombocitosi", "iperfibrinogemia", "poliglobulia", "ipofibrinogemia", "ipocalcemia"], "a": 3, "c": "ossa", "w": "Nella CID (coagulazione intravascolare disseminata) si consumano i fattori della coagulazione e il fibrinogeno → ipofibrinogenemia (non iperfibrinogenemia) + trombocitopenia + allungamento PT/aPTT.", "m": "CID = consuma tutto → ipofibrinogenemia + trombocitopenia.", "f": 0, "fn": 0}, {"n": 403, "id": "T57", "q": "picco monoclonale del mieloma multiplo", "o": ["sempre presente", "assente nella variante micromolecolare", "presente nella variante micromolecolare", "sempre tipo IgG Kappa", "sempre di tipo IgG Lambda"], "a": 1, "c": "ossa", "w": "Nel mieloma multiplo il picco monoclonale è assente nella variante micromolecolare (o di Bence Jones pura): le catene leggere vengono escrete nelle urine e non formano picco all'elettroforesi sierica.", "m": "Mieloma micromolecolare = niente picco nel siero (solo nelle urine).", "f": 0, "fn": 0}, {"n": 404, "id": "T58", "q": "Stadio 1 nella scala di Fontaine per la claudicatio", "o": ["asintomatico", "sintomatico con claudicatio che insorge dopo 200 m di marcia in piano", "sintomatico con claudicatio che insorge prima dei 200 m", "sintomatico a riposo", "sintomi a riposo con gravi alterazioni trofiche ed ulcere cutanee"], "a": 0, "c": "ossa", "w": "Stadio 1 di Fontaine = arteriopatia periferica ASINTOMATICA (lesioni angiografiche presenti ma nessun sintomo). Lo stadio 2 è la claudicatio, il 3 il dolore a riposo, il 4 le lesioni trofiche.", "m": "Fontaine 1 = arteriopatia senza sintomi.", "f": 0, "fn": 0}, {"n": 405, "id": "T61", "q": "per quanto tempo do anticoagulante nella FA prima di cardiovertire", "o": ["2 sett con INR 3-4", "2 sett con INR 2-3", "4 settimane con INR 2-3", "4 sett con INR 3-4", "4 sett con INR 4-5"], "a": 2, "c": "cardio", "w": "Prima di cardiovertire una FA è necessario anticoagulare con INR 2–3 per almeno 3–4 settimane (non 2 settimane, non INR 3–4). In alternativa eco transesofageo per escludere trombi.", "m": "FA → cardioversione: almeno 4 settimane con INR 2–3.", "f": 0, "fn": 0}, {"n": 406, "id": "T62", "q": "quale di questi è più associato a cadute nell'anziano", "o": ["alcol", "bdz lunga emivita", "bdz a breve emivita", "antidepressivi", "rivastigmina"], "a": 1, "c": "cadute", "w": "Le BDZ a lunga emivita (diazepam, nitrazepam) sono le più associate alle cadute nell'anziano: l'accumulo causa sedazione, instabilità e rallentamento psicomotorio prolungati.", "m": "BDZ lunga emivita = più cadute nell'anziano.", "f": 0, "fn": 0}, {"n": 407, "id": "T63", "q": "quale non é un fattore di rischio per le piaghe da decubito", "o": ["Fibrillazione Atriale", "ridotta mobilitá", "arteropatia obliterante", "incontinenza", "malnutrizione"], "a": 0, "c": "cardio", "w": "La fibrillazione atriale NON è un fattore di rischio per le piaghe da pressione. Lo sono: immobilità, arteriopatia obliterante (ischemia cutanea), incontinenza (macerazione), malnutrizione.", "m": "FA non causa piaghe. Arteriopatia, immobilità e malnutrizione sì.", "f": 0, "fn": 0}, {"n": 408, "id": "T64", "q": "agli EE di un pz di 72 anni con Na 120, k 5, Cl 85 mEq/l, hco3 20, crearinina 3,6. qual è la più probabile?", "o": ["acidosi metabolica", "acidosi respiratoria", "acidosi mista", "alcalosi respiratoria con acidosi ipercloremica", "alcalosi respiratoria"], "a": 0, "c": "ossa", "w": "Na 120, K 5, Cl 85, HCO3 20, creatinina 3,6: anion gap = Na-(Cl+HCO3) = 120-105 = 15 (normale). HCO3 basso, pH verosimilmente basso → acidosi metabolica ad anion gap normale (ipercloremica, es. da IRA con perdita di HCO3 o acidosi tubulare).", "m": "Na-Cl-HCO3 = anion gap → calcola: qui acidosi metabolica.", "f": 0, "fn": 0}, {"n": 409, "id": "T65", "q": "furto della succlavia", "o": ["il flusso è ortodromico nella vertebrale controlat e invertito nell'omolaterale", "il flusso è ortodromico nella vertebrale omolat e invertito nel controlaterale", "ortodromico in entrambe le vertebrali", "invertito in entrambe le arterie vertebrali", "ortodromico in entrambi le vertebrali ma invertito nella basilare"], "a": 0, "c": "ossa", "w": "Nel furto della succlavia il flusso è ortodromico (anterogrado) nell'arteria vertebrale controlaterale e invertito (retrogrado) nell'arteria vertebrale omolaterale alla stenosi: il circolo posteriore \"ruba\" sangue al braccio.", "m": "Furto succlavia: vertebrale omolaterale va all'indietro.", "f": 0, "fn": 0}, {"n": 410, "id": "T66", "q": "quale delle seguenti vasculiti è frequente nella donna anziana?", "o": ["Takayasu", "arterite temporale di Horton", "Kawasaki", "Churg-Strauss", "panarterite nodosa"], "a": 1, "c": "ossa", "w": "L'arterite di Horton (temporale a cellule giganti) colpisce prevalentemente le donne anziane (>50 anni, picco 70–80 anni). Takayasu colpisce donne giovani. Kawasaki colpisce i bambini.", "m": "Horton = donna anziana.", "f": 0, "fn": 0}, {"n": 411, "id": "T67", "q": "il dolore nella polimialgia reumatica è", "o": ["maggiore al mattino", "maggiore alla sera", "costante", "non ha ritmo circadiano", "variabile in rapporto con l'esercizio"], "a": 0, "c": "rene", "w": "Il dolore della polimialgia reumatica è tipicamente maggiore al mattino (rigidità mattutina >45 min), migliora con il movimento nel corso della giornata.", "m": "Polimialgia: peggio al mattino, migliora muovendosi.", "f": 0, "fn": 0}, {"n": 412, "id": "T69", "q": "incontinenza più frequente nella donna", "o": ["da stress", "da rigurgito", "da urgenza", "neurogena"], "a": 0, "c": "ossa", "w": "L'incontinenza più frequente nella donna è quella da sforzo (stress incontinence), legata al deficit del pavimento pelvico dopo gravidanze/menopausa.", "m": "Donna = incontinenza da sforzo (pavimento pelvico ceduto).", "f": 0, "fn": 0}, {"n": 413, "id": "T70", "q": "causa di ispessimento della membrana di ultafiltrazione glomerulare", "o": ["ipertensione", "nefrolitiasi", "ematuria", "proteinuria", "anemia"], "a": 3, "c": "cardio", "w": "L'ispessimento della membrana di ultrafiltrazione glomerulare (membrana basale) è causato dalla proteinuria cronica (depositi di proteine e matrice): è il meccanismo della nefropatia diabetica e di altre glomerulopatie.", "m": "Membrana basale ispessita = proteinuria cronica che la danneggia.", "f": 0, "fn": 0}, {"n": 414, "id": "T71", "q": "quale di queste non è una complicanza dell'uso cronico di FANS", "o": ["IR", "ipertensione arteriosa", "ulcera peptica o gastrite erosiva", "anemia sideropenica", "insuff respiratoria"], "a": 4, "c": "cardio", "w": "I FANS non causano insufficienza respiratoria come effetto collaterale diretto. Causano invece: IR (renale), ipertensione, ulcera/gastrite erosiva e anemia sideropenica (da sanguinamento GI cronico).", "m": "FANS: danneggiano rene, stomaco, pressione. Non il polmone.", "f": 0, "fn": 0}, {"n": 415, "id": "T72", "q": "la scala della BADL di Katz comprende:", "o": ["2 item", "3 item", "4 item", "5 item", "6 item"], "a": 4, "c": "fragilita", "w": "La BADL di Katz comprende 6 item: bagno, vestirsi, toilette, trasferimenti, continenza, alimentazione.", "m": "Katz BADL = 6 item (Bagno, Vestirsi, Toilette, Trasferimenti, continEnza, alimentazione → BVTTE+A).", "f": 0, "fn": 0}, {"n": 416, "id": "T73", "q": "a cosa serve la manovra di osler", "o": ["diagnosi pseudo- ipertensione", "diagnosi di endocardite batterica", "diagnosi di soffio diastolico", "diagnosi ipotensione ortostatica", "tamponare una ferita"], "a": 0, "c": "cadute", "w": "La manovra di Osler serve a diagnosticare la pseudoipertensione: si gonfia il bracciale oltre la sistolica e si palpa l'arteria radiale; se ancora palpabile (calcificata/rigida), la pressione misurata è falsamente alta.", "m": "Osler = pseudoipertensione (arterie calcifiche si sentono ancora).", "f": 0, "fn": 0}, {"n": 417, "id": "T74", "q": "quando si parla di microalbuminuria?", "o": ["proteinuria = 1g/24h", "proteinuria =1g/L", "proteinuria compresa tra 100-300 mg/L", "proteinuria compresa tra 30-300 mg/24h", "proteinuria non associata a edemi declivi"], "a": 3, "c": "rene", "w": "La microalbuminuria è definita come escrezione urinaria di albumina tra 30 e 300 mg/24h (o 20–200 μg/min): è il primo segno di nefropatia diabetica/ipertensiva. Oltre 300 mg/24h è macroalbuminuria/proteinuria franca.", "m": "Microalbuminuria = 30–300 mg/24h.", "f": 0, "fn": 0}, {"n": 418, "id": "T76", "q": "con quale farmaco si fa la profilassi all'ictus nel pz con FA da più di 48h?", "o": ["eparina calcica", "ASA", "EBPM", "warfarin", "indobufene"], "a": 3, "c": "cardio", "w": "Per la profilassi dell'ictus in un paziente con FA da più di 48h si usa il warfarin (o DOAC): anticoagulazione orale a lungo termine. L'ASA è inferiore; l'eparina è solo ponte/breve termine.", "m": "FA > 48h + profilassi ictus = warfarin (o DOAC).", "f": 0, "fn": 0}, {"n": 419, "id": "T77", "q": "farmaco migliore per profilassi dell'ictus nella aterosclerosi carotidea", "o": ["eparina calcica", "eparina sodica", "dipiridamolo", "ASA", "warfarin"], "a": 3, "c": "cardio", "w": "Nella prevenzione dell'ictus da aterosclerosi carotidea la terapia di scelta è l'ASA (antiaggregante): riduce gli eventi tromboembolici arteriosi. Il warfarin non è indicato (rischio/beneficio sfavorevole nell'aterosclerosi).", "m": "Aterosclerosi carotidea + profilassi ictus = ASA.", "f": 0, "fn": 0}, {"n": 420, "id": "T78", "q": "quale NON è controindicazione assoluta alla trombolisi sistemica in corso di IMA:", "o": ["ulcera gastrica in fase attiva", "recente trauma cranico", "disturbi coagulazione", "recente intervento chirurgico", "età avanzata"], "a": 4, "c": "cardio", "w": "L'età avanzata NON è una controindicazione assoluta alla trombolisi nell'IMA (può essere relativa ma non assoluta). Le controindicazioni assolute sono: trauma cranico recente, emorragia intracranica, chirurgia recente, disturbi della coagulazione attivi.", "m": "Età avanzata: non è controindicazione assoluta alla trombolisi.", "f": 0, "fn": 0}, {"n": 421, "id": "T79", "q": "quale farmaco è controindicato nel pz iperteso con asma", "o": ["betabloccanti", "ACEI", "CCB", "diuretici dell'ansa", "tiazidici"], "a": 0, "c": "cardio", "w": "I beta-bloccanti sono controindicati nell'asma (broncocostrizione). Nell'iperteso con asma si usano CCB (es. amlodipina) o ACE-i. I tiazidici possono peggiorare la glicemia ma non sono controindicati nell'asma.", "m": "Iperteso + asma = no beta-bloccanti.", "f": 0, "fn": 0}, {"n": 422, "id": "T80", "q": "quale malattia è caratterizzata dalla presenza di Ab anti- mitocondriali", "o": ["sclerodermia", "LES", "cirrosi biliare primitiva", "tiroidite di Hashimoto", "Basedow"], "a": 2, "c": "ossa", "w": "Gli anticorpi antimitocondriali (AMA) sono il marcatore sierologico della cirrosi biliare primitiva (CBP/PBC): presenti nel 95% dei casi. Non si trovano in sclerodermia, LES né Basedow.", "m": "AMA = cirrosi biliare primitiva.", "f": 0, "fn": 0}, {"n": 423, "id": "T81", "q": "il miglior candidato all'assistenza domiciliare integrata:", "o": ["pz completamente autonomo", "pz gravemente disabile", "pz che vive solo ma è autonomo", "pz con disabilità lieve- moderata con problemi economici e sociali", "pz con Parkinson"], "a": 3, "c": "ossa", "w": "Il candidato ideale all'ADI è il paziente con disabilità lieve-moderata, con problemi economici e sociali: abbastanza dipendente da necessitare cure, ma abbastanza stabile da poter essere gestito a domicilio con supporto.", "m": "ADI ideale: disabilità lieve-moderata + fragilità sociale.", "f": 0, "fn": 0}, {"n": 424, "id": "T82", "q": "il massaggio del seno carotideo nell'anziano", "o": ["può essere fatto a tutti indipendentemente dalla presenza di soffio carotideo", "può essere fatto a tutti in pz solo in assenza di stenosi carotidea emodinamica", "controindicata se >65 aa", "diminuisce la sua positività all'aumentare dell'età"], "a": 1, "c": "cardio", "w": "Il massaggio del seno carotideo può essere fatto solo in assenza di stenosi carotidea emodinamica significativa (rischio di embolizzazione di placca). Non è controindicato per l'età né per la presenza di soffio in assenza di stenosi emodinamica.", "m": "Massaggio carotideo: ok solo senza stenosi emodinamica.", "f": 0, "fn": 0}, {"n": 425, "id": "T83", "q": "qual è vera", "o": ["tutte le cadute non spiegate sono eventi sincopali", "una caduta non spiegata può mascherare un evento sincopale nel vecchio", "le cadute non spiegate hanno la stessa prognosi di qujelle accidentali", "cadute non aumentano il rischio di istituzionalizzazione"], "a": 1, "c": "cadute", "w": "Una caduta non spiegata nell'anziano PUÒ mascherare un evento sincopale: l'anziano spesso non ricorda di aver perso coscienza (amnesia retrograda). Non tutte le cadute non spiegate sono sincopali.", "m": "Caduta inspiegata = forse è una sincope dimenticata.", "f": 0, "fn": 0}, {"n": 426, "id": "T84", "q": "rilievo di glicemia a digiuno di 130 mg/dl in una pz con BMI di 31 suggerisce", "o": ["DM2", "intolleranza ai glicidi", "normoglicemia vista l'obesità della pz", "DM2 solo se glicata >7%", "DM solo se la pz è incinta"], "a": 0, "c": "ossa", "w": "Glicemia a digiuno ≥126 mg/dl (confermata) = diagnosi di DM2. 130 mg/dl supera la soglia → DM2, indipendentemente dall'obesità o dalla glicata.", "m": "Glicemia digiuno ≥126 = DM2 (non serve aspettare altri criteri).", "f": 0, "fn": 0}, {"n": 427, "id": "T85", "q": "diagnosi di TBC", "o": ["test di Mantoux", "tine test", "prima il tine test e poi il mantoux", "tine test + RX torace", "RX torace + mantoux"], "a": 4, "c": "ossa", "w": "La diagnosi definitiva di TBC si fa con RX torace + Mantoux (test tubercolinico): l'imaging mostra le lesioni, il Mantoux conferma l'esposizione/infezione. Il tine test è meno standardizzato.", "m": "TBC: RX torace + Mantoux insieme.", "f": 0, "fn": 0}, {"n": 428, "id": "T86", "q": "fattore II della coagulazione è:", "o": ["protrombina", "trombina", "fibrinogeno", "fibrina", "fattore di von Willebrand"], "a": 0, "c": "cardio", "w": "Il fattore II della coagulazione è la protrombina (precursore inattivo della trombina). La trombina è il fattore IIa (forma attivata). Il fibrinogeno è il fattore I.", "m": "Fattore II = protrombina (la trombina è la sua forma attiva).", "f": 0, "fn": 0}, {"n": 429, "id": "T87", "q": "nella profilassi della FA cronica l'INR deve rimanere", "o": ["0-2", "1-2.5", "3-4", "dipende dai valori di frequenza ventricolare media", "2-3"], "a": 4, "c": "cardio", "w": "Nella profilassi della FA cronica l'INR target è 2–3 (range terapeutico standard per prevenzione tromboembolica in FA). Valori <2 sono insufficienti, >3 aumentano il rischio emorragico.", "m": "FA cronica: INR target 2–3.", "f": 0, "fn": 0}, {"n": 430, "id": "T88", "q": "nell'ipertensione nefrovascolare bilaterale sono controindicati", "o": ["diuretici", "alfa-litici", "ACEI", "betabloccanti", "CCB"], "a": 2, "c": "cardio", "w": "Nell'ipertensione nefrovascolare bilaterale gli ACE-inibitori sono controindicati: riducono la pressione di filtrazione glomerulare (dilatano l'arteriola efferente) in reni già compromessi dalla stenosi bilaterale → IRA acuta.", "m": "Stenosi renale bilaterale = no ACE-i (chiudono il rene).", "f": 0, "fn": 0}, {"n": 431, "id": "T89", "q": "i valori di PA nel soggetto >75 aa devono essere ritenuti sopra alla norma quando", "o": ["sono > 160/95 mmHg", ">160/90", ">140/90", ">140/95", ">160/100"], "a": 2, "c": "ossa", "w": "Nell'anziano >75 anni i valori di PA sono considerati sopra la norma se >140/90 mmHg (stesse soglie dell'adulto secondo le linee guida ESC/ESH 2018). Il target terapeutico è però meno aggressivo.", "m": "PA >140/90 mmHg = ipertensione anche nell'anziano (stessa soglia).", "f": 0, "fn": 0}, {"n": 432, "id": "T91", "q": "effetto prognostico favorevole della tp antipertensiva dell'anziano", "o": ["è presente solo nell'ipertensione sistolica isolata", "è presente solo nell'ipertensione sisto- diastolica", "è presente solo nella decade 65-75 aa", "consiste solo nella riduzione degli eventi cerebrovascolari", "consiste nella riduzione del rischio CV globale"], "a": 4, "c": "cardio", "w": "L'effetto prognostico favorevole della terapia antipertensiva nell'anziano consiste nella riduzione del rischio cardiovascolare globale (ictus, IMA, scompenso): non solo degli eventi cerebrovascolari né solo per un decennio specifico.", "m": "Trattare la pressione nell'anziano = meno eventi CV globali.", "f": 0, "fn": 0}, {"n": 433, "id": "T92", "q": "dove metastatizza il K prostata?", "o": ["scheletro", "polmone", "fegato", "retto", "cute"], "a": 0, "c": "ossa", "w": "Il K prostata metastatizza prevalentemente allo scheletro (metastasi osteoblastiche): \"ossa bianche\" alla scintigrafia. Polmone e fegato sono meno frequenti e tardivi.", "m": "K prostata → ossa (metastasi osteoblastiche).", "f": 0, "fn": 0}, {"n": 434, "id": "T93", "q": "la causa più frequente di IRC nel vecchio è", "o": ["LES", "diabete mellito", "vasculiti", "amiloidosi", "nefropatia gottosa"], "a": 1, "c": "rene", "w": "La causa più frequente di IRC nell'anziano è il diabete mellito (nefropatia diabetica), seguita dall'ipertensione/nefroangiosclerosi. LES, vasculiti e amiloidosi sono molto meno frequenti.", "m": "IRC nell'anziano = prima il diabete.", "f": 0, "fn": 0}, {"n": 435, "id": "T94", "q": "l'impianto di PM è indicato", "o": ["sindrome seno carotideo", "ipersensibilità seno carotidea cardioinibitoria", "ipotensione ortostatica", "cardioinibitoria vasovagale isolata"], "a": 0, "c": "cadute", "w": "Il pacemaker è indicato nell'ipersensibilità del seno carotideo di tipo cardioinibitorio (asistolia ≥3 secondi al massaggio): corregge la bradicardia/asistolia. Non è indicato nella forma vasodepressiva (calo pressorio) né nell'ipotensione ortostatica.", "m": "PM nel seno carotideo: solo forma cardioinibitoria (cuore che si ferma).", "f": 0, "fn": 0}, {"n": 436, "id": "T96", "q": "la terapia dell'ipotensione ortostatica comprende", "o": ["calze elastiche", "norme comportamentali", "riduzione farmaci ipotensivanti", "tutte le precedenti"], "a": 3, "c": "demenza", "w": "Il trattamento dell'ipotensione ortostatica comprende calze elastiche, norme comportamentali (alzarsi lentamente, idratazione, sale) E riduzione dei farmaci ipotensivanti → tutte le precedenti.", "m": "Ipotensione ortostatica: calze + norme comportamentali + meno farmaci.", "f": 0, "fn": 0}, {"n": 437, "id": "T97", "q": "l'amiloidosi renale può essere associata a", "o": ["pielonefrite cronica", "GN cronica", "esiti di IRA", "nefropatia diabetica", "mieloma multiplo"], "a": 4, "c": "rene", "w": "L'amiloidosi renale si associa frequentemente al mieloma multiplo (amiloidosi AL da catene leggere) e anche ad artrite reumatoide/infezioni croniche (amiloidosi AA). Non alla pielonefrite cronica.", "m": "Amiloidosi renale = mieloma multiplo (o malattie infiammatorie croniche).", "f": 0, "fn": 0}, {"n": 438, "id": "T98", "q": "dopo il rilievo all'elettroforsi di un picco monoclonale IgG, per la diagnosi di mieloma serve", "o": ["plasmacellule >5% della cellularità midollare", "plasmacellule >15% della cellularità midollare", "plasmacellule midollari siano assenti", "VES >40 mm alla prima ora", "anemia con Hb <10 g/dl"], "a": 1, "c": "ossa", "w": "Per la diagnosi di mieloma multiplo (oltre al picco monoclonale) servono plasmacellule midollari >10% (alcuni criteri indicano >10%, il cut-off classico per mieloma sintomatico è >10%). ⚠️ Il file segna >15%: verificare con i criteri CRAB aggiornati (IMWG 2014 usa >10%).", "m": "Mieloma: plasmacellule midollari >10% (alcuni criteri >15%: verifica).", "f": 1, "fn": 1}, {"n": 439, "id": "T99", "q": "quale tra questa è associata a incontinenza da rigurgito", "o": ["ictus", "parkinson", "alzheimer", "tutte le precedenti", "nessuna"], "a": 3, "c": "demenza", "w": "L'incontinenza da rigurgito (overflow) si associa a ritenzione urinaria cronica: cause neurologiche (ictus, Parkinson, Alzheimer) che danno ipoattività detrusoriale o ostruzione. Tutte le precedenti possono causarla.", "m": "Overflow = ritenzione cronica da causa neurologica o ostruttiva.", "f": 0, "fn": 0}, {"n": 440, "id": "T101", "q": "Qual è una condizione che non porta a aggravamento clinico associato alla comparsa di FA nell'anziano", "o": ["tachicardia", "riduzione della portata cardiaca", "aumento della P di riempimento del VSx", "riduzione della funzione diastolica del VSx", "palpitazioni"], "a": 4, "c": "cardio", "w": "Le palpitazioni NON peggiorano la portata cardiaca né causano scompenso: sono un sintomo soggettivo fastidioso ma non emodinamicamente rilevante come la tachicardia, la riduzione della gittata o l'aumento della pressione di riempimento.", "m": "In FA le palpitazioni sono fastidiose ma non peggiorano l'emodinamica.", "f": 0, "fn": 0}, {"n": 441, "id": "T102", "q": "quale dei seguenti non è una possibile complicanza dell'uso di amiodarone", "o": ["ipotiroidismo", "ipertiroidismo", "fibrosi polmonare", "opacamento corneale", "ipocorticosurrenalismo"], "a": 4, "c": "demenza", "w": "L'ipocorticosurrenalismo NON è una complicanza dell'amiodarone. L'amiodarone può dare: ipo/ipertiroidismo, fibrosi polmonare, opacamento corneale, epatotossicità, neuropatia, fotosensibilità, allungamento QT.", "m": "Amiodarone: tiroide, polmone, occhi, fegato. Non il surrene.", "f": 0, "fn": 0}, {"n": 442, "id": "T103", "q": "qual è il più frequente effetto collaterale dei CCB non diidropirimidinici?", "o": ["tosse", "inappetenza", "stipsi", "tachicardia", "calo ponderale"], "a": 2, "c": "ossa", "w": "I CCB non diidropiridinici (verapamil, diltiazem) causano tipicamente stipsi (per effetto sulla muscolatura liscia intestinale). Non danno tosse (quella è degli ACE-i) né tachicardia (la riducono).", "m": "Verapamil/diltiazem → stipsi (effetto sulla muscolatura liscia).", "f": 0, "fn": 0}, {"n": 443, "id": "T104", "q": "durante esercizio fisico il cuore del vecchio risponde rispetto al giovane", "o": ["un maggior aumento della Fc", "maggior aumento della FE del VSx", "nessuna variazione del volume del VSx", "minor aumento del volume del VSx", "maggior aumento del volume del VSx"], "a": 4, "c": "ossa", "w": "Durante l'esercizio fisico il cuore del vecchio compensa la minore capacità cronotropa (frequenza cardiaca massima ridotta) aumentando maggiormente il VOLUME del ventricolo sinistro (meccanismo di Frank-Starling): maggior aumento del volume del VSx.", "m": "Anziano sotto sforzo: non aumenta la FC, ma dilata il ventricolo.", "f": 0, "fn": 0}, {"n": 444, "id": "T105", "q": "quale fattore NON contribuisce all'aumento di mortalità nel vecchio con IMA?", "o": ["ritardo di ospedalizzazione", "atipia dei sintomi", "ridotta risposta ai trombolitici", "frequenti controindicazione ai trombolitici", "comorbilità"], "a": 2, "c": "cardio", "w": "La ridotta risposta ai trombolitici NON è un fattore di aumentata mortalità nell'anziano con IMA: in realtà l'anziano risponde ai trombolitici (anche se ha più controindicazioni). Il ritardo, l'atipia, le comorbilità e le controindicazioni aumentano la mortalità.", "m": "IMA anziano: risponde ai trombolitici; il problema è ritardo, atipia e controindicazioni.", "f": 0, "fn": 0}, {"n": 445, "id": "T106", "q": "quale dei seguenti rilievi obiettivi mi fa risalire con maggiore esattezza alla stenosi della valvola aortica?", "o": ["quarto tono", "valori della PA", "intensità e cronologia del soffio sistolico", "presenza di calcificazione valvolare", "terzo tono"], "a": 2, "c": "cardio", "w": "Il rilievo obiettivo più specifico per la stenosi aortica è l'intensità e la cronologia del soffio sistolico (soffio meso-sistolico rude, in crescendo-decrescendo, con picco tardivo nella stenosi severa). Il 4° tono e il 3° tono orientano rispettivamente per disfunzione diastolica e sistolica, non specifici per SA.", "m": "Stenosi aortica: il soffio sistolico (intensità e cronologia) è il segno più specifico.", "f": 0, "fn": 0}, {"n": 446, "id": "T108", "q": "lo scompenso cardiaco nell'anziano", "o": ["è più frequentemente diastolico che sistolico", "non risponde ai beta- bloccanti", "può associarsi a deterioramento dello stato cognitivo", "è più frequente nei M che nelle F", "non è causa di disabilità"], "a": 2, "c": "demenza", "w": "Lo scompenso cardiaco nell'anziano può associarsi a deterioramento cognitivo (ipoperfusione cerebrale, microembolie). È più frequente nelle donne e più frequentemente diastolico (HFpEF). ⚠️ Le opzioni A e C sono entrambe vere: il file segna C.", "m": "Scompenso anziano: più spesso nelle donne, può dare deterioramento cognitivo.", "f": 1, "fn": 1}, {"n": 447, "id": "T109", "q": "quale affermazione riguardo il coma diabete iperosmolare è corretta", "o": ["il pH è di solito normale ma ci può essere acidosi metabolica lattica (con anion gap >)", "c'è sempre chetoacidosi", "si può sviluppare alcalosi metabolica da iperventilazione", "si può sviluppare alcalosi metabolica da iperemesi", "si può sviluppare acidosi metabolica da diarrea (con anion gap normale)"], "a": 0, "c": "ossa", "w": "Nel coma iperosmolare diabetico il pH è di solito normale (non c'è chetoacidosi importante), ma può esserci acidosi lattica da ipoperfusione (con anion gap aumentato). Non c'è chetoacidosi franca come nel DKA.", "m": "Iperosmolare: pH normale ma possibile acidosi lattica (non chetoacidosi).", "f": 0, "fn": 0}, {"n": 448, "id": "T110", "q": "un pz con demenza allo stato iniziale mostra tutti i sintomi tranne", "o": ["deficit dell'orientamento", "compromissione della memoria", "alterazione stato di coscienza", "compromissione del linguaggio", "psicosi"], "a": 2, "c": "demenza", "w": "Nella demenza iniziale lo stato di coscienza è CONSERVATO: questa è la caratteristica che distingue la demenza dal delirium. Orientamento, memoria, linguaggio e psicosi possono essere compromessi anche nelle fasi iniziali.", "m": "Demenza iniziale: coscienza integra (se la perde → delirium).", "f": 0, "fn": 0}, {"n": 449, "id": "T112", "q": "quale criterio orienta alla diagnosi di delirum piuttosto che di demenza?", "o": ["patologia cronica progressiva", "stato di coscienza mantenuto fino alle fasi più avanzate", "alterazioni psicomotorie nelle fasi più avanzate", "generalmente irreversibile", "esordio improvviso spesso databile"], "a": 4, "c": "fragilita", "w": "Il criterio che orienta verso il delirium invece della demenza è l'esordio improvviso e databile: il delirium insorge in ore-giorni, la demenza in mesi-anni. Lo stato di coscienza alterato è caratteristico del delirium, non della demenza (che lo preserva a lungo).", "m": "Esordio improvviso e databile = delirium (non demenza).", "f": 0, "fn": 0}, {"n": 450, "id": "T113", "q": "criteri diagnostici del DSM IV per l'alzheimer", "o": ["deficit del pensiero astratto", "deficit del giudizio critico", "modificazioni della personalità", "tutti", "nessuno"], "a": 3, "c": "demenza", "w": "I criteri DSM-IV per l'Alzheimer comprendono tutti i deficit elencati (pensiero astratto, giudizio, personalità) come possibili manifestazioni. La diagnosi richiede però anche il deficit di memoria + interferenza con la vita quotidiana + esclusione di altre cause.", "m": "Alzheimer DSM-IV: tutti i deficit cognitivi elencati possono esserci.", "f": 0, "fn": 0}, {"n": 451, "id": "T115", "q": "cos'è un'ortesi?", "o": ["un apparecchio applicato al corpo come correttivo funzionale", "un sostituto di parti esterne mancanti del corpo", "un sostegno utilizzabile nel cammino su percorsi difficoltosi", "una protesi di organi interni", "un tipo di protesi dentaria specifica per anziani"], "a": 0, "c": "demenza", "w": "Un'ortesi è un apparecchio applicato al corpo come correttivo o supporto funzionale (es. tutori, splint, busti). La protesi sostituisce parti mancanti; il bastone è un ausilio per la deambulazione.", "m": "Ortesi = apparecchio che corregge/supporta (non sostituisce).", "f": 0, "fn": 0}, {"n": 452, "id": "T116", "q": "nelle Residenze Sanitarie Assistenziali vengono ricoverati", "o": ["soggetti gravemente disabili e con scarso supporto familiare", "soggetti lievemnte disabili e con buon supporto familiare", "soggetti autonomi", "solo pz con grave alzheimer", "poveri"], "a": 0, "c": "demenza", "w": "Le RSA accolgono soggetti gravemente disabili e con scarso supporto familiare: la combinazione di grave disabilità + rete sociale insufficiente è l'indicazione principale al ricovero in struttura.", "m": "RSA = grave disabilità + famiglia che non ce la fa.", "f": 0, "fn": 0}, {"n": 453, "id": "T117", "q": "la sigla ADI indica", "o": ["assistenza domiciliare intermittente", "assistenza domiciliare istantanea", "aiuto domestico intercorrente", "assistenza domiciliare integrata", "associazione demenza italiana"], "a": 3, "c": "ossa", "w": "ADI = Assistenza Domiciliare Integrata: integra cure mediche, infermieristiche e riabilitative a domicilio per anziani/disabili non autosufficienti.", "m": "ADI = Assistenza Domiciliare Integrata.", "f": 0, "fn": 0}, {"n": 454, "id": "T118", "q": "Un fecaloma può essere associato a queste diverse condizioni, tranne:", "o": ["incontinenza urinaria", "incontinenza fecale", "confusione mentale", "alcalosi metabolica", "disidratazione"], "a": 3, "c": "demenza", "w": "Un fecaloma può causare incontinenza urinaria (compressione vescicale), incontinenza fecale, confusione mentale (stimolo vagale) e disidratazione. NON causa alcalosi metabolica.", "m": "Fecaloma: urine, feci, confusione, disidratazione. Non alcalosi.", "f": 0, "fn": 0}, {"n": 455, "id": "T119", "q": "Quale dei seguenti farmaci può scatenare delirio in paziente anziano?", "o": ["Tutte le precedenti", "--> anticolinergici (antidepressivi triciclici, antipsicotici, miorilassanti, cimetidina, digossina), ipnotici-sedativi (intossicazione ed astinenza da barbiturici, benodiazepine, alcool), oppiacei, dopaminergici (L-dopa), corticosteroidi, antibiotici (cefalosporine, fluorochinoloni)"], "a": 0, "c": "demenza", "w": "Tutti i farmaci elencati possono scatenare delirium nell'anziano: anticolinergici (triciclici, antipsicotici, cimetidina, digossina), BDZ/barbiturici, oppioidi, L-dopa, corticosteroidi, alcuni antibiotici.", "m": "Delirium da farmaci: anticolinergici, BDZ, oppioidi, L-dopa, steroidi. Tutti.", "f": 0, "fn": 0}, {"n": 456, "id": "T121", "q": "prevalenza demenza popolazione >65 anni", "o": ["6%", "15%", "40%", "25%"], "a": 0, "c": "ossa", "w": "La prevalenza della demenza nella popolazione >65 anni è circa il 6–8% (il file segna A = 6%). Aumenta esponenzialmente con l'età: ~1-2% a 65 anni, >30% dopo gli 85.", "m": "Demenza >65 anni: circa 6–8% della popolazione.", "f": 0, "fn": 0}, {"n": 457, "id": "T122", "q": "numero item IADL", "o": ["4", "5", "6", "7", "8"], "a": 4, "c": "fragilita", "w": "La scala IADL di Lawton comprende 8 item: uso del telefono, fare la spesa, preparare i pasti, cura della casa, lavanderia, uso dei mezzi di trasporto, gestione dei farmaci, gestione del denaro.", "m": "IADL di Lawton = 8 item.", "f": 0, "fn": 0}, {"n": 458, "id": "T123", "q": "principale fattore di rischio FA in pz anziano", "o": ["cardiopatia ischemica", "cardiomiopatia dilatativa", "valvulopatia mitralica reumatica", "cardiopatia ipertensiva", "tutte le precedenti"], "a": 3, "c": "cardio", "w": "Il principale fattore di rischio per la FA nell'anziano è la cardiopatia ipertensiva (ipertensione arteriosa cronica → dilatazione e fibrosi atriale). Seguono cardiopatia ischemica e valvulopatie.", "m": "FA nell'anziano: prima causa = cardiopatia ipertensiva.", "f": 0, "fn": 0}, {"n": 459, "id": "T124", "q": "un giardino Alzheimer è per definizione", "o": ["teconlogico", "terapeutico", "nessuno", "aperto"], "a": 1, "c": "demenza", "w": "Il giardino Alzheimer (o giardino terapeutico) è per definizione terapeutico: stimola i sensi, orienta nello spazio, riduce l'agitazione e migliora il benessere del demente.", "m": "Giardino Alzheimer = terapeutico (non tecnologico né chiuso).", "f": 0, "fn": 0}, {"n": 460, "id": "T125", "q": "nell'anziano agitato cosa fare?", "o": ["prevenzione"], "a": 0, "c": "cardio", "w": "Nell'anziano agitato la prima strategia è la prevenzione e la gestione non farmacologica (orientamento, ambiente calmo, presenza dei familiari) prima di ricorrere ai farmaci.", "m": "Anziano agitato: prima prevenzione e approccio non farmacologico.", "f": 0, "fn": 0}, {"n": 461, "id": "T126", "q": "esercizio fisico nell anziano cosa valutare", "o": ["può essere fatta anche con la valutazione clinica (è sufficiente anche la valutazione", "ECG da sforzo", "valutazione VO2", "visita normale con anamnesi ed EO"], "a": 0, "c": "fragilita", "w": "La valutazione per l'esercizio fisico nell'anziano può essere sufficiente con la valutazione clinica (anamnesi + EO ± ECG a riposo): non è sempre necessario il test da sforzo formale o la misurazione del VO2.", "m": "Esercizio fisico anziano: basta la valutazione clinica (non sempre serve il CPET).", "f": 0, "fn": 0}, {"n": 462, "id": "T127", "q": "esercizio fisico anziano post ictus", "o": ["fare esercizio sotto controllo medico"], "a": 0, "c": "cardio", "w": "L'esercizio fisico post-ictus va fatto sotto controllo medico (per monitorare la risposta cardiovascolare e prevenire complicanze), ma è indicato e benefico per il recupero funzionale.", "m": "Post-ictus: esercizio fisico sì, ma sotto controllo.", "f": 0, "fn": 0}, {"n": 463, "id": "T128", "q": "nella valutazione della malnutrizione nel paziente anziano si deve prendere in considerazione:", "o": ["la perdita di peso corporeo", "la ocncentrazione della albumina sierica", "la colesterolemia", "tutte le precedenti", "nessuna delle precedenti"], "a": 3, "c": "fragilita", "w": "La valutazione della malnutrizione nell'anziano deve considerare: perdita di peso corporeo, albumina sierica (marker proteico), colesterolemia (marker indiretto) → tutte le precedenti.", "m": "Malnutrizione anziano: peso + albumina + colesterolo (tutti).", "f": 0, "fn": 0}, {"n": 464, "id": "T129", "q": "condizione associata a incontinenza urinaria da urgenza", "o": ["ictus", "morbo di Parkinson", "demenza di Alzheimer", "tutte le precedenti", "nessuna delle precedenti"], "a": 3, "c": "demenza", "w": "L'incontinenza urinaria da urgenza si associa a ictus, Parkinson e Alzheimer (tutte cause di iperattività detrusoriale neurogena) → tutte le precedenti.", "m": "Urgenza urinaria: ictus, Parkinson, Alzheimer. Tutte cause neurologiche.", "f": 0, "fn": 0}, {"n": 465, "id": "T131", "q": "nell'invecchiamento cerebrale fisiologico nel cervello si ha", "o": ["perdita di neuroni", "presenza di placche senili", "ammassi neurofibillari", "tutte le precedenti"], "a": 3, "c": "ossa", "w": "Nell'invecchiamento cerebrale fisiologico si ha perdita di neuroni, comparsa di placche senili e ammassi neurofibrillari (in misura minore rispetto all'Alzheimer, ma presenti) → tutte le precedenti.", "m": "Cervello che invecchia: perde neuroni, placche e grovigli (in piccola misura).", "f": 0, "fn": 0}, {"n": 466, "id": "T132", "q": "la sarcopenia è caratterizzata da", "o": ["riduzione assoluta del tessuto muscolare striato", "aumento del tessuto adiposo", "entrambe", "nessuna delle due"], "a": 2, "c": "fragilita", "w": "La sarcopenia è caratterizzata da riduzione della massa muscolare E aumento del tessuto adiposo intra/intermuscolare (myosteatosi) → entrambe le opzioni sono corrette.", "m": "Sarcopenia = meno muscolo + più grasso (anche dentro il muscolo).", "f": 0, "fn": 0}, {"n": 467, "id": "T133", "q": "nell'anziano la sedentarietà è un fattore di rischio per", "o": ["fratture", "malnutrizione per eccesso", "sarcopenia", "tutte le precedenti"], "a": 3, "c": "fragilita", "w": "Nell'anziano la sedentarietà è fattore di rischio per fratture (osteoporosi da disuso), malnutrizione (ridotto dispendio energetico → anoressia), sarcopenia → tutte le precedenti.", "m": "Sedentarietà: osteoporosi, malnutrizione e sarcopenia. Tutte.", "f": 0, "fn": 0}, {"n": 468, "id": "T135", "q": "l'attivazione dell'ADI (Assistnza Domiciliare Integrata) si propone i seguenti obiettivi", "o": ["mantenere al proprio domicilio l'anziano, il disabile e il malato di alcune patologie", "qualificare l'assistenza sul territorio", "ridurre i ricoveri in proprio", "ridurre il tasso di ospedalizzazione", "tutte le precedenti"], "a": 4, "c": "ossa", "w": "L'ADI si propone di mantenere l'anziano/disabile al proprio domicilio, qualificare l'assistenza territoriale, ridurre i ricoveri e ridurre il tasso di ospedalizzazione → tutte le precedenti.", "m": "ADI: tenerlo a casa, migliorare le cure, ridurre i ricoveri. Tutti gli obiettivi.", "f": 0, "fn": 0}, {"n": 469, "id": "T136", "q": "A cosa è maggiormente correlata la PAM", "o": ["mortalità globale", "eventi cerebrovascolari"], "a": 0, "c": "varie", "w": "La pressione arteriosa media (PAM) è maggiormente correlata alla mortalità globale (è il miglior predittore emodinamico di outcome nei pazienti critici e nell'anziano).", "m": "PAM = il miglior predittore di mortalità globale.", "f": 0, "fn": 0}, {"n": 470, "id": "T137", "q": "Eziologia più frequente di scompenso cardiaco nell'anziano", "o": ["cardiopatia ipertensiva", "cardiopatia dilatativa", "cardiopatia ischemica", "tutte"], "a": 3, "c": "cardio", "w": "L'eziologia più frequente di scompenso cardiaco nell'anziano è discussa: il file segna \"tutte\" (D = cardiopatia ipertensiva + dilatativa + ischemica). ⚠️ In realtà la causa singola più frequente nell'anziano è la cardiopatia ischemica (seguita dall'ipertensiva).", "m": "Scompenso anziano: principalmente ischemica e ipertensiva (file dice tutte).", "f": 1, "fn": 1}, {"n": 471, "id": "T138", "q": "Quando è indicato il monitoraggio pressorio delle 24h", "o": ["pz resistente alla terapia o indagare eventi ipotensivi"], "a": 0, "c": "ossa", "w": "Il monitoraggio pressorio delle 24h (ABPM) è indicato nel paziente resistente alla terapia o per indagare episodi ipotensivi (sincopi, cadute, sintomi ortostatici).", "m": "ABPM: paziente resistente o con episodi ipotensivi.", "f": 0, "fn": 0}, {"n": 472, "id": "T139", "q": "L'anemia da deficit marziale nell'anziano è", "o": ["ipocromica microcitica"], "a": 0, "c": "ossa", "w": "L'anemia da deficit marziale (carenza di ferro) è ipocromica microcitica: globuli rossi piccoli e pallidi (basso MCV, bassa MCHC).", "m": "Anemia sideropenica = ipocromica microcitica.", "f": 0, "fn": 0}, {"n": 473, "id": "T140", "q": "Quanti sono gli stadi delle ulcere da pressione", "o": ["4"], "a": 0, "c": "cardio", "w": "Le ulcere da pressione si classificano in 4 stadi (dall'eritema non sbiancante su cute integra alla perdita a tutto spessore con esposizione di osso/muscolo/tendine).", "m": "Ulcere da pressione: 4 stadi.", "f": 0, "fn": 0}, {"n": 474, "id": "T141", "q": "Quali tra questi è un fattore di rischio cardiovascolare", "o": ["circonferenza addominale >120cm nell'uomo e >100 cm nella donna", "Circonferenza addominale >102 cm nell'uomo e 88cm nella donna", "Circonferenza addominale >110 cm nell'uomo e 90 cm nella donna", "BMI <25 o >10"], "a": 1, "c": "cardio", "w": "Il fattore di rischio cardiovascolare legato alla circonferenza addominale è: >102 cm nell'uomo e >88 cm nella donna (criteri IDF/ATP III). Valori superiori indicano obesità viscerale e aumentato rischio metabolico/CV.", "m": "Rischio CV addominale: >102 cm uomo, >88 cm donna.", "f": 0, "fn": 0}, {"n": 475, "id": "T142", "q": "Che cosa è il \"reverse dipper\" al monitoraggio ambulatoriale della pressione arteriosa", "o": ["Riduzione della pressione media notturna rispetto alla diurna", "Aumento della pressione media notturna rispetto alla diurna", "Aumento della pressione media notturna del 20% rispetto alla diurna"], "a": 2, "c": "cardio", "w": "Il \"reverse dipper\" è il pattern in cui la pressione media notturna AUMENTA rispetto alla diurna (invece di scendere fisiologicamente del 10–20%): pattern ad alto rischio cardiovascolare e renale.", "m": "Reverse dipper: di notte la pressione SALE (invece di scendere).", "f": 0, "fn": 0}, {"n": 476, "id": "T143", "q": "\"Loop recorder\" a che serve", "o": ["per diagnosticare episodi di sincope", "per diagnosticare episodi di sincope e diagnosi differenziale con pseudosincope"], "a": 1, "c": "cadute", "w": "Il loop recorder impiantabile è indicato per diagnosticare episodi di sincope E per la diagnosi differenziale con la pseudosincope (es. crisi epilettiche): registra l'ECG per mesi-anni e cattura eventi rari. ⚠️ Risposta incerta nel file originale.", "m": "Loop recorder: sincopi inspiegate + DD con pseudosincope.", "f": 1, "fn": 1}, {"n": 477, "id": "T144", "q": "Qual è la complicanza polmonare della terapia ablativa per la fibrillazione atriale?", "o": ["ARDS", "stenosi delle vene polmonari", "Pneumotorace"], "a": 2, "c": "cardio", "w": "Lo pneumotorace è una complicanza polmonare possibile dell'ablazione transcatetere per FA (puntura/barotrauma). ⚠️ Nota: anche la stenosi delle vene polmonari è una complicanza tipica; il file indica pneumotorace.", "m": "Ablazione FA: pneumotorace (e stenosi vene polmonari).", "f": 1, "fn": 1}, {"n": 478, "id": "T145", "q": "Quale tra queste può presentare alterazioni dello stato di coscienza", "o": ["Alzheimer", "Parkinson", "Demenza a Corpi di Lewy"], "a": 2, "c": "demenza", "w": "La demenza a corpi di Lewy è caratterizzata da fluttuazioni cognitive e alterazioni dello stato di coscienza (episodi di sonnolenza/confusione): questo la distingue dall'Alzheimer (coscienza conservata) e dal Parkinson (prevalenza motoria). ⚠️ Incerta nel file.", "m": "Corpi di Lewy = coscienza che oscilla (a differenza di Alzheimer).", "f": 1, "fn": 1}, {"n": 479, "id": "159", "q": "Cosa sono e quando vanno attuate le \"manovre di contropressione\"?", "o": ["Manovre fisiche di contrazione muscolare utili nella sincope vasovagale/riflessa", "Manovre indicate nella sincope cardiogena aritmica", "Manovre per la sincope da ipotensione ortostatica grave", "Manovre rianimatorie nell'arresto"], "a": 0, "c": "cadute", "w": "Le manovre di contropressione (incrociare le gambe, contrarre i muscoli) aumentano il ritorno venoso e la pressione: utili nella sincope vasovagale/riflessa con prodromi.", "m": "Contropressione = sincope vasovagale (spremi i muscoli).", "f": 1, "fn": 1}, {"n": 480, "id": "273", "q": "Quale delle seguenti è vera sull'ipotensione ortostatica?", "o": ["È rara nell'anziano", "Si può diagnosticare solo tramite tilt test", "È definita come riduzione della pressione sistolica di almeno 20 mmHg (o diastolica di 10) entro 3 minuti dall'ortostatismo", "Non aumenta la mortalità"], "a": 2, "c": "cadute", "w": "L'ipotensione ortostatica = calo ≥20 mmHg di sistolica (o ≥10 di diastolica) entro 3 minuti in piedi. È frequente nell'anziano, si misura al letto e aumenta la mortalità.", "m": "OI = calo ≥20/10 entro 3 min in piedi.", "f": 0, "fn": 0}, {"n": 481, "id": "276", "q": "La sarcopenia è caratterizzata da:", "o": ["Riduzione assoluta di tessuto muscolare striato", "Riduzione assoluta di tessuto adiposo", "Tutte le precedenti", "Nessuna delle precedenti"], "a": 0, "c": "fragilita", "w": "La sarcopenia è la perdita di massa e forza del muscolo striato, con relativo aumento del grasso intramuscolare. La riduzione del tessuto adiposo non è caratteristica.", "m": "Sarcopenia = meno muscolo (non meno grasso).", "f": 0, "fn": 0}, {"n": 482, "id": "277", "q": "Il loop recorder impiantabile è utile per:", "o": ["Sincope", "Sincope + diagnosi differenziale con pseudosincope", "Fine percorso diagnostico", "Paziente con tilt test negativo", "Tutte le precedenti"], "a": 4, "c": "cadute", "w": "Il loop recorder registra l'ECG per mesi-anni: utile nelle sincopi inspiegate, nella DD con pseudosincope, a fine iter diagnostico e quando il tilt test è negativo → tutte.", "m": "Loop recorder: sincopi misteriose, a 360°.", "f": 0, "fn": 0}, {"n": 483, "id": "286", "q": "Percentuale di patologie acute per cui l'anziano si presenta in PS con sintomatologia aspecifica:", "o": ["25%", "51%", "75%", "90%"], "a": 1, "c": "fragilita", "w": "Circa la metà (≈51%) delle patologie acute nell'anziano si presenta in modo aspecifico (confusione, cadute, astenia) invece dei sintomi classici.", "m": "Anziano in PS: ~metà dei casi è aspecifico.", "f": 1, "fn": 1}, {"n": 484, "id": "293", "q": "Paziente in terapia con warfarin: in quale circostanza NON è necessario un monitoraggio stretto dell'INR?", "o": ["Cadute", "Scarsa assunzione di verdure a foglia larga", "Angiopatia amiloide cerebrale", "Sanguinamenti gastrointestinali", "Nessuna (in tutte serve monitoraggio)"], "a": 4, "c": "farmaco", "w": "Cadute, dieta irregolare (vitamina K), angiopatia amiloide e sanguinamenti GI richiedono TUTTI un monitoraggio attento dell'INR → \"nessuna\" è la circostanza che esonera dal controllo.", "m": "Warfarin: in tutte queste serve controllo INR.", "f": 0, "fn": 0}, {"n": 485, "id": "294", "q": "Per la prevenzione delle cadute sono importanti:", "o": ["Esercizi di allungamento", "Esercizi di resistenza", "Esercizi specifici di equilibrio", "b+c (resistenza + equilibrio)", "Tutti i precedenti"], "a": 1, "c": "cadute", "w": "Il file evidenzia gli esercizi di resistenza/forza. ⚠️ In realtà i programmi efficaci (es. OTAGO) combinano forza ED equilibrio: verifica con le slide.", "m": "Cadute: esercizi di forza ed equilibrio.", "f": 1, "fn": 1}, {"n": 486, "id": "295", "q": "Il recupero motorio dopo frattura di femore nei pazienti con demenza è dovuto a:", "o": ["Tutte le condizioni citate", "Essenzialmente dal livello cognitivo", "Da nessuna", "Solo dalla capacità motoria premorbosa", "Solo dalla precocità della mobilizzazione"], "a": 0, "c": "ossa", "w": "Il recupero dipende da più fattori insieme: livello cognitivo, capacità motoria pre-frattura e precocità della mobilizzazione → tutte le condizioni citate.", "m": "Recupero post-femore: conta tutto (testa, motricità, tempismo).", "f": 0, "fn": 0}, {"n": 487, "id": "296", "q": "Uomo con ipertensione e IPB, positivo alle prove di ipotensione ortostatica (iatrogena). Da quale farmaco è causata?", "o": ["Ramipril", "Salbutamolo", "Calcipotriolo", "Terazosina", "Dutasteride"], "a": 3, "c": "cardio", "w": "La terazosina è un alfa-litico (usato per IPB e ipertensione): causa vasodilatazione e ipotensione ortostatica. Calcipotriolo (psoriasi) e salbutamolo non c'entrano.", "m": "Terazosina (alfa-litico) → ipotensione ortostatica.", "f": 0, "fn": 0}, {"n": 488, "id": "299", "q": "Le caratteristiche della sincope sono:", "o": ["Lenta insorgenza, breve durata, recupero spontaneo e completo", "Rapida insorgenza, breve durata, recupero spontaneo e completo", "Rapida insorgenza, durata prolungata, recupero completo e spontaneo", "Lenta insorgenza, breve durata, recupero lento e progressivo", "Rapida insorgenza, breve durata, recupero lento e progressivo"], "a": 1, "c": "cadute", "w": "La sincope è una perdita di coscienza a insorgenza rapida, breve durata e recupero spontaneo e completo (da ipoperfusione cerebrale transitoria).", "m": "Sincope: rapida, breve, recupero completo.", "f": 0, "fn": 0}, {"n": 489, "id": "300", "q": "Obiettivi della terapia antipertensiva nell'anziano secondo le linee guida europee 2018:", "o": ["Nessuna", "Evitare valori di sistolica minori di 130 mmHg", "Raggiungere valori di sistolica minori di 130 mmHg", "Raggiungere valori di sistolica minori di 160 mmHg", "Evitare valori di sistolica minori di 160 mmHg"], "a": 1, "c": "cardio", "w": "Nell'anziano le LG ESC 2018 raccomandano un target di sistolica 130-139 mmHg, evitando di scendere sotto 130 (rischio di ipoperfusione e cadute).", "m": "Anziano: non scendere sotto 130 di sistolica.", "f": 0, "fn": 0}, {"n": 490, "id": "301", "q": "Secondo le LG europee 2018, il trattamento dell'ipertensione nell'anziano ultraottantenne è indicato per valori di sistolica:", "o": ["Maggiori di 180 mmHg", "Non è indicato", "Maggiore di 120 mmHg", "Maggiore di 130 mmHg", "Maggiori di 160 mmHg"], "a": 4, "c": "cardio", "w": "Nell'ultraottantenne il trattamento è indicato per sistolica ≥160 mmHg (soglia più alta rispetto all'adulto, per evitare sovratrattamento).", "m": "Over 80: si tratta da sistolica ≥160.", "f": 0, "fn": 0}, {"n": 491, "id": "302", "q": "Uomo di 78 anni con BPCO, ipertensione, IPB e psoriasi, capogiro all'ortostatismo con prove di ipotensione ortostatica positive. Quale farmaco è più probabilmente implicato?", "o": ["Ramipril", "Dutasteride", "Calcipotriolo", "Salbutamolo/Formoterolo", "Terazosina"], "a": 4, "c": "cardio", "w": "La terazosina (alfa-litico per l'IPB) è la causa più probabile di ipotensione ortostatica iatrogena. Calcipotriolo (psoriasi) e broncodilatatori non la causano.", "m": "Capogiro in piedi + IPB = colpa della terazosina.", "f": 0, "fn": 0}, {"n": 492, "id": "N37", "q": "Paziente con episodi ipotensivi e iperteso: quale farmaco dai?", "o": ["ACE-inibitore", "Diuretico dell'ansa", "Alfa-litico", "Beta-bloccante"], "a": 0, "c": "cardio", "w": "In un iperteso con episodi ipotensivi (ortostatici) si preferisce l'ACE-inibitore, evitando diuretici e alfa-litici che peggiorano l'ipotensione ortostatica.", "m": "Iperteso + cali pressori: meglio l'ACE-i.", "f": 1, "fn": 1}, {"n": 493, "id": "N38", "q": "In quale tra queste condizioni NON è indicato l'uso del catetere vescicale?", "o": ["Valutazione della diuresi nel paziente in shock", "Ritenzione urinaria acuta", "Ulcera sacrale che deve restare asciutta", "Nei pazienti con demenza e infezione delle vie urinarie"], "a": 3, "c": "cute", "w": "Il catetere NON va messo in demenza + IVU (anzi favorisce le infezioni e il delirium). È indicato nello shock (monitoraggio diuresi), nella ritenzione e per tenere asciutte le ulcere sacrali.", "m": "Catetere: non per demenza+IVU (peggiora).", "f": 0, "fn": 0}, {"n": 494, "id": "N39", "q": "Mild Cognitive Impairment:", "o": ["Precede spesso la demenza e può associarsi a depressione", "È una condizione normale dell'invecchiamento", "Comporta sempre perdita dell'autonomia", "Equivale a demenza iniziale"], "a": 0, "c": "demenza", "w": "L'MCI precede spesso la demenza (rischio di conversione) e può associarsi a depressione; l'autonomia funzionale è però conservata (non è demenza).", "m": "MCI: anticamera della demenza, autonomia intatta.", "f": 0, "fn": 0}, {"n": 495, "id": "N40", "q": "Quale NON usi per valutare la malnutrizione?", "o": ["Colesterolemia", "Conta linfocitaria", "Albumina", "Ferritina"], "a": 3, "c": "nutrizione", "w": "La ferritina è un indice marziale/di flogosi, NON di malnutrizione. Per la malnutrizione si usano albumina, colesterolemia, conta linfocitaria e variazioni di peso.", "m": "Malnutrizione: albumina/colesterolo/linfociti, non la ferritina.", "f": 0, "fn": 0}, {"n": 496, "id": "N41", "q": "Cosa NON è causa di malnutrizione nel paziente con Alzheimer?", "o": ["Malassorbimento", "Riduzione dell'appetito", "Aumentata attività muscolare", "Riduzione dell'autonomia funzionale", "Nessuna delle precedenti"], "a": 0, "c": "nutrizione", "w": "Nell'Alzheimer la malnutrizione deriva da ridotto appetito, ridotta autonomia e aumentato dispendio (wandering). Il malassorbimento NON è un meccanismo tipico.", "m": "Alzheimer: mangia meno e si muove tanto, ma non malassorbe.", "f": 0, "fn": 0}, {"n": 497, "id": "N42", "q": "Quale dei seguenti è un segno obiettivo di malnutrizione?", "o": ["Cheratocono", "Ittero corneale", "Alopecia areata", "Cheilite angolare"], "a": 3, "c": "nutrizione", "w": "La cheilite angolare (ragadi agli angoli della bocca) è un segno di carenza nutrizionale (vitamine del gruppo B, ferro). Le altre opzioni non sono segni di malnutrizione.", "m": "Malnutrizione: ragadi agli angoli della bocca (cheilite).", "f": 0, "fn": 0}, {"n": 498, "id": "N45", "q": "Cosa c'è nel Parkinson?", "o": ["Bradicinesia + tremore a riposo e/o ipertono plastico", "Tremore intenzionale e atassia", "Ipertono spastico e iperreflessia", "Corea e movimenti rapidi"], "a": 0, "c": "parkinson", "w": "Il Parkinson è definito dalla bradicinesia associata a tremore a riposo e/o rigidità plastica (a ruota dentata). Spasticità e atassia non ne fanno parte.", "m": "Parkinson = bradicinesia + tremore a riposo / rigidità plastica.", "f": 0, "fn": 0}, {"n": 499, "id": "N62", "q": "La perd const MODES=[{l:"10 domande",n:10},{l:"15 domande",n:15},{l:"20 domande",n:20},{l:"30 domande",n:30}];
const SIM=31;
const LS="quiz-geriatria-hist";
const LS_WRONG="quiz-geriatria-wrong";
function loadW(){try{return JSON.parse(localStorage.getItem(LS_WRONG)||"{}")}catch(e){return{}}}
function saveW(w){try{localStorage.setItem(LS_WRONG,JSON.stringify(w))}catch(e){}}
const CMAP={}; CATS.forEach(c=>CMAP[c[0]]={icon:c[1],name:c[2]});

function loadH(){try{return JSON.parse(localStorage.getItem(LS)||"{}")}catch(e){return{}}}
function saveH(h){try{localStorage.setItem(LS,JSON.stringify(h))}catch(e){}}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function wShuffle(pool,h){
  const mx=Math.max(1,...Object.values(h));
  return pool.map(q=>({q,w:(mx-(h[q.n]||0)+1)*Math.random()}))
    .sort((a,b)=>b.w-a.w).map(x=>x.q);
}

let S={screen:"home",tab:"rand",cat:null,size:null,sim:false,wrongMode:false,
  list:[],i:0,sel:null,done:false,ans:[],h:loadH()};

function set(p){S=Object.assign(S,p);render();window.scrollTo({top:0,behavior:S.screen==="quiz"?"instant":"auto"})}

function start(n,cat,sim){
  let pool=cat?Q.filter(q=>q.c===cat):Q.slice();
  const list=wShuffle(pool,S.h).slice(0,Math.min(n,pool.length));
  set({screen:"quiz",list,i:0,sel:null,done:false,ans:[],size:n,cat:cat||null,sim:!!sim});
}
function startWrong(){
  const w=loadW();
  const pool=Q.filter(q=>w[q.n]);
  if(!pool.length){alert("Nessun errore salvato al momento!");return;}
  const list=wShuffle(pool,S.h).slice(0,Math.min(pool.length,30));
  set({screen:"quiz",list,i:0,sel:null,done:false,ans:[],size:list.length,cat:null,sim:false,wrongMode:true});
}
function pick(i){if(!S.done)set({sel:i})}
function commit(){
  if(S.sel===null)return;
  const q=S.list[S.i];
  const h=Object.assign({},S.h);h[q.n]=(h[q.n]||0)+1;saveH(h);
  const w=loadW();
  if(S.sel!==q.a){w[q.n]=1;}else{delete w[q.n];}
  saveW(w);
  set({done:true,h,ans:S.ans.concat([{n:q.n,sel:S.sel,a:q.a}])});
}
function next(){ S.i+1>=S.list.length?set({screen:"result"}):set({i:S.i+1,sel:null,done:false}) }

function render(){
  const A=document.getElementById("app");
  const v={home:home,quiz:quiz,result:result}[S.screen]||home;
  A.innerHTML=v();
  A.firstChild&&A.firstChild.classList&&A.firstChild.classList.add("fade");
}

function home(){
  const h=S.h, seen=Object.keys(h).length, tot=Object.values(h).reduce((a,b)=>a+b,0);
  const cov=Math.round(seen/Q.length*100);
  let out='<header class="hero"><div class="mark">G</div><h1>Quiz di Geriatria</h1>'+
    '<p class="sub"><b>'+Q.length+'</b> domande · spiegazioni ragionate · memo</p></header>';
  if(tot>0){
    out+='<section class="stats num" aria-label="Progressi">'+
      '<div class="stat"><div class="v" style="color:var(--accent-ink)">'+seen+'</div><div class="l">viste</div></div>'+
      '<div class="stat"><div class="v" style="color:var(--accent)">'+cov+'%</div><div class="l">copertura</div></div>'+
      '<div class="stat"><div class="v" style="color:#7a8a52">'+tot+'</div><div class="l">risposte</div></div></section>';
  }
  out+='<nav class="tabs" role="tablist">'+
    '<button class="tab'+(S.tab==="rand"?" on":"")+'" role="tab" onclick="set({tab:\'rand\'})">Casuali</button>'+
    '<button class="tab'+(S.tab==="cat"?" on":"")+'" role="tab" onclick="set({tab:\'cat\'})">Per argomento</button></nav>';
  if(S.tab==="rand"){
    if(tot===0){
      out+='<div class="empty"><div class="ttl">Inizia quando vuoi</div>'+
        '<p>Scegli quante domande affrontare. Le domande già viste tornano meno spesso, così copri tutto il programma.</p></div>';
    }
    out+='<p class="eyebrow">Sessione rapida</p>';
    out+=MODES.map(m=>'<button class="btn" onclick="start('+m.n+',null,false)">'+m.l+'<span class="arr">→</span></button>').join("");
    out+='<p class="eyebrow" style="margin-top:18px">Ripasso mirati</p>';
  const wCount=Object.keys(loadW()).length;
  out+='<button class="btn btn-wrong" onclick="startWrong()">🔁 Ripeti gli errori'+(wCount>0?' <span class="wbadge">'+wCount+'</span>':'')+'<span class="arr">→</span></button>';
  if(!wCount) out+='<p style="color:var(--faint);font-size:12px;margin:-4px 4px 6px">Qui appariranno le domande che hai sbagliato.</p>';
  out+='<p class="eyebrow" style="margin-top:14px">Modalità esame</p>'+
      '<button class="btn btn-sim" onclick="start('+SIM+',null,true)">Simulazione d\u2019esame · '+SIM+' domande<span class="arr" style="color:rgba(255,255,255,.7)">→</span></button>'+
      '<p style="color:var(--faint);font-size:12px;margin:2px 4px 0">A fine simulazione ricevi un voto in trentesimi.</p>';
  } else {
    out+='<p class="eyebrow">'+CATS.length+' argomenti</p>';
    out+=CATS.map(c=>{
      const ids=Q.filter(q=>q.c===c[0]), n=ids.length, done=ids.filter(q=>h[q.n]).length;
      const pct=Math.round(done/n*100), R=15.5, C=2*Math.PI*R, off=C*(1-pct/100);
      return '<button class="cat" onclick="set({screen:\'home\'});start('+Math.min(15,n)+',\''+c[0]+'\',false)">'+
        '<span class="ico">'+c[1]+'</span>'+
        '<span class="body"><span class="nm">'+esc(c[2])+'</span><span class="ct num">'+n+' domande · '+done+' viste</span></span>'+
        '<svg class="ring num" viewBox="0 0 36 36"><circle cx="18" cy="18" r="'+R+'" fill="none" stroke="var(--line)" stroke-width="3"/>'+
        '<circle cx="18" cy="18" r="'+R+'" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" '+
        'stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 18 18)"/>'+
        '<text x="18" y="21" text-anchor="middle">'+pct+'</text></svg></button>';
    }).join("");
    out+='<p style="color:var(--faint);font-size:12px;margin:4px 4px 0">Ogni argomento parte con un set breve; tocca di nuovo per ripetere.</p>';
  }
  if(tot>0)out+='<button class="btn btn-ghost" style="margin-top:18px" onclick="resetH()">Azzera lo storico</button>';
  out+='<p class="foot">Le domande provengono dal file condiviso di Geriatria.<br>Le risposte segnate ⚠️ meritano una verifica con le slide.</p>';
  return out;
}

function quiz(){
  const q=S.list[S.i], cat=CMAP[q.c]||{icon:"",name:""};
  const pct=((S.i+(S.done?1:0))/S.list.length*100);
  const right=S.done&&S.sel===q.a;
  let out='<div class="topbar"><div class="pos num">'+(S.i+1)+' / '+S.list.length+
    ' <span class="cat-tag">· '+cat.icon+'</span></div><div class="right">'+
    (q.f?'<span class="flagb">⚠️ da verificare</span>':'')+'<span class="qid num">#'+esc(q.id)+'</span></div></div>';
  out+='<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div>';
  out+='<div class="qcard"><p class="qtext">'+esc(q.q)+'</p></div>';
  out+=q.o.map((o,i)=>{
    let cls="opt";
    if(!S.done&&S.sel===i)cls+=" sel";
    if(S.done&&i===q.a)cls+=" ok";
    if(S.done&&S.sel===i&&i!==q.a)cls+=" ko";
    const mk=S.done?(i===q.a?'<span class="mk">✓</span>':(S.sel===i?'<span class="mk">✗</span>':'')):'';
    return '<button class="'+cls+'"'+(S.done?' disabled':'')+' onclick="pick('+i+')">'+
      '<span class="lab">'+String.fromCharCode(65+i)+'</span><span class="tx">'+esc(o)+'</span>'+mk+'</button>';
  }).join("");
  if(S.done){
    out+='<div class="exp '+(right?"is-ok":"is-ko")+'"><div class="head">'+
      (right?'<span>✓</span> Risposta corretta':'<span>✗</span> Corretta: '+String.fromCharCode(65+q.a)+'. '+esc(q.o[q.a]))+'</div>'+
      '<p class="why"><span class="k">Perché: </span>'+esc(q.w)+'</p>'+
      '<div class="memo"><span class="t">Memo</span>'+esc(q.m)+'</div>'+
      (q.f?'<div class="note">'+(q.fn===2?'<b>⚠️ Domanda integrata: </b>nel documento originale erano riportati solo la risposta e/o opzioni incomplete — enunciato e opzioni completati. Verifica sul documento originale.':'<b>⚠️ Attenzione: </b>questa risposta segue l’evidenziazione del file, ma è clinicamente discutibile o ambigua. Controlla il documento originale (e le slide del docente).')+'</div>':'')+
      '</div>';
  }
  out+='<button class="btn btn-primary" '+(S.done?'':(S.sel===null?'disabled ':''))+'onclick="'+(S.done?'next()':'commit()')+'">'+
    (S.done?(S.i+1>=S.list.length?'Vedi risultati →':'Avanti →'):'Conferma risposta')+'</button>';
  out+='<button class="btn btn-ghost" onclick="if(confirmLeave())set({screen:\'home\'})">Esci dalla sessione</button>';
  return out;
}
function confirmLeave(){return S.ans.length===0||window.confirm("Uscire dalla sessione? I progressi sulle domande viste restano salvati.")}

function result(){
  const tot=S.list.length, score=S.ans.filter(a=>a.sel===a.a).length, pct=Math.round(score/tot*100);
  const wrong=S.ans.filter(a=>a.sel!==a.a);
  const cat=S.cat?CMAP[S.cat]:null;
  let emo,msg;
  if(pct>=80){emo="🎯";msg="Ottimo lavoro"}else if(pct>=60){emo="📈";msg="Ci sei quasi"}else{emo="📚";msg="Si può migliorare"}
  let out='<div class="result"><div class="emo">'+emo+'</div><h1>'+msg+'</h1>'+(S.wrongMode?'<p class="catline">🔁 Sessione errori</p>':'')+
    (cat?'<p class="catline">'+cat.icon+' '+esc(cat.name)+'</p>':'')+
    (S.sim?'<div class="grade num" style="color:var(--accent-ink)">'+Math.max(0,Math.round(pct/100*30))+'<small>/30</small></div>':
           '<div class="grade num" style="color:var(--accent-ink)">'+pct+'<small>%</small></div>')+
    '<p class="pct num">'+score+' corrette su '+tot+(S.sim?' · '+pct+'%':'')+'</p>'+
    (pct===100?'<div class="lode">en plein — 30 e lode</div>':'')+'</div>';
  if(wrong.length){
    out+='<div class="sectitle"><span style="color:var(--ko)">✗</span> Da rivedere ('+wrong.length+')</div>';
    out+=wrong.map(a=>{
      const q=Q.find(x=>x.n===a.n);
      return '<div class="wrong"><div class="wtop"><span class="qid num">#'+esc(q.id)+'</span>'+
        (q.f?'<span class="flagb">'+(q.fn===2?'✎ integrata':'⚠️ da verificare')+'</span>':'')+'</div>'+
        '<div class="wq">'+esc(q.q)+'</div>'+
        '<div class="ans ko">✗ '+esc(q.o[a.sel])+'</div>'+
        '<div class="ans ok">✓ '+esc(q.o[q.a])+'</div>'+
        '<div class="wwhy"><span class="k">Perché: </span>'+esc(q.w)+'</div>'+
        '<div class="memo"><span class="t">Memo</span>'+esc(q.m)+'</div></div>';
    }).join("");
  } else {
    out+='<div class="empty" style="margin-top:22px"><div class="ttl">Nessun errore</div><p>Tutte corrette in questa sessione.</p></div>';
  }
  out+='<div class="row"><button class="btn btn-primary" onclick="start('+S.size+','+(S.cat?("'"+S.cat+"'"):"null")+','+(S.sim?'true':'false')+')">Nuova sessione</button>'+
    '<button class="btn" onclick="set({screen:\'home\'})">Home</button></div>';
  return out;
}

function resetH(){ if(window.confirm("Azzerare lo storico delle domande viste?")){localStorage.removeItem(LS);S.h={};render()} }

window.set=set;window.start=start;window.startWrong=startWrong;window.pick=pick;window.commit=commit;window.next=next;window.resetH=resetH;window.confirmLeave=confirmLeave;
render();
</script>
</body>
</html>
