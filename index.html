 in un paziente con malnutrizione:", "o": ["Infezioni", "Cadute", "Infarto", "Danno da pressione", "La versione originale e completa della domanda dovrebbe essere la 103, confronta!"], "a": 2, "c": "cadute", "w": "La malnutrizione aumenta rischio di infezioni, cadute e lesioni da pressione, ma NON l'infarto miocardico.", "m": "Malnutrizione: infezioni e piaghe, non l'infarto.", "f": 0, "fn": 0}, {"n": 231, "id": "261", "q": "A quale stadio corrisponde un’ulcera che interessa il sottocute:", "o": ["Stadio 1", "Stadio 2", "Stadio 3", "Stadio 4"], "a": 2, "c": "cute", "w": "Un'ulcera che interessa il sottocute (a tutto spessore, fino alla fascia) è di stadio 3.", "m": "Sottocute esposto = stadio 3.", "f": 0, "fn": 0}, {"n": 232, "id": "262", "q": "Quale di queste non è una caratteristica del Parkinson:", "o": ["Paralisi flaccida", "Paralisi spastica", "Tremore", "Bradicinesia"], "a": 1, "c": "parkinson", "w": "La paralisi/ipertono SPASTICO non è del Parkinson (che ha rigidità PLASTICA, a \"ruota dentata\"). La spasticità è un segno piramidale.", "m": "Parkinson = rigidità plastica, non spastica.", "f": 0, "fn": 0}, {"n": 233, "id": "263", "q": "quale delle seguenti non è una condizione generalmente associata alla demenza multi-infartuale?", "o": ["anamnesi di ipertensione arteriosa", "anamnesi di ipercolesterolemia", "anamnesi di attacchi ischemici cerebrali transitori", "andamento ‘’a gradini’’", "prevalente deficit di memoria E’ la più tipica di AD, mentre le altre sono più associate a vascolare"], "a": 4, "c": "demenza", "w": "Il prevalente deficit di memoria è tipico dell'Alzheimer, NON della demenza multinfartuale (vascolare), che ha andamento \"a gradini\" e fattori di rischio vascolari (ipertensione, dislipidemia, TIA).", "m": "Memoria in primo piano = Alzheimer, non vascolare.", "f": 0, "fn": 0}, {"n": 234, "id": "264", "q": "Qual è una frattura pertrocanterica ?", "o": ["Della diafisi", "extracapsulare", "intracapsulare", "nessuna"], "a": 1, "c": "ossa", "w": "La frattura pertrocanterica è EXTRAcapsulare (sotto la capsula articolare), a differenza delle fratture del collo femorale che sono intracapsulari.", "m": "Pertrocanterica = extracapsulare.", "f": 0, "fn": 0}, {"n": 235, "id": "265", "q": "Delirium ipercinetico:", "o": ["È misconosciuto in ospedale,", "è il più facile da diagnosticare", "è il più frequente", "è di difficile diagnosi nel paziente anziano."], "a": 1, "c": "demenza", "w": "Il delirium ipercinetico (forma iperattiva, agitazione) è il più facile da diagnosticare; il subdolo è l'ipoattivo. Non è però il più frequente.", "m": "Delirium agitato = il più riconoscibile.", "f": 0, "fn": 0}, {"n": 236, "id": "266", "q": "Giovanni 83 anni, affetto da decadimento cognitivo di grado moderato, si reca ad una visita geriatrica di controllo. In anamnesi risultano inoltre: sintomatologia ansiosa in trattamento con trazodone, insufficienza renale di grado moderato, ipertensione arteriosa in terapia con Ramipril. In visita si rileva una pressione arteriosa di 170/100 mmHg. Non effettua misurazioni di pressione a domicilio. Cosa consigli?", "o": ["Esecuzione di monitoraggio pressorio nelle 24 h per rivalutazione del controllo pressorio", "Sospensione di Ramipril", "Introduzione di Furosemide", "Introduzione di Amlodipina", "Esecuzione di TC encefalo Potrebbe essere utile il monitoraggio per escludere un episodio di ipertensione da camice bianco che porterebbe a sovrastimare la PA ed eccedere nella terapia antipertensiva aumentando il rischio di ipotensione."], "a": 0, "c": "demenza", "w": "In un anziano con decadimento moderato e PA da rivalutare, è utile il monitoraggio pressorio 24h (per escludere effetto camice bianco ed evitare sovratrattamento), prima di modificare la terapia.", "m": "Prima di ritoccare la pressione: ABPM 24h.", "f": 0, "fn": 0}, {"n": 237, "id": "267", "q": "Nel paziente anziano la creatinina:", "o": ["È spesso bassa a causa di un aumento della sua escrezione renale", "È un marker di funzione renale molto sensibile", "Non viene mai utilizzata come indicatore della funzione renale", "Tende ad aumentare per un aumento della sua produzione"], "a": 0, "c": "rene", "w": "Il file indica che nell'anziano la creatinina è spesso bassa (A). ⚠️ La motivazione corretta è la ridotta PRODUZIONE da scarsa massa muscolare (non l'aumentata escrezione): il valore basso può mascherare un deficit renale.", "m": "⚠️ Creatinina bassa nell'anziano = poco muscolo, non più escrezione.", "f": 1, "fn": 1}, {"n": 238, "id": "268", "q": "in quale dei seguenti pazienti è controindicato il massaggio dei seni carotidei:", "o": ["pz con storia di ictus nelle 4 sett precedenti", "pz con insuff mitralica moderata", "il massaggio dei seni non ha controindicazioni", "pz con sincope vasovagale", "pz con stenosi carotidea del 45%"], "a": 0, "c": "cadute", "w": "Il massaggio dei seni carotidei è controindicato in chi ha avuto un ictus/TIA nelle 3-4 settimane precedenti (e con stenosi carotidea significativa/soffi), per il rischio embolico.", "m": "Ictus recente = niente massaggio carotideo.", "f": 0, "fn": 0}, {"n": 239, "id": "269", "q": "Cosa comprende la valutazione iniziale del pz con sincope:", "o": ["Anamnesi EO, ECG e prove ipotensione orto", "Anamnesi EO, prove ipotens orto e tilt test", "Anamnesi EO", "Anamnesi EO, ECG", "Anamnesi EO, ECG, ipotens orto e tilt test Da slides Anamnesi Esame obiettivo PA clino- e ortostatismo ECG 12 derivazioni"], "a": 0, "c": "cadute", "w": "La valutazione iniziale della sincope comprende anamnesi, esame obiettivo, ECG a 12 derivazioni e misurazione della PA in clino- e ortostatismo. Tilt test e massaggio sono di secondo livello.", "m": "Sincope, primo step: anamnesi + EO + ECG + PA ortostatica.", "f": 0, "fn": 0}, {"n": 240, "id": "270", "q": "Nel soggetto anziano con FA l’opzione “ablate and pace” è indicata nella seguente condizione:", "o": ["sogg sintomatici per elevata frequenza ventricolare nonostante terapia farmacologica massimale", "solo in caso di FA cronica e bradiaritmia sintomatica", "In tutti i soggetti con FE<50 %", "In tutti gli ultraottantenni", "nessuna confermata sulla scorta delle linee guida ESC"], "a": 0, "c": "cardio", "w": "La strategia \"ablate and pace\" (ablazione del nodo AV + pacemaker) si usa nei pazienti sintomatici per elevata frequenza ventricolare nonostante terapia farmacologica massimale.", "m": "Ablate-and-pace: FA non controllabile coi farmaci.", "f": 0, "fn": 0}, {"n": 241, "id": "271", "q": "L’ecg in corso di FA mostra:", "o": ["Variabilità morfologia QRS", "Allungamento PR", "QRS largo", "Presenza incostante onda P", "Nessuna"], "a": 4, "c": "cardio", "w": "In FA l'ECG mostra assenza dell'onda P e intervalli R-R irregolari; le singole affermazioni proposte sono imprecise → nessuna.", "m": "FA = niente P + ritmo irregolare.", "f": 0, "fn": 0}, {"n": 242, "id": "272", "q": "Quale di queste NON è un’indicazione all’impianto di loop recorder?", "o": ["Storia di ictus criptogenetico", "Storia di sincope post minzionale recidivante", "Ipotens ortostatica asintomatica", "Diagnosi di sindrome carotidea cardioinibitoria", "storia di caduta accidentale in paziente con Parkinson Direi che la sindrome carotidea non è un'indicazione: nella lezione dicono espressamente che si mette per sincopi di cui non sia chiara la diagnosi, senza considerare che la sindrome carotidea non ha origine criptogenico"], "a": 3, "c": "cadute", "w": "La sindrome del seno carotideo cardioinibitoria NON è indicazione al loop recorder: ha già una diagnosi e una terapia (pacemaker). Il loop serve per sincopi inspiegate/aritmiche e ictus criptogenetico.", "m": "Loop recorder: per il mistero, non per ciò che hai già diagnosticato.", "f": 0, "fn": 0}, {"n": 243, "id": "272bis", "q": ") Quale delle seguenti non rappresenta una indicazione all'impianto di loop recorder (monitoraggio cardiaco impiantabile) :", "o": ["storia di sincope inspiegata e traumatica", "PAZIENTE CON diagnosi di sindrome seno carotidea cardioinibitoria", "storia di ictus criptogenetico", "a + b", "a + c"], "a": 1, "c": "cadute", "w": "La sindrome del seno carotideo cardioinibitoria NON è indicazione al loop recorder: ha già una diagnosi e una terapia (pacemaker). Il loop serve per sincopi inspiegate/aritmiche e ictus criptogenetico.", "m": "Loop recorder: per il mistero, non per ciò che hai già diagnosticato.", "f": 0, "fn": 0}, {"n": 244, "id": "274", "q": "Quali di queste NON è una manifestazione tardiva del Parkinson?", "o": ["freezing", "on-off", "discinesie", "sindrome delle gambe senza riposo", "fluttuazioni motorie"], "a": 3, "c": "parkinson", "w": "La sindrome delle gambe senza riposo NON è una manifestazione tardiva del Parkinson. Le complicanze tardive (da levodopa) sono freezing, fenomeno on-off, discinesie e fluttuazioni motorie.", "m": "Tardive del Parkinson: on-off, discinesie, freezing.", "f": 0, "fn": 0}, {"n": 245, "id": "275bis", "q": ") Quale delle seguenti condizioni costituisce una controindicazione assoluta al warfarin nell'anziano:", "o": ["Impossibilità di gestire correttamente la terapia farmacologica", "Presenza di microsanguinamenti alla RMN encefalo", "Storia di ematoma subdurale post traumatico", "Insufficienza renale cronica", "Storia di cadute"], "a": 0, "c": "cadute", "w": "La controindicazione assoluta al warfarin è l'impossibilità di gestire correttamente la terapia (no monitoraggio INR affidabile, no aderenza). Cadute, microsanguinamenti e IRC sono cautele relative.", "m": "No warfarin se non puoi gestirlo/monitorarlo.", "f": 0, "fn": 0}, {"n": 246, "id": "278", "q": "Il centro diurno per anziani accoglie generalmente anziani con:", "o": ["disturbi cognitivi e/o condizioni disabilitanti associati a ottimo supporto familiare", "disturbi cognitivi e/o condizioni disabilitanti associati a difficoltà di assistenza a domicilio", "buona autonomia e isolamento sociale", "necessità di compagnia", "patologia psichiatrica"], "a": 1, "c": "demenza", "w": "L'inserimento in struttura è indicato per disturbi cognitivi e/o condizioni disabilitanti associati a difficoltà di assistenza a domicilio (non basta la sola disabilità con buon supporto familiare).", "m": "In RSA quando casa non ce la fa più.", "f": 0, "fn": 0}, {"n": 247, "id": "279", "q": "Indicare la causa di parkinsonismo secondario più frequente nel paziente anziano:", "o": ["metabolico", "da farmaci", "Vascolare", "Tumorale"], "a": 0, "c": "parkinson", "w": "Il file indica come causa più frequente di parkinsonismo secondario nell'anziano quella metabolica (A). ⚠️ Classicamente il parkinsonismo secondario più comune è quello iatrogeno (da farmaci: antipsicotici, procinetici): verifica con le slide del docente.", "m": "⚠️ Da verificare: di solito il parkinsonismo secondario più frequente è da farmaci.", "f": 1, "fn": 1}, {"n": 248, "id": "280", "q": "le conseguenze dell’allettamento sono:", "o": ["fratture", "malnutrizione da eccesso", "sarcopenia", "tutte"], "a": 3, "c": "fragilita", "w": "Le conseguenze dell'allettamento prolungato sono molteplici: sarcopenia/decondizionamento, lesioni da pressione, malnutrizione, TVP, fratture da fragilità → tutte.", "m": "Allettamento = danni a catena (muscoli, piaghe, trombi).", "f": 0, "fn": 0}, {"n": 249, "id": "281", "q": "l’encefalopatia ipertensiva aterosclerotica è dovuta a:", "o": ["ipertensione", "crisi ipotensive", "entrambe"], "a": 2, "c": "cardio", "w": "L'encefalopatia ipertensiva aterosclerotica (leucoencefalopatia vascolare) è legata sia ai valori ipertensivi cronici sia alle crisi ipotensive (ipoperfusione della sostanza bianca) → entrambe.", "m": "Danno della sostanza bianca: pressione alta + cali pressori.", "f": 0, "fn": 0}, {"n": 250, "id": "282", "q": "trattamento con statine cosa controllare", "o": ["funzione renale", "epatica", "cpk", "a+c", "A+B+C"], "a": 4, "c": "cardio", "w": "In terapia con statine vanno controllate funzione epatica (transaminasi) e CPK (muscolo); nell'anziano si valuta anche la funzione renale → tutte le precedenti.", "m": "Statine: controlla fegato, CPK (e rene nell'anziano).", "f": 0, "fn": 0}, {"n": 251, "id": "282bis", "q": "Trattamento con statine: cosa controllare?", "o": ["Funzione renale", "Funzione epatica e CPK", "Funzione epatica, CPK e renale", "Tutte le precedenti"], "a": 3, "c": "cardio", "w": "In terapia con statine vanno controllate funzione epatica (transaminasi) e CPK (muscolo); nell'anziano si valuta anche la funzione renale → tutte le precedenti.", "m": "Statine: controlla fegato, CPK (e rene nell'anziano).", "f": 1, "fn": 1}, {"n": 252, "id": "283", "q": "il delirium può essere dovuto:", "o": ["uno stato di demenza", "episodio infettivo acuto", "uno stato allucinatorio", "tutte"], "a": 3, "c": "demenza", "w": "Il delirium può essere scatenato da molte cause: episodio infettivo acuto, demenza di base, farmaci, disidratazione, ecc. → tutte.", "m": "Delirium = causa multifattoriale (infezioni, farmaci, demenza...).", "f": 0, "fn": 0}, {"n": 253, "id": "284", "q": "Quali delle seguenti formule sono state validate nel pz anziano:", "o": ["cockroft- MDRD b) CKD-EPIcreatinina e CKD EPIcistatina", "CKD EPIcistatina e CKD EPIcistatina/ creatinina", "BIS", "nessuna"], "a": 2, "c": "rene", "w": "Le formule BIS (Berlin Initiative Study) sono state validate specificamente nell'anziano per la stima del filtrato.", "m": "Anziano: formule BIS, fatte apposta per loro.", "f": 0, "fn": 0}, {"n": 254, "id": "285", "q": "che cos’è il “reverse-dipper”?", "o": ["Aumento della pressione media notturna >20% rispetto alla diurna", "Aumento della pressione media notturna rispetto alla diurna", "Riduzione della pressione media notturna rispetto alla diurna"], "a": 1, "c": "cardio", "w": "Il \"reverse-dipper\" è l'aumento della pressione media notturna rispetto a quella diurna (la pressione di notte sale invece di scendere), pattern ad alto rischio CV.", "m": "Reverse-dipper: di notte la pressione SALE.", "f": 0, "fn": 0}, {"n": 255, "id": "287", "q": "La legge sul testamento biologico (DAT):", "o": ["È entrata in vigore l'1/01/2018", "Può essere comunicata per posta all'ufficio dello stato civile del comune di residenza", "Non prevede la nomina di un fiduciario da parte del disponente", "A e B", "Il disponente può scrivere le disposizioni anticipate di trattamento"], "a": 4, "c": "cure", "w": "La legge sulle DAT (testamento biologico) consente al disponente di scrivere le proprie disposizioni anticipate di trattamento; prevede un fiduciario e non si invia per posta.", "m": "DAT: le scrivi tu, con un fiduciario.", "f": 0, "fn": 0}, {"n": 256, "id": "288", "q": "la legge sul testamento sulle DAT:", "o": ["conferisce valore alla testimonianza verbale raccolta dal familiare in presenza di due o più persone", "prevede anche la pianificazione condivisa delle cure in corso di malattia cronica", "prevede che la dat possa essere inviata per posta all'ufficiale dello stato civile del comune di residenza", "non prevede la nomina di un fiduciario da parte del disponente", "Nessuna delle precedenti"], "a": 1, "c": "cure", "w": "La legge sulle DAT prevede anche la pianificazione condivisa delle cure in corso di malattia cronica (oltre alle disposizioni anticipate vere e proprie).", "m": "DAT: anche la pianificazione condivisa nella cronicità.", "f": 0, "fn": 0}, {"n": 257, "id": "289", "q": "Chi può svolgere la carica di amministratore di sostegno:", "o": ["Solo un familiare", "Anche un familiare", "Mai un familiare", "Figlio di almeno 18 anni", "Giudice tutelare La DAT è entrata in vigore il 31 gennaio 2018, per legge prevede anche la pianificazione condivisa delle cure in corso di malattia CRONICA e non può essere inviata per posta. L'amministratore di sostegno viene nominato dal giudice tutelare e non per forza deve essere un figlio o un familiare (anche un convivente per esempio)."], "a": 1, "c": "varie", "w": "L'amministratore di sostegno può essere anche un familiare (ma non necessariamente); viene nominato dal giudice tutelare.", "m": "Amministratore di sostegno: anche un familiare, nominato dal giudice.", "f": 0, "fn": 0}, {"n": 258, "id": "290", "q": "Quando una caduta è sospetta per sincope:", "o": ["il paziente non sa riferire nel dettaglio la caduta", "il paziente non ha attuato le manovre paracadute", "il paziente non ha un disturbo della deambulazione", "A+B", "A+C"], "a": 3, "c": "cadute", "w": "Una caduta è sospetta per sincope quando il paziente non sa riferire i dettagli (amnesia) e non ha attuato le manovre paracadute → A+B.", "m": "Caduta = sincope se non ricorda e non si è protetto.", "f": 0, "fn": 0}, {"n": 259, "id": "291", "q": "L'STS score in cardiochirurgia:", "o": ["Stima il rischio di mortalità operatoria", "Stima il rischio di Stroke legato all'intervento", "Tiene conto della funzione renale espressa come formula di Cockroft-Gault", "Tutte le precedenti", "Sono vere A e B"], "a": 4, "c": "rene", "w": "L'STS score in cardiochirurgia stima il rischio di mortalità operatoria e di stroke legato all'intervento → vere A e B.", "m": "STS score: rischio di morte e di ictus operatorio.", "f": 0, "fn": 0}, {"n": 260, "id": "292", "q": "(domanda file vecchio) riguardo alle statine si può senza dubbio affermare che:", "o": ["le statine presentano un’aumentata tossicità nell'anziano", "le statine possono causare danni epatici e muscolari irreversibili", "ci vuole cautela nella somministrazione di statine in pazienti anziani, fragili, polipatologici e in politerapia", "Tutte le precedenti"], "a": 3, "c": "fragilita", "w": "Sulle statine nell'anziano si può affermare con certezza che serve cautela nei pazienti fragili, polipatologici e in politerapia, per rischio di tossicità ed effetti epato-muscolari → tutte le precedenti.", "m": "Statine nel fragile: usale con prudenza.", "f": 0, "fn": 0}, {"n": 261, "id": "297", "q": "L’ipertensione sistolica isolata è dovuta prevalentemente a:", "o": ["nessuna delle risposte è corretta", "ipertrofia della muscolatura liscia vasale", "rigidità dei grandi vasi arteriosi", "aumento resistenze periferiche", "circolo iperdinamico"], "a": 2, "c": "cardio", "w": "L'ipertensione sistolica isolata dell'anziano è dovuta prevalentemente alla rigidità dei grandi vasi arteriosi (perdita di elasticità → sistolica alta, diastolica normale/bassa).", "m": "Sistolica isolata = arterie rigide.", "f": 0, "fn": 0}, {"n": 262, "id": "298", "q": "il trattamento di prima linea nelle sincopi riflesse non gravi e non ricorrenti è: a.impianto di pacemaker", "o": ["limitazione della attività sportiva", "misure comportamentali", "midodrina", "tilt training"], "a": 1, "c": "cadute", "w": "Il trattamento di prima linea delle sincopi riflesse non gravi e non ricorrenti è costituito dalle misure comportamentali/educazione (idratazione, sale, manovre di contropressione, evitare i trigger). Farmaci e pacemaker sono per le forme gravi/ricorrenti.", "m": "Sincope riflessa lieve: prima educazione e misure fisiche.", "f": 0, "fn": 0}, {"n": 263, "id": "N1", "q": "Quali farmaci possono dare Insufficienza Renale Acuta?", "o": ["ACE-i", "B-bloccanti", "Triciclici", "Oppioidi"], "a": 0, "c": "cardio", "w": "Tra i farmaci che possono causare IRA ci sono gli ACE-inibitori (riducono la pressione di filtrazione glomerulare dilatando l'arteriola efferente), soprattutto in ipovolemia o stenosi dell'arteria renale.", "m": "ACE-i + rene \"a rischio\" = possibile IRA.", "f": 0, "fn": 0}, {"n": 264, "id": "N2", "q": "Quale farmaco non consiglieresti in paziente con IPB ad alto reflusso post-minzionale?", "o": ["Alfa-litici", "B-bloccanti", "ACE-i", "Antidepressivi Triciclici"], "a": 3, "c": "cardio", "w": "Negli uomini con IPB e alto residuo post-minzionale vanno evitati gli antidepressivi triciclici (effetto anticolinergico → ritenzione urinaria/ritenzione acuta).", "m": "IPB: niente triciclici (chiudono la pipì).", "f": 0, "fn": 0}, {"n": 265, "id": "N3", "q": "In quale forma di ipertensione si trovano calcificazioni vascolari?", "o": ["Ipertensione clinostatica", "Ipertensione da iperaldosteronismo", "Pseudoipertensione", "Ipertensione nefrovascolare"], "a": 2, "c": "cardio", "w": "Le calcificazioni vascolari rendono l'arteria poco comprimibile e causano la pseudoipertensione (PA sfigmica falsamente alta, segno di Osler positivo).", "m": "Arterie calcifiche → pseudoipertensione.", "f": 0, "fn": 0}, {"n": 266, "id": "N4", "q": "Paziente iperteso con decadimento cognitivo:", "o": ["Controllo pressorio intensivo per rallentare la progressione", "Bassi livelli di PA aumentano il rischio di progressione del decadimento", "Alti livelli di PA aumentano il rischio di progressione del decadimento"], "a": 2, "c": "demenza", "w": "Nell'iperteso con decadimento cognitivo, alti livelli di pressione (cronicamente) aumentano il rischio di progressione del danno cognitivo (danno della sostanza bianca). Va però evitata anche l'ipotensione.", "m": "Pressione alta cronica = cervello che peggiora.", "f": 0, "fn": 0}, {"n": 267, "id": "N5", "q": "Il paziente anziano con fibrillazione atriale è a rischio di:", "o": ["Ictus cardioembolico, Scompenso cardiaco e demenza", "Scompenso cardiaco", "Ulcere da pressione", "Ictus cardioembolico e demenza", "Ulcere da pressione e demenza"], "a": 3, "c": "demenza", "w": "Il paziente anziano con FA è a rischio di ictus cardioembolico e demenza (microembolie/ipoperfusione). Per questo l'anticoagulazione è cruciale.", "m": "FA = ictus + demenza (oltre allo scompenso).", "f": 0, "fn": 0}, {"n": 268, "id": "N6", "q": "Chi fa parte dell’unità di valutazione multidimensionale?", "o": ["Sempre geriatra e infermiere", "Sempre geriatra", "Sempre assistente sociale e infermiere", "Medico, infermiere e assistente sociale"], "a": 3, "c": "fragilita", "w": "L'Unità di Valutazione Multidimensionale (UVM) comprende almeno medico (geriatra), infermiere e assistente sociale (team multiprofessionale).", "m": "UVM: medico + infermiere + assistente sociale.", "f": 0, "fn": 0}, {"n": 269, "id": "N7", "q": "Non è causa di malnutrizione nel pz con Alzheimer:", "o": ["Malassorbimento", "Riduzione appetito", "Ridotta autonomia funzionale", "Aumentata attività muscolare", "Nessuna delle precedenti"], "a": 4, "c": "demenza", "w": "Nell'Alzheimer la malnutrizione deriva da ridotto appetito, ridotta autonomia funzionale e aumento del dispendio energetico (affaccendamento/wandering): nel quesito tutte le opzioni contribuiscono → \"nessuna delle precedenti\" è la corretta.", "m": "Alzheimer: mangia meno e consuma di più (wandering).", "f": 0, "fn": 0}, {"n": 270, "id": "N8", "q": "Non è tra gli effetti collaterali comuni degli ACE-i:", "o": ["Bradicardia", "Tosse", "Angioedema", "Ipotensione", "Insufficienza renale"], "a": 0, "c": "rene", "w": "La bradicardia NON è un effetto degli ACE-inibitori. Tipici sono invece tosse secca, angioedema, ipotensione, iperkaliemia e peggioramento della funzione renale.", "m": "ACE-i: tosse e angioedema, non bradicardia.", "f": 0, "fn": 0}, {"n": 271, "id": "N9", "q": "Di quale strumento NON ci si avvale per fare screening di malnutrizione nel paziente anziano?", "o": ["Questionario MNA", "Questionario MUST", "Bioimpedenzometria", "Antropometria", "Valutazione variazione di peso corporeo"], "a": 2, "c": "fragilita", "w": "La bioimpedenzometria stima la composizione corporea ma NON è uno strumento di screening della malnutrizione. Si usano MNA, MUST, antropometria e variazioni di peso.", "m": "Screening nutrizionale: MNA/MUST, non la BIA.", "f": 0, "fn": 0}, {"n": 272, "id": "N10", "q": "Quale di queste non è una IADL?", "o": ["Andare a comprarsi il pane", "Gestirsi le medicine", "Farsi la doccia", "…"], "a": 2, "c": "fragilita", "w": "Farsi la doccia è una BADL (igiene personale di base), non una IADL. Le IADL sono attività strumentali (spesa, farmaci, telefono, finanze).", "m": "Doccia = BADL; spesa/medicine = IADL.", "f": 0, "fn": 0}, {"n": 273, "id": "N11", "q": "Il trattamento della disfagia:", "o": ["Non richiede di adeguare la modalità di somministrazione dei farmaci", "Puo giovare della rieducazione (logopedia)", "Comprende utilizzo preferenziale di cibi liquidi per facilitare deglutizione", "Tutte corrette", "Non comprende la nutrizione artificiale"], "a": 1, "c": "farmaco", "w": "Il trattamento della disfagia può giovare della rieducazione logopedica (esercizi, manovre deglutitorie, posture). Comprende anche adattamento della dieta e modalità di somministrazione dei farmaci.", "m": "Disfagia: la logopedia aiuta.", "f": 0, "fn": 0}, {"n": 274, "id": "N12", "q": "L’unità di valutazione multidimensionale (UVM):", "o": ["Comprende sempre assistente sociale e infermiere", "Comprende sempre fisioterapista e assistente sociale", "Comprende sempre geriatra e infermiere", "Comprende sempre infermiere e fisioterapista", "Comprende sempre il geriatra"], "a": 0, "c": "fragilita", "w": "Secondo il file l'UVM comprende sempre assistente sociale e infermiere (team multiprofessionale che include anche il medico/geriatra).", "m": "UVM = team multiprofessionale (infermiere + assistente sociale + medico).", "f": 0, "fn": 0}, {"n": 275, "id": "N13", "q": "Quali dei seguenti parametri non è compreso nel fenotipo di fragilità di linda fried?", "o": ["Calo ponderale non intenzionale", "Ridotta velocità di processazione mentale", "Percezione di facile affaticabilità", "Ridotta velocità del cammino", "Riduzione attività fisica -Perdita di peso 4.5Kg anno -Affaticamento (si sente affaticato per più di 3 giorni/settimana) della≥ -Riduzione forza muscolare (hand grip) M <5.85kg, F<3.37Kg -Ridotta attività fisica (ev. Questionario PASE) -Riduzione della velocità del cammino (su percorso noto > 7\" per percorrere 5m.) Il≥"], "a": 1, "c": "fragilita", "w": "La ridotta velocità di PROCESSAZIONE mentale NON fa parte del fenotipo di Fried (che è puramente fisico). I 5 criteri sono peso, debolezza, affaticabilità, lentezza del cammino, ridotta attività fisica.", "m": "Fried è fisico: niente item cognitivi.", "f": 0, "fn": 0}, {"n": 276, "id": "N14", "q": "quadro del parkinson non include:", "o": ["Ipertono spastico", "Ipertono flaccido", "Disturbi sonno rem", "Tremore a riposo", "Lieve deficit cognitivo"], "a": 0, "c": "demenza", "w": "Il quadro del Parkinson NON include l'ipertono spastico (è piramidale): il Parkinson ha rigidità PLASTICA. Comprende invece tremore a riposo, disturbi del sonno REM, lieve deficit cognitivo.", "m": "Parkinson: rigidità plastica, non spastica.", "f": 0, "fn": 0}, {"n": 277, "id": "N15", "q": "Lo stato funzionale globale di una persona", "o": ["Puo essere valutato solo dopo aver analizzato malattie croniche di cui è affetto", "È registrato di routine nella scheda di dimissione ospedaliera", "Nessuna corretta", "È indipendente dall’ambiente in cui vive", "Non può essere valutato come livello di autonomia nelle attività quotidiane"], "a": 0, "c": "fragilita", "w": "Il file indica A. ⚠️ Lo stato funzionale globale si valuta in modo autonomo tramite ADL/IADL ed è influenzato dall'ambiente: domanda dalla formulazione ambigua, da verificare con le slide.", "m": "⚠️ Stato funzionale = si misura con ADL/IADL (domanda ambigua).", "f": 1, "fn": 1}, {"n": 278, "id": "N16", "q": "Nel paziente con ipotensione ortostatica ed ipertensione arteriosa quali classi di antipertensivi è consigliabile privilegiare?", "o": ["Diuretici dell’ansa", "Beta bloccanti", "Ace-i", "Nessuna, è preferibile non introdurre una terapia ipertensiva", "Alfa-litici"], "a": 2, "c": "cadute", "w": "Nel paziente con ipotensione ortostatica + ipertensione si preferiscono ACE-inibitori (e calcioantagonisti), evitando diuretici e alfa-litici che peggiorano l'ipotensione ortostatica.", "m": "Ortostatica + ipertensione: meglio ACE-i, no diuretici/alfa-litici.", "f": 0, "fn": 0}, {"n": 279, "id": "N17", "q": "Il trattamento di prima linea della sincope riflessa non grave e non ricorrente nell’anziano prevede:", "o": ["Educazione del pz alle norme comportamentali", "Tilt training", "Pacemaker", "Limitazione attività sportiva", "Farmaci come midodrina"], "a": 0, "c": "cadute", "w": "Il trattamento di prima linea della sincope riflessa non grave/non ricorrente è l'educazione del paziente alle norme comportamentali. Tilt training, midodrina e pacemaker sono per le forme gravi/ricorrenti.", "m": "Sincope riflessa lieve: prima si educa il paziente.", "f": 0, "fn": 0}, {"n": 280, "id": "N18", "q": "Quale tra i seguenti è un sintomo caratteristico di depressione nell’anziano?", "o": ["Anosmia", "Tachicardia", "Diarrea", "Parkinsonismo", "Calo ponderale"], "a": 4, "c": "cardio", "w": "Il calo ponderale è un sintomo caratteristico (spesso somatico) della depressione nell'anziano. Anosmia, parkinsonismo, tachicardia e diarrea non sono tipici.", "m": "Depressione anziano: spesso dimagrisce.", "f": 0, "fn": 0}, {"n": 281, "id": "N19", "q": "In un anziano a rischio cadute", "o": ["È consigliata la revisione della terapia farmacologica", "È consigliato l’utilizzo di mezzi di6 c1ontenzione", "È consigliata l’astensione delle attività ricreative all’aperto", "Tutte corrette", "È consigliata la riduzione dell’attività fisica"], "a": 0, "c": "cadute", "w": "In un anziano a rischio cadute è raccomandata la revisione della terapia farmacologica (deprescrizione di sedativi/ipotensivanti). Contenzione e riduzione dell'attività fisica sono controproducenti.", "m": "Anziano che cade: rivedi (e sfoltisci) i farmaci.", "f": 0, "fn": 0}, {"n": 282, "id": "N20", "q": "L’incontinenza urinaria da urgenza non è caratterizzata da:", "o": ["Perdita involontaria di urina coincidente con la tosse", "Perdita di notevole quantità di urina", "Nessuna corretta", "Perdita di urine diurna e notturna", "Ipertonia vescicale"], "a": 0, "c": "cute", "w": "L'incontinenza da urgenza NON è caratterizzata dalla perdita con la tosse (quella è da sforzo): dà perdite improvvise e abbondanti, diurne e notturne, con ipertonia/iperattività vescicale.", "m": "Urgenza: perdite improvvise, non con la tosse.", "f": 0, "fn": 0}, {"n": 283, "id": "N21", "q": "Nello stadio 2 delle ulcere a pressione si ha interessamento:", "o": ["Di cute, sottocute, muscoli e anche osso", "Di epidermide e derma", "Di cute e sottocute, fino alla fascia muscolare", "Di cute e strutture ossee sottostanti"], "a": 1, "c": "cardio", "w": "Lo stadio 2 dell'ulcera da pressione interessa epidermide e derma (perdita parziale di spessore, es. flittene/abrasione).", "m": "Stadio 2 = epidermide + derma.", "f": 0, "fn": 0}, {"n": 284, "id": "N22", "q": "La scala di Fazekas valuta:", "o": ["Rigidità arteriosa", "Rischio ipotensivo nell’anziano iperteso", "Fragilità", "Entità del danno cerebrovascolare a carico della sostanza bianca", "Dipping notturno"], "a": 3, "c": "fragilita", "w": "La scala di Fazekas valuta l'entità del danno cerebrovascolare a carico della sostanza bianca (iperintensità alla RM), correlato a decadimento vascolare e cadute.", "m": "Fazekas = quanta sostanza bianca è danneggiata.", "f": 0, "fn": 0}, {"n": 285, "id": "N23", "q": "Cosa si intende per delirium?", "o": ["Complicanza della sindrome bipolare", "Una possibile complicanza dell’abuso alcolico acuto", "Un disturbo comportamentale tipico delle demenze neurodegenerative avanzate", "Uno stato confusionale acuto scatenato da una causa organica sottostante", "Una complicanza motoria del parkinson"], "a": 3, "c": "demenza", "w": "Il delirium è uno stato confusionale ACUTO scatenato da una causa organica sottostante (infezione, farmaci, disidratazione, ecc.), reversibile se si rimuove la causa.", "m": "Delirium = confusione acuta con una causa organica da trovare.", "f": 0, "fn": 0}, {"n": 286, "id": "N24", "q": "Quale dei seguenti farmaci è opportuno evitare nei pz con ipertrofia prostatica con un significativo residuo post-minzionale?", "o": ["Alfalitici", "Ace-i", "Beta bloccanti", "Antidepressivi triciclici", "Tutte corrette"], "a": 3, "c": "cardio", "w": "Negli uomini con IPB vanno evitati gli antidepressivi triciclici (anticolinergici → ritenzione urinaria).", "m": "IPB: occhio agli anticolinergici (triciclici).", "f": 0, "fn": 0}, {"n": 287, "id": "N25", "q": "Quale delle seguenti carattertistiche della terapia anticoagulante orale diretta rispetto agli antivitamina K nella terapia della fibrillazione atriale non è corretta?", "o": ["Ha un profilo di rischio di sanguinamenti intracranici minore", "Ha un profilo di rischio di sanguinamenti gastrointestinali minore", "È associata a minore mortalità", "…"], "a": 1, "c": "cardio", "w": "L'affermazione FALSA è che i DOAC \"riducono i sanguinamenti gastrointestinali\": rispetto al warfarin riducono le emorragie intracraniche, ma il rischio GI per alcuni è uguale o maggiore.", "m": "I DOAC NON riducono il sanguinamento GI (anzi).", "f": 1, "fn": 1}, {"n": 288, "id": "N26", "q": "Quale tra questi è un beta bloccante?", "o": ["Salmeterolo", "Bisoprololo", "Salbutamolo", "Misoprostolo"], "a": 1, "c": "cardio", "w": "Il bisoprololo è un beta-bloccante (cardioselettivo). Salmeterolo e salbutamolo sono beta2-agonisti (broncodilatatori), il misoprostolo è una prostaglandina.", "m": "Bisoprololo = beta-bloccante; \"-olo\" beta2 = broncodilatatori.", "f": 0, "fn": 0}, {"n": 289, "id": "N28", "q": "Nel delirium è giusto:", "o": ["Prescrizione di antipsicotici", "Identificare la causa per trattarla"], "a": 1, "c": "demenza", "w": "Nel delirium la priorità è identificare e trattare la causa sottostante; gli antipsicotici sono solo sintomatici (per agitazione grave) e possono peggiorare il quadro.", "m": "Delirium: cura la causa, non solo l'agitazione.", "f": 1, "fn": 1}, {"n": 290, "id": "N29", "q": "Gli anticoagulanti diretti, seleziona quella sbagliata (sembrano tutte giuste)", "o": ["Rispetto al warfarin riducono tutti gli eventi tromboembolici", "rispetto al warfarin riducono i sanguinamenti intracranici", "riducono i sanguinamenti GI", "la mortalità miglior6e2", "hanno un profilo di sicurezza"], "a": 2, "c": "cardio", "w": "L'affermazione FALSA è che i DOAC \"riducono i sanguinamenti gastrointestinali\": rispetto al warfarin riducono le emorragie intracraniche, ma il rischio GI per alcuni è uguale o maggiore.", "m": "I DOAC NON riducono il sanguinamento GI (anzi).", "f": 0, "fn": 0}, {"n": 291, "id": "N30", "q": "La caduta può essere:", "o": ["Secondaria a scompenso", "Secondaria a osteoporosi", "secondaria a ipertensione?", "secondaria a demenze", "Nessuna"], "a": 3, "c": "cadute", "w": "La caduta nell'anziano può essere secondaria a demenza (deficit attentivi, aprassia della marcia, BPSD). Anche scompenso e farmaci contribuiscono.", "m": "Demenza → cadute (attenzione e marcia compromesse).", "f": 0, "fn": 0}, {"n": 292, "id": "N31", "q": "La creatinina nell’anziano", "o": ["Può essere normale con deficit renale lieve (giusta)", "Non è un buon indice per calcolare la frazione d’escrezione nell’anziano"], "a": 0, "c": "rene", "w": "Nell'anziano la creatinina può essere normale pur in presenza di un deficit renale lieve, perché la scarsa massa muscolare ne riduce la produzione (sovrastima del filtrato).", "m": "Creatinina \"normale\" nell'anziano può nascondere un rene già ridotto.", "f": 0, "fn": 0}, {"n": 293, "id": "N32", "q": "Quale di questi farmaci non causa incontinenza urinaria?", "o": ["Sartani", "Benzodiazepine", "Antidepressivi", "Diuretici dell’ansa"], "a": 0, "c": "farmaco", "w": "I sartani (ARB) NON causano incontinenza. La possono causare benzodiazepine, antidepressivi e diuretici dell'ansa.", "m": "Sartani non danno incontinenza.", "f": 0, "fn": 0}, {"n": 294, "id": "N33", "q": "Il rene nell’anziano", "o": ["aumenta riassorbimento proteine", "aumenta riassorbimento sodio", "riduzione funzione tubulare (giusta)", "riduzione produzione autacoidi renali", "riduzione produzione renina"], "a": 2, "c": "rene", "w": "Nel rene senile si riduce la funzione tubulare (capacità di concentrare/diluire le urine, riassorbimento), oltre a ridursi flusso plasmatico e numero di glomeruli.", "m": "Rene vecchio: tubuli meno efficienti.", "f": 0, "fn": 0}, {"n": 295, "id": "N34", "q": "Quale non è controindicazione per l’uso dei beta-bloccanti?", "o": ["bradicardia", "blocco av avanzato", "shock cardiogeno", "asma", "BPCO"], "a": 4, "c": "cardio", "w": "La BPCO NON è una controindicazione ai beta-bloccanti (anzi, i cardioselettivi sono usabili). Controindicazioni vere: bradicardia, blocco AV avanzato, shock cardiogeno, asma.", "m": "BPCO: i beta-bloccanti cardioselettivi si possono usare.", "f": 0, "fn": 0}, {"n": 296, "id": "N35", "q": "Che cos’è il piano assistenziale per gli anziani?", "o": ["Di natura socio-sanitaria, continua e flessibile", "solo sociale, continua e flessibile"], "a": 0, "c": "cure", "w": "Il piano assistenziale per l'anziano è di natura socio-sanitaria, continua e flessibile (integra bisogni sanitari e sociali, adattandosi nel tempo).", "m": "Piano assistenziale = socio-sanitario, continuo e flessibile.", "f": 0, "fn": 0}, {"n": 297, "id": "N36", "q": "L’approccio multi-dimensionale della visita geriatrica, prevede:", "o": ["Valutazione neuro-cognitiva, motoria e funzionale", "Valutazione del domicilio", "Rete sociale", "Tutte"], "a": 3, "c": "demenza", "w": "L'approccio multidimensionale della visita geriatrica comprende valutazione neuro-cognitiva, motoria e funzionale, del domicilio e della rete sociale → tutte.", "m": "VMD geriatrica = clinica + funzione + casa + rete sociale.", "f": 0, "fn": 0}, {"n": 298, "id": "N44", "q": "Il trattamento con precursori della L- Dopa (controllare se c’è scritto è VERA/FALSA)", "o": ["È controindicato in presenza di demenza", "È una seconda scelta nella malattia di Parkinson nell’anziano", "Può essere causa di incremento dei valori pressori", "È indicato nel trattamento dell'atassia6", "Nessuna delle risposte è corretta"], "a": 2, "c": "demenza", "w": "La levodopa (precursore della dopamina) può causare incremento dei valori pressori (ed effetti dopaminergici periferici). Non è controindicata nella demenza né è seconda scelta nell'anziano.", "m": "Levodopa: può alzare la pressione.", "f": 0, "fn": 0}, {"n": 299, "id": "N46", "q": "Quale di questa non è una classificazione dello scompenso?", "o": ["destro vs sinistro vs globale", "acuto vs cronico", "HFmrEF vs HFrEF vs HFpEF", "nessuna", "acuto de novo vs qualcosa che non ricordo"], "a": 3, "c": "cardio", "w": "\"Nessuna\" è la risposta: destro/sinistro/globale, acuto/cronico, HFmrEF/HFrEF/HFpEF, acuto de novo sono TUTTE classificazioni valide dello scompenso → nessuna è \"non una classificazione\".", "m": "Sono tutte vere classificazioni → \"nessuna\" esclusa.", "f": 0, "fn": 0}, {"n": 300, "id": "N47", "q": "La valutazione dell’anziano con caduta:", "o": ["non comprende la valutazione cognitivo comportamentale", "richiede generalmente una TC del cranio anche in assenza di traumi", "richiede sempre una valutazione ortopedica", "può richiedere una valutazione specialistica per escludere una perdita di coscienza di natura sincopale", "non comprende la revisione della terapia farmacologica"], "a": 3, "c": "demenza", "w": "La valutazione dell'anziano con caduta può richiedere una valutazione specialistica per escludere una perdita di coscienza di natura sincopale (amnesia retrograda frequente).", "m": "Anziano caduto: escludi sempre la sincope.", "f": 0, "fn": 0}, {"n": 301, "id": "N48", "q": "Quale dei seguenti esami non rientra di routine nell’iter diagnostico dei pz con scompenso cardiaco?", "o": ["rx torace", "ecocardiogramma", "ECG", "dosaggio dei peptidi natriuretici", "scintigrafia miocardica da stress"], "a": 4, "c": "cardio", "w": "La scintigrafia miocardica da stress NON rientra nell'iter di routine dello scompenso. Di routine: ECG, RX torace, ecocardiogramma e peptidi natriuretici.", "m": "Scompenso di routine: ECG, RX, eco, BNP. Non la scintigrafia.", "f": 0, "fn": 0}, {"n": 302, "id": "N49", "q": "con l’avanzare dell’età, l’incidenza della sincope:", "o": ["Si mantiene costante", "Aumenta", "Diminuisce", "Si attesta intorno a 52/1000 persone/anno"], "a": 1, "c": "cadute", "w": "L'incidenza della sincope aumenta con l'età (picco nel grande anziano).", "m": "Più anni = più sincopi.", "f": 0, "fn": 0}, {"n": 303, "id": "N50", "q": "Mario, 78 anni, riferisce rialzo pressione negli ultimi mesi per cui è necessaria somministrazione di 5 antipertensivi. Dalla anamnesi risulta: diabete tipo 2, ipercolesterolemia, stenosi 75% carotide dx, pregresso infarto miocardio. Quale dei seguenti esami è più indicato per chiarire cause del peggioramento del controllo pressorio?", "o": ["TC encefalo", "EcoColorDoppler tronchi sovraortici", "EcoColorDoppler cardiaco", "Dosaggio cortisolo libero urinario", "EcoColorDoppler arterie renali"], "a": 4, "c": "cardio", "w": "In un anziano con peggioramento del controllo pressorio nonostante 5 antipertensivi e fattori di rischio vascolare, va sospettata l'ipertensione nefrovascolare: l'esame indicato è l'EcoColorDoppler delle arterie renali (stenosi).", "m": "Pressione \"ribelle\" + vasculopatia → cerca la stenosi renale.", "f": 0, "fn": 0}, {"n": 304, "id": "N51", "q": "I valori terapeutici di INR nella Fibrillazione atriale sono generalmente compresi tra:", "o": ["4 e 5", "3 e 4", "2 e 4", "1 e 2", "2 e 3"], "a": 4, "c": "cardio", "w": "Il range terapeutico dell'INR nella FA è 2-3.", "m": "INR FA = 2-3.", "f": 0, "fn": 0}, {"n": 305, "id": "N52", "q": "In presenza di un anziano con sintomatologia depressiva:", "o": ["Opportuno richiedere sempre una consulenza psichiatrica", "Opportuno non indagare il rischio suicidario per non facilitare il passaggio all’atto", "Opportuno chiedere esplicitamente in merito all’ideazione suicidaria per ridurre il senso di solitudine del soggetto", "Nessuna corretta", "Opportuno sviare il discorso se il pz manifesta pensiero di morte in modo da creare un clima di ottimismo"], "a": 2, "c": "psiche", "w": "Davanti a sintomatologia depressiva nell'anziano è opportuno chiedere esplicitamente dell'ideazione suicidaria: indagare NON aumenta il rischio, anzi riduce l'isolamento e permette di intervenire.", "m": "Chiedi del suicidio: parlarne aiuta, non istiga.", "f": 0, "fn": 0}, {"n": 306, "id": "N53", "q": "Quale tra i seguenti sono importanti meccanismi patogenetici della sarcopenia?", "o": ["Apoptosi, infiammazione perineurale", "Aumentato catabolismo proteico, apoptosi, aumentata sintesi proteica", "Ridotta sensibilità alle catecolamine, apoptosi, ridotta sintesi proteica", "Aumentata sensibilità al GH, aumentato catabolismo proteico, ridotta sintesi proteica", "Aumentato catabolismo proteico, apoptosi, ridotta sintesi proteica"], "a": 4, "c": "fragilita", "w": "I meccanismi della sarcopenia sono aumento del catabolismo proteico, apoptosi delle fibre e ridotta sintesi proteica (con denervazione e infiammazione cronica).", "m": "Sarcopenia: più catabolismo + apoptosi + meno sintesi.", "f": 0, "fn": 0}, {"n": 307, "id": "N54", "q": "La malattia di parkinson all’esordio colpisce:", "o": ["Muscolatura del tronco", "Nessuna corretta", "Arti superiori bilateralmente", "Arti inferiori bilateralmente", "Nervi cranici"], "a": 1, "c": "parkinson", "w": "Il Parkinson esordisce in modo asimmetrico/unilaterale (di solito a un arto superiore), quindi le opzioni \"bilaterali/tronco/nervi cranici\" sono errate → \"nessuna corretta\".", "m": "Parkinson parte da un lato → nessuna opzione bilaterale va bene.", "f": 0, "fn": 0}, {"n": 308, "id": "N55", "q": "Quale delle seguenti formule per la stima del filtrato renale include tra le sue variabili il peso corporeo?", "o": ["CDK/EPI cistatina/creatinina", "MDRD", "CDK/EPI creatinina", "Formule BIS", "Cockroft-Gault"], "a": 4, "c": "rene", "w": "La formula di Cockroft-Gault è quella che include il peso corporeo.", "m": "Cockroft-Gault = formula col peso.", "f": 0, "fn": 0}, {"n": 309, "id": "N56", "q": "Un signore di 81 anni giunge alla tua attenzione per episodi sincopali ricorrenti (<1/settimana), alcuni dei quali traumatici, nonostante l’attuazione di misure comportamentali adeguate. Segni di allarme assenti. Non ha ipotensione ortostatica, ECG normale. Non altre patologie di rilievo in anamnesi. Come procederesti?", "o": ["Esecuzione di Tilt Table Test e di massaggio dei seni carotideo", "Ecocolordoppler dei tronchi sovraortici", "Non eseguire ulteriori accertamenti e consigliare calze elasto-compressive", "Esecuzione Holter cardiaco delle 24 ore", "Esecuzione di Tilt Table Test"], "a": 0, "c": "cadute", "w": "In un anziano con sincopi ricorrenti inspiegate (al termine della valutazione iniziale negativa) sono indicati tilt table test e massaggio dei seni carotidei.", "m": "Sincopi oscure: tilt test + massaggio carotideo.", "f": 0, "fn": 0}, {"n": 310, "id": "N57", "q": "Quale tra le seguenti scale indica lo stadio di gravità della malattia di parkinson?", "o": ["BADL", "IADL", "GDS", "SF-36", "Hoen & Yahr"], "a": 4, "c": "fragilita", "w": "La scala di Hoehn-Yahr indica lo stadio di gravità della malattia di Parkinson.", "m": "Hoehn-Yahr = stadio del Parkinson.", "f": 0, "fn": 0}, {"n": 311, "id": "N58", "q": "La diagnosi di delirium:", "o": ["Non puo essere fatta in pronto soccorso", "Non influenza la prognosi del paziente", "Necessita di biomarker sierici specifici", "Puo essere agevolata dalla CAM (confusion assessment method)", "Puo essere fatta solo dopo la risoluzione della confusione mentale acuta"], "a": 3, "c": "demenza", "w": "La diagnosi di delirium è agevolata dalla CAM (Confusion Assessment Method), applicabile anche in pronto soccorso; non servono biomarcatori sierici.", "m": "Delirium: usa la CAM (anche in PS).", "f": 0, "fn": 0}, {"n": 312, "id": "N59", "q": "Il modello di cogestione ortopedico/geriatrica:", "o": ["Si associa ad un aumento dei costi sanitari globali", "Si associa ad un aumento della degenza ospedaliera", "Nessuna corretta", "Non è realizzabile nella pratica clinica", "Si associa a minor incidenza di complicanze post-operatorie"], "a": 4, "c": "fragilita", "w": "Il modello di co-gestione ortopedico-geriatrica si associa a minore incidenza di complicanze post-operatorie (e migliore recupero, minore mortalità), senza aumentare costi o degenza.", "m": "Ortogeriatria = meno complicanze dopo l'intervento.", "f": 0, "fn": 0}, {"n": 313, "id": "N60", "q": "Quale dei seguenti servizi non è compreso nella rete dei servizi per l’anziano?", "o": ["RSA", "Centro diurno", "Ospedale per acuti", "Nessuna corretta", "Ambulatorio specialistico"], "a": 3, "c": "cure", "w": "RSA, centro diurno, ospedale per acuti e ambulatorio specialistico fanno TUTTI parte della rete dei servizi per l'anziano → \"nessuna\" è esclusa.", "m": "Sono tutti servizi della rete → \"nessuna\" è la corretta.", "f": 0, "fn": 0}, {"n": 314, "id": "N61", "q": "L’incontinenza da sforzo:", "o": ["Si caratterizza di solito per la perdita di notevole quantità di urina", "La perdita di urine è sia diurna che notturna", "Si caratterizza di solito per la perdita di piccole quantità di urina", "Si associa a iperattività detrusionale", "È piu frequente nel sesso maschile"], "a": 2, "c": "cute", "w": "L'incontinenza da sforzo si caratterizza per la perdita di PICCOLE quantità di urina con l'aumento della pressione addominale (tosse, sforzo); è più frequente nella donna.", "m": "Sforzo = piccole perdite con tosse/sforzo.", "f": 0, "fn": 0}, {"n": 315, "id": "N63", "q": "Possono essere manifestazioni di scompenso cardiaco nell’anziano eccetto:", "o": ["Astenia", "Dispnea da sforzo", "Dispnea da primo decubito", "Afasia", "Ortopnea"], "a": 3, "c": "demenza", "w": "L'afasia NON è una manifestazione di scompenso cardiaco. Lo scompenso dà astenia, dispnea (da sforzo, ortopnea, da decubito).", "m": "Scompenso: dispnea e astenia, non afasia.", "f": 0, "fn": 0}, {"n": 316, "id": "N64", "q": "Le attività basiche della vita quotidiana (BADL) non comprendono:", "o": ["Scegliere i propri vestiti", "Essere in grado di mangiare autonomamente", "Preparare un pasto", "Essere autonomi nell’utilizzo della toilette", "Mantenimento della continenza sfinterica"], "a": 2, "c": "fragilita", "w": "Preparare un pasto è una IADL, NON una BADL. Le BADL (Katz) sono vestirsi, mangiare, toilette, continenza, trasferimenti, igiene.", "m": "Cucinare = IADL; mangiare = BADL.", "f": 0, "fn": 0}, {"n": 317, "id": "N65", "q": "Dei vari tipi di demenza dell’anziano la malattia di Alzheimer rappresenta:", "o": ["Il 5-10%", "Il 20-30%", "Circa 80%", "Il 50-60%", "Il 100%"], "a": 3, "c": "demenza", "w": "L'Alzheimer rappresenta circa il 50-60% di tutte le demenze.", "m": "Alzheimer ≈ 50-60% delle demenze.", "f": 0, "fn": 0}, {"n": 318, "id": "N67", "q": "Causa più frequente di ipertensione:", "o": ["dm", "ipertensione", "uricemia", "altre possibilità che non ricordo"], "a": 1, "c": "cardio", "w": "Il file indica \"ipertensione\" (B), ma l'opzione è formulata in modo confuso. ⚠️ La causa più frequente di ipertensione è quella essenziale/primitiva (idiopatica, ~90% dei casi): domanda mal trascritta nel file.", "m": "⚠️ Ipertensione: nel 90% è essenziale (idiopatica).", "f": 1, "fn": 1}, {"n": 319, "id": "N68", "q": "Quando è indicato l'impianto di loop recorder:", "o": ["ipotensione ortost asintomatica", "ipotensione post minzionale recidivante", "ictus criptogenico (giusta)", "altre possibilità che non ricordo"], "a": 2, "c": "cute", "w": "L'impianto di loop recorder è indicato nell'ictus criptogenetico (per cercare una FA parossistica) e nelle sincopi inspiegate ricorrenti/traumatiche.", "m": "Loop recorder: ictus criptogenetico e sincopi misteriose.", "f": 0, "fn": 0}, {"n": 320, "id": "N69", "q": "La bioimpedenzometria", "o": ["stima H2O", "si usa per valutare l'adipe", "si usa per valutare il muscolo", "altra opzione che non ricordo", "tutte"], "a": 4, "c": "fragilita", "w": "La bioimpedenzometria stima l'acqua corporea, la massa grassa e la massa muscolare/magra → tutte (è influenzata dallo stato di idratazione).", "m": "BIA: stima acqua, grasso e muscolo.", "f": 0, "fn": 0}, {"n": 321, "id": "N70", "q": "Trattamento ftx femore:", "o": ["chirurgia entro 48h indipendentemente dalla clinica", "mobilizzazione prechirurgia", "antidolorifici solo dopo intervento", "richiede valutazione muldisciplinare dopo l'ingresso per la causa", "altra possibilità che non ricordo"], "a": 3, "c": "ossa", "w": "Il trattamento della frattura di femore richiede una valutazione multidisciplinare (orto-geriatrica) fin dall'ingresso, anche per individuare la causa della caduta. La chirurgia va comunque eseguita entro 48h (salvo instabilità).", "m": "Femore: équipe multidisciplinare già dall'ingresso.", "f": 0, "fn": 0}, {"n": 322, "id": "N72", "q": "Giovanni, 89 anni, è affetto da demenza vascolare, insufficienza renale di grado moderato e ipertensione arteriosa in terapia con ramipril. Ad una visita geriatrica si rileva una pressione arteriosa clinica di 170/100 mmHg. Non è noto il controllo pressorio domiciliare. Cosa consigli?", "o": ["esecuzione di TC encefalo", "sospensione di ramipril", "introduzione di amlodipina", "introduzione di furosemide", "esecuzione di monitoraggio pressorio delle 24h per rivalutazione del controllo pressorio"], "a": 4, "c": "demenza", "w": "In un anziano con demenza vascolare, IRC e PA da rivalutare, è utile il monitoraggio pressorio 24h prima di modificare la terapia (per escludere effetto camice bianco ed evitare ipoperfusione).", "m": "Prima di toccare la terapia: ABPM 24h.", "f": 0, "fn": 0}, {"n": 323, "id": "N74", "q": "Quale delle seguenti affermazioni sull’uso del catetere vescicale NON è corretta:", "o": ["è indicato per il trattamento delle ulcere sacrali in pazienti con incontinenza urinaria", "può essere correlato a un aumento dell’incidenza di delirium in paziente", "è indicato nei pazienti con demenza e infezione delle vie urinarie", "può essere indicato per il paziente con cospicue emorragie dell’apparato urinario", "è indicato per monitorizzare la diuresi nel paziente in shock"], "a": 2, "c": "demenza", "w": "È FALSO che il catetere vescicale sia indicato nei pazienti con demenza e infezione delle vie urinarie (il catetere ANZI favorisce le IVU e il delirium). È indicato per ulcere sacrali, ritenzione/emorragie, monitoraggio diuresi nello shock.", "m": "Catetere: non si mette per demenza + IVU (peggiora).", "f": 0, "fn": 0}, {"n": 324, "id": "N75", "q": "Il trattamento dell’ipotensione ortostatica può comprendere:", "o": ["l’utilizzo di fascia addominale", "la somministrazione di B bloccanti", "l’impianti di pacemaker", "nessuna delle altre risposte", "somministrazione di Ca antagonisti"], "a": 0, "c": "cadute", "w": "Il trattamento dell'ipotensione ortostatica comprende la fascia addominale (riduce il pooling venoso splancnico). Beta-bloccanti, calcioantagonisti e pacemaker non sono indicati.", "m": "Ortostatica: fascia addominale (meno sangue \"in pancia\").", "f": 0, "fn": 0}, {"n": 325, "id": "N76", "q": "Quale di queste affermazioni sull’incontinenza urinaria NON è corretta:", "o": ["il volume di urina disperso è variabile in relazione al tipo di incontinenza presente", "l’incontinenza urinaria, promuovendo fenomeni di macerazione, contribuisce allo sviluppo di", "la sua presenza è ancora poco valutata nella pratica clinica", "può influire in modo significativo sulle relazioni sociali del paziente", "per il suo trattamento è sempre necessario utilizzare il catetere vescicale"], "a": 4, "c": "cute", "w": "È FALSO che per trattare l'incontinenza serva SEMPRE il catetere vescicale: il catetere è l'ultima scelta. Le altre affermazioni (volume variabile, macerazione cutanea, sottovalutazione clinica, impatto sociale) sono vere.", "m": "Incontinenza: il catetere NON è obbligatorio (anzi, evitalo).", "f": 0, "fn": 0}, {"n": 326, "id": "N77", "q": "L’utilizzo di farmaci antipsicotici:", "o": ["è indicato in prevenzione del delirium", "può aumentare il rischio di delirium", "non è mai utile in presenza di delirium", "è utile per migliorare il livello cognitivo nel delirium", "nessuna"], "a": 1, "c": "demenza", "w": "Gli antipsicotici possono AUMENTARE il rischio di delirium (anticolinergici, sedazione) e non vanno usati in prevenzione né per migliorare la cognitività: solo sintomatici nell'agitazione grave.", "m": "Antipsicotici: possono peggiorare/causare delirium.", "f": 0, "fn": 0}, {"n": 327, "id": "N78", "q": "La prevenzione del delirium in ospedale NON richiede:", "o": ["la mobilizzazione precoce del paziente", "la presenza dei familiari", "l’utilizzo di pratiche di orientamento verbale", "la correzione di deficit sensoriali", "l’utilizzo di mezzi di contenzione"], "a": 4, "c": "demenza", "w": "La prevenzione del delirium in ospedale NON richiede i mezzi di contenzione (che anzi lo favoriscono). Richiede mobilizzazione precoce, presenza dei familiari, riorientamento, correzione dei deficit sensoriali.", "m": "Per prevenire il delirium NON serve legare il paziente.", "f": 0, "fn": 0}, {"n": 328, "id": "N79", "q": "Quale delle seguenti affermazioni in merito alla valutazione dello stato nutrizionale mediante il Body Mass Index nell’anziano corretta: è", "o": ["un BMI ridotto indica sempre una malnutrizione calorico proteica", "nel calcolo del BMI, la statua deve essere aggiustata per età", "un BMI elevato della massa grassa", "La rilevazione del BMI nell’anziano è necessaria per una corretta valutazione dello stato", "OMS classifica il BMI in modo diverso in funzione dell’età"], "a": 3, "c": "nutrizione", "w": "La rilevazione del BMI nell'anziano è necessaria per una corretta valutazione dello stato nutrizionale (pur con i suoi limiti: idratazione, statura difficile da misurare). L'OMS non usa classi età-specifiche.", "m": "Il BMI serve anche nell'anziano (con cautela).", "f": 0, "fn": 0}, {"n": 329, "id": "N80", "q": "le cadute nell’anziano", "o": ["possono essere causate dallo scompenso cardiaco", "possono essere causate dall’osteoporosi", "possono essere legate alla presenza di demenza", "raramente sono spiegate dalla terapia farmacologica"], "a": 2, "c": "demenza", "w": "Le cadute nell'anziano possono essere legate alla demenza (deficit attentivi, aprassia della marcia). Anche scompenso, farmaci e ipotensione contribuiscono.", "m": "Demenza tra le cause di caduta.", "f": 0, "fn": 0}, {"n": 330, "id": "N81", "q": "NON è un fattore di rischio di ulcere da pressione:", "o": ["osteoartrosi", "anemia", "macerazione", "malnutrizione", "diabete mellito"], "a": 2, "c": "cardio", "w": "Il file indica la macerazione come NON fattore di rischio (C). ⚠️ In realtà la macerazione/umidità è un classico fattore di rischio delle ulcere da pressione: domanda probabilmente con risposta errata nel file (verifica le slide).", "m": "⚠️ Attenzione: l'umidità/macerazione È un fattore di rischio per le piaghe.", "f": 1, "fn": 1}, {"n": 331, "id": "N82", "q": "Quale di queste non è caratteristica della malattia di Parkinson avanzata:", "o": ["Discinesie", "Fluttuazioni motorie", "Demenze", "Atassia", "Freezing"], "a": 3, "c": "parkinson", "w": "L'atassia NON è caratteristica del Parkinson avanzato (orienta verso atrofia multisistemica/cerebellare). Tipiche dell'avanzato: discinesie, fluttuazioni motorie, freezing, demenza.", "m": "Atassia → non è del Parkinson (pensa MSA).", "f": 0, "fn": 0}, {"n": 332, "id": "N84", "q": "Con classe NIYHA III si intende la presenza di sintomi:", "o": ["per sforzi moderati", "per sforzi lievi", "in bicicletta o su tapis roulant", "a riposo", "per sforzi intensi"], "a": 1, "c": "varie", "w": "La classe NYHA III indica sintomi (dispnea/astenia) per sforzi lievi (marcata limitazione dell'attività ordinaria), asintomatico a riposo.", "m": "NYHA III = sintomi per sforzi lievi.", "f": 0, "fn": 0}, {"n": 333, "id": "N85", "q": "Sono fattori di rischio per caduta nel paziente anziano:", "o": ["storie di caduta", "disabilità ADL", "tutte", "disturbi dell’andatura", "debolezza muscolare"], "a": 2, "c": "fragilita", "w": "Storia di cadute, disabilità nelle ADL, disturbi dell'andatura e debolezza muscolare sono TUTTI fattori di rischio di caduta → tutte.", "m": "Fattori di caduta: cadute pregresse, andatura, forza, ADL.", "f": 0, "fn": 0}, {"n": 334, "id": "N86", "q": "Francesco, 84 anni, si sottopone ad una visita geriatrica di concentrazione presente da alcune settimane, con difficoltà a svolgere le attività di vita quotidiana. Lamenta inoltre riduzione dell’appetito, per cui ha perso circa 3kg negli ultimi 3 mesi. Al Mini Mental State Examination totalizza un punteggio di 25/30, alla Geriatric Depression Scale un punteggio di 12/15. Quale intervento suggeriresti per primo:", "o": ["Trattamento con benzodiazepine", "Trattamento con antidepressivi triciclici", "Trattamento con inibitori delle colinesterasi", "Esofago-Gastro-duodenoscopia urgente", "nessuna"], "a": 1, "c": "demenza", "w": "Il file segna gli antidepressivi (triciclici) per un quadro depressivo/pseudodemenza. ⚠️ Nell'anziano i triciclici sono però da evitare (anticolinergici): la scelta corretta sarebbe un SSRI. Verifica la formulazione completa con le slide.", "m": "⚠️ Depressione anziano: meglio SSRI, i triciclici si evitano.", "f": 1, "fn": 1}, {"n": 335, "id": "N87", "q": "La seconda causa di demenza per frequenza nell’anziano (15-20% delle demenze totali) è:", "o": ["Demenza temporale senile", "Demenza fronto-temporali", "Demenza a corpi di Lewi", "Demenza vascolare", "Idrocefalo normoteso"], "a": 3, "c": "demenza", "w": "La seconda causa di demenza per frequenza (≈15-20%) è la demenza vascolare.", "m": "Seconda demenza = vascolare.", "f": 0, "fn": 0}, {"n": 336, "id": "N88", "q": "Gli esercizi di rinforzo muscolare pelvico (esercizi di Kegel) hanno un ruolo nel processo terapeutico di:", "o": ["Incontinenza urinaria da sforzo", "Incontinenza urinaria funzionale", "tutte le risposte", "incontinenza urinaria da sforzo da urgenza", "incontinenza urinaria da rigurgito"], "a": 0, "c": "cute", "w": "Gli esercizi di rinforzo del pavimento pelvico (Kegel) hanno un ruolo soprattutto nell'incontinenza urinaria da sforzo (rinforzano lo sfintere/pavimento).", "m": "Kegel = incontinenza da sforzo.", "f": 0, "fn": 0}, {"n": 337, "id": "N89", "q": "Decadimento cognitivo associato a Malattia di Parkinson:", "o": ["è di regola presente fin dall’esordio della malattia", "è più frequente nell’anziano che nel giovane adulto", "è caratterizzato da un deficit prevalente del linguaggio", "raramente si associa ad allucinazioni visive", "è causato da problematiche cerebrovascolari"], "a": 1, "c": "demenza", "w": "Il decadimento cognitivo associato al Parkinson è più frequente nell'anziano che nel giovane adulto (e tende a comparire in fase avanzata, con allucinazioni visive frequenti).", "m": "Parkinson + età = più rischio di demenza.", "f": 1, "fn": 1}, {"n": 338, "id": "N90", "q": "Cadute nell’anziano quale falsa:", "o": ["5-10% sono traumatiche", "incidenza 34% negli ultrasessantacinquenni", "causano disabilità e morte", "sono associate a paura di cadere"], "a": 3, "c": "cadute", "w": "Il file segna come falsa \"associate a paura di cadere\" (D). ⚠️ In realtà le cadute SONO associate alla paura di cadere (sindrome post-caduta): probabile errore di evidenziazione nel file; la falsa è più verosimilmente un dato numerico.", "m": "⚠️ Le cadute SI associano alla paura di cadere (verifica quale sia la falsa).", "f": 1, "fn": 1}, {"n": 339, "id": "N91", "q": "Test MUST cosa non è presente", "o": ["valutazione BMI", "stato malattia acuta", "tutte corrette", "introito proteico", "perdita di peso involontaria"], "a": 3, "c": "nutrizione", "w": "Il test MUST NON include l'introito proteico: valuta BMI, perdita di peso involontaria e presenza di malattia acuta.", "m": "MUST: BMI + calo peso + malattia acuta (no proteine).", "f": 0, "fn": 0}, {"n": 340, "id": "N92", "q": "Paziente a letto con emiplegia cosa sia fa per prevenire ulcere da decubito:", "o": ["riposizionamento frequente a letto", "uso presidi assorbenti", "inizio precoce di tp antitrombotica", "inizio precoce tp antibiotica", "tutte corrette"], "a": 4, "c": "cardio", "w": "Per prevenire le ulcere da decubito nell'emiplegico il file indica \"tutte corrette\" (E). La misura cardine è il riposizionamento frequente; ⚠️ la profilassi antibiotica NON serve a prevenire le piaghe (verifica le slide).", "m": "⚠️ Piaghe: cambia spesso posizione; l'antibiotico non è prevenzione.", "f": 1, "fn": 1}, {"n": 341, "id": "N93", "q": "Quale delle seguenti è una possibile causa di cadute nell’anziano con demenza: NON", "o": ["ipotensione ortostatica", "Affaccendamento motorio", "Deficit attenzionale", "Ipertensione arteriosa", "Effetti avversi da farmaci"], "a": 3, "c": "demenza", "w": "Il file indica l'ipertensione arteriosa (D). ⚠️ Tra le cause di caduta nel demente le più tipiche sono ipotensione ortostatica, affaccendamento motorio, deficit attentivo ed effetti avversi dei farmaci: l'ipertensione è la meno coerente, possibile errore/formulazione \"quale NON\". Verifica le slide.", "m": "⚠️ Cadute nel demente: di solito è l'ipotensione, non l'ipertensione.", "f": 1, "fn": 1}, {"n": 342, "id": "N94", "q": "Quale è la metodica di scelta per la diagnosi di Sarcopenia nella pratica clinica?", "o": ["Bioimpedenziometria", "Risonanza Magnetica", "DEXA", "Antropometria", "Ecografia Muscolare"], "a": 2, "c": "fragilita", "w": "La metodica di scelta nella pratica clinica per la diagnosi di sarcopenia (massa muscolare) è la DEXA.", "m": "Sarcopenia: misura la massa con la DEXA.", "f": 0, "fn": 0}, {"n": 343, "id": "N95", "q": "La valutazione multidimensionale geriatri7c1a nei soggetti con frattura di femore deve considerare", "o": ["la domiciliazione unica del paziente", "tutte le altre risposte sono corrette", "le comorbilità e la terapia farmacologica", "la rete sociale", "lo stato cognitivo, funzionale, motorio e nutrizionale del paziente"], "a": 1, "c": "demenza", "w": "La valutazione multidimensionale dell'anziano con frattura di femore deve considerare comorbilità e terapia, rete sociale, stato cognitivo-funzionale-motorio-nutrizionale e la situazione abitativa → tutte.", "m": "Frattura femore: valuta tutto (clinica, testa, funzione, casa, rete).", "f": 0, "fn": 0}, {"n": 344, "id": "186", "q": "Dove si riscontra il segno di Osler?", "o": ["Nella pseudoipertensione (arteria radiale ancora palpabile col bracciale gonfiato, da calcificazione arteriosa)", "Nella stenosi aortica severa", "Nell’ipotensione ortostatica", "Nella fibrillazione atriale"], "a": 0, "c": "cardio", "w": "Il segno di Osler indica la pseudoipertensione: per la calcificazione/rigidità delle arterie l’arteria radiale resta palpabile anche col bracciale gonfiato sopra la sistolica, e lo sfigmomanometro sovrastima la pressione. ⚠️ Nel file era riportata solo la risposta: le altre opzioni le ho aggiunte io.", "m": "Osler positivo = pseudoipertensione (arterie calcifiche).", "f": 1, "fn": 2}, {"n": 345, "id": "245", "q": "Quali farmaci si usano nei disturbi dell’umore (depressione) dell’anziano?", "o": ["Antidepressivi (SSRI di prima scelta)", "Antipsicotici", "Benzodiazepine", "Anticolinesterasici"], "a": 0, "c": "psiche", "w": "I disturbi dell’umore (depressione) si trattano con antidepressivi; nell’anziano si preferiscono gli SSRI per il miglior profilo di tollerabilità. ⚠️ Nel file era riportata solo la risposta.", "m": "Depressione anziano → antidepressivi (SSRI).", "f": 1, "fn": 2}, {"n": 346, "id": "N27", "q": "L’incontinenza urinaria da rigurgito (overflow) è causata da:", "o": ["Ipoattività detrusoriale e/o ostruzione allo svuotamento, con ritenzione e gocciolamento da iperriempimento", "Iperattività detrusoriale", "Deficit isolato dello sfintere uretrale", "Ipertono dello sfintere senza ostruzione"], "a": 0, "c": "cute", "w": "L’incontinenza da rigurgito deriva da una vescica iperdistesa: detrusore ipoattivo/acontrattile e/o ostruzione allo svuotamento (es. IPB), con ritenzione e perdite da iperriempimento. ⚠️ Nel file era riportata solo la risposta.", "m": "Rigurgito = vescica piena che trabocca (detrusore pigro o ostruzione).", "f": 1, "fn": 2}, {"n": 347, "id": "N43", "q": "Che stadio è un’ulcera da pressione che si presenta come eritema non sbiancante a cute integra (interessa solo l’epidermide)?", "o": ["Stadio 1", "Stadio 2", "Stadio 3", "Stadio 4"], "a": 0, "c": "cute", "w": "L’eritema persistente non sbiancante su cute integra è lo stadio 1. ⚠️ Nel file le opzioni partivano dallo stadio 2 (lo stadio 1 mancava): l’ho aggiunto io. Lo stadio 2 è perdita parziale (epidermide+derma), il 3 a tutto spessore fino alla fascia, il 4 espone muscolo/osso.", "m": "Eritema non sbiancante a cute integra = stadio 1.", "f": 1, "fn": 2}, {"n": 348, "id": "T1", "q": "Presentazione crisi di porfiria acuta", "o": ["dispnea, tosse, dolore toracico", "confusione mentale, scosse tonico-cloniche, poliuria", "distensione dolore addominale, stipsi, vomito", "distensione addominale non dolorosa, stipsi, vomito", "distensione addominale dolorosa, diarrea, vomito"], "a": 2, "c": "demenza", "w": "La crisi di porfiria acuta intermittente dà dolore addominale colico intenso + stipsi/vomito (sindrome addominale acuta), non dispnea né convulsioni nella presentazione tipica. La diarrea non è il segno dominante.", "m": "Porfiria acuta = pancia che urla + stipsi + vomito.", "f": 0, "fn": 0}, {"n": 349, "id": "T2", "q": "coma che si presenta con midriasi", "o": ["ipoglicemico", "iperglicemico", "da intossicazione esogena", "uremico", "tutti i precedenti"], "a": 0, "c": "ossa", "w": "Solo nell'intossicazione esogena (es. atropina, cocaina, anfetamine) la midriasi è l'elemento chiave. Nell'ipoglicemia le pupille possono essere midriatiche ma non è costante; nel coma uremico ci può essere miosi.", "m": "Midriasi nel coma → pensa all'intossicazione esogena.", "f": 0, "fn": 0}, {"n": 350, "id": "T3", "q": "quali di questi non è indice di funzionalità", "o": ["APGAR", "ADL", "IADL", "NYHA", "scala di Levine"], "a": 4, "c": "fragilita", "w": "APGAR è un punteggio neonatale (non valuta la funzionalità dell'anziano). ADL, IADL e NYHA valutano la funzione; la scala di Levine è cardiologica ma può orientare la funzionalità.", "m": "APGAR = neonati, non anziani.", "f": 0, "fn": 0}, {"n": 351, "id": "T4", "q": "farmaci che danno alcalosi metabolica", "o": ["diuretici d'ansa", "diuretici risparmiatori di K", "FANS", "digitale", "nitroderivati"], "a": 0, "c": "cardio", "w": "I diuretici dell'ansa (furosemide) causano perdita di H⁺ e Cl⁻ → alcalosi metabolica ipoклoremica ipokaliemia. I risparmiatori di K danno acidosi; FANS, digitale e nitrati non danno alcalosi metabolica.", "m": "Furosemide → perdi H⁺ e Cl⁻ → alcalosi metabolica.", "f": 0, "fn": 0}, {"n": 352, "id": "T5", "q": "Nella macroglobulinemia di Waldenstrom l'ipergammaglobulinemia è", "o": ["IgA", "IgM", "Policlonale", "IgG lambda", "IgG kappa"], "a": 1, "c": "ossa", "w": "Nella macroglobulinemia di Waldenström la componente monoclonale è sempre IgM (prodotta dai linfociti B/plasmacellule linfoplasmocitiche). IgA e IgG appartengono al mieloma multiplo.", "m": "Waldenström = IgM (la \"M\" di Macroglobulinemia).", "f": 0, "fn": 0}, {"n": 353, "id": "T6", "q": "da che cosa è costituita l'amiloide", "o": ["IgG", "catene leggere di Ig", "proteine del collagene", "catene pesanti di IgG", "fibrina"], "a": 1, "c": "ossa", "w": "L'amiloide è costituita da catene leggere delle immunoglobuline (tipo AL, la forma più comune) oppure da proteine di fase acuta (SAA, tipo AA). IgG intere, collagene e fibrina non ne fanno parte.", "m": "Amiloide = catene leggere delle Ig (tipo AL).", "f": 0, "fn": 0}, {"n": 354, "id": "T7", "q": "cosa indica un MMSE di 27", "o": ["normale", "lieve deficit cognitivo", "lieve deficit cognitivo in analfabeta", "grave deficit cognitivo in analfabeta", "grave deficit cognitivo"], "a": 0, "c": "demenza", "w": "MMSE 27/30 è nella norma (normale ≥24). Non indica deficit cognitivo; il cut-off per il deficit lieve-moderato è <24 (o <21 per il decadimento significativo).", "m": "MMSE 27 = normale (soglia deficit <24).", "f": 0, "fn": 0}, {"n": 355, "id": "T8", "q": "quali sono i punteggi della GDS estesa", "o": ["1-30", "0-30", "0-15", "0-16", "-15/+15"], "a": 1, "c": "ossa", "w": "La GDS estesa (Geriatric Depression Scale versione lunga) va da 0 a 30 punti.", "m": "GDS estesa: 0–30 punti.", "f": 0, "fn": 0}, {"n": 356, "id": "T9", "q": "aspetto rx del morbo di paget", "o": ["osteoporosi", "addensamenti sfumati e lesioni lacunari", "osteolisi", "pseudocisti ossee", "aree osteoaddensate ma solo nelle ossa lunghe"], "a": 1, "c": "ossa", "w": "Il morbo di Paget all'RX mostra un pattern misto: addensamenti sfumati (osteoblastica) e lesioni lacunari (osteolitica) nella stessa lesione, con aspetto \"a fiamma\" o \"cotone idrofilo\".", "m": "Paget all'RX = misto: addensamenti sfumati + lacune.", "f": 0, "fn": 0}, {"n": 357, "id": "T10", "q": "quali di queste non fa parte della rete geriatrica dei servizi", "o": ["RSA", "centro diurno", "ADI", "servizio di emergenza- urgenza", "reparto geriatrico per acuti"], "a": 3, "c": "fragilita", "w": "Il servizio di emergenza-urgenza (118/PS) NON fa parte della rete geriatrica dei servizi: è una rete trasversale, non specifica geriatrica. RSA, centro diurno, ADI e reparto geriatrico sono la rete dedicata.", "m": "Emergenza-urgenza non è nella rete geriatrica.", "f": 0, "fn": 0}, {"n": 358, "id": "T11", "q": "l'iperinsulinemia è presente in quale tipo di DM?", "o": ["tipo 2", "tipo 1", "tipo 1 nello stadio iniziale", "in entrambi", "in nessuno"], "a": 0, "c": "ossa", "w": "Nel DM tipo 2 c'è iperinsulinemia (soprattutto nelle fasi iniziali, con insulino-resistenza e iperinsulinismo compensatorio). Nel tipo 1 c'è carenza assoluta di insulina.", "m": "DM2 = iperinsulinemia da insulino-resistenza.", "f": 0, "fn": 0}, {"n": 359, "id": "T12", "q": "cosa indica una glicata di 4%", "o": ["probabile sovradosaggio con episodi di ipoglicemia", "scarsa efficacia della tp", "buon controllo negli ultimi mesi", "buon controllo glicemico ma solo nell'ultima settimana", "scarso controllo glicemico"], "a": 0, "c": "ossa", "w": "HbA1c 4% è sotto la norma (normale 4,5–5,7%): indica probabile sovradosaggio con episodi ipoglicemici che abbassano artificialmente la glicata. Non è indice di buon controllo.", "m": "Glicata 4% = troppo bassa → sospetta ipoglicemie da sovradosaggio.", "f": 0, "fn": 0}, {"n": 360, "id": "T13", "q": "cosa posso trovare in un ipernefroma", "o": ["anemia sideroblastica", "anemia emolitica", "anemia aplastica", "poliglobulia", "eosinofili"], "a": 3, "c": "rene", "w": "L'ipernefroma (carcinoma a cellule renali) può produrre eritropoietina ectopica → poliglobulia (eritrocitosi paraneoplastica). È uno dei tumori classicamente associati a sindromi paraneoplastiche ematologiche.", "m": "Ipernefroma → poliglobulia (EPO ectopica).", "f": 0, "fn": 0}, {"n": 361, "id": "T14", "q": "come trattare un paziente con singhiozzo incoercibile", "o": ["carbamazepina", "clorpromazina", "diazepam", "valproato", "nessuno"], "a": 1, "c": "ossa", "w": "Il singhiozzo incoercibile (>48h) si tratta con clorpromazina (antidopaminergico/antipsicoti co), che è il farmaco approvato per questa indicazione. Carbamazepina e valproato sono di seconda linea.", "m": "Singhiozzo incoercibile = clorpromazina.", "f": 0, "fn": 0}, {"n": 362, "id": "T15", "q": "cardiopatia congenita con shunt che posso trovare in un pz anziano", "o": ["dotto di Botallo", "ostium primum", "ostium secundum", "trasposizione dei grossi vasi", "coartazione congenita dell'aorta"], "a": 2, "c": "ossa", "w": "Nell'anziano la cardiopatia congenita con shunt più frequente è il difetto del setto interatriale tipo ostium secundum (il più comune in assoluto tra i DIA). Il dotto di Botallo e la TGA si correggono in età pediatrica.", "m": "Anziano con shunt congenito = ostium secundum (DIA).", "f": 0, "fn": 0}, {"n": 363, "id": "T16", "q": "effetti correzione troppo rapida di iponatriemia", "o": ["mielinolisi pontina", "IRA da tubulonecrosi", "edema cerebrale", "CID", "torsione di punta"], "a": 0, "c": "ossa", "w": "La correzione troppo rapida dell'iponatriemia causa mielinolisi osmotica pontina (sindrome da demielinizzazione osmotica): paralisi, disfagia, disartria, coma. Va corretta lentamente (max 0,5–1 mEq/L/h).", "m": "Iponatriemia corretta troppo in fretta → mielinolisi pontina.", "f": 0, "fn": 0}, {"n": 364, "id": "T17", "q": "effetti trattamento cronico amiodarone", "o": ["fibrosi polmonare", "ipotiroidismo", "ipertiroidismo", "allungamento QT", "tutte"], "a": 4, "c": "ossa", "w": "L'amiodarone cronico può dare: fibrosi polmonare, ipotiroidismo, ipertiroidismo, allungamento del QT (e fotosensibilità, depositi corneali, epatotossicità) → tutte le opzioni elencate.", "m": "Amiodarone cronico: polmone + tiroide + QT lungo. Tutte.", "f": 0, "fn": 0}, {"n": 365, "id": "T18", "q": "complicanza della stipsi cronica", "o": ["colite ischemica", "malassorbimento", "malattia diverticolare", "ernia iatale", "colon irritabile"], "a": 2, "c": "ossa", "w": "La stipsi cronica più rilevante complicanza è la malattia diverticolare del colon (diverticolosi/diverticolite), legata all'aumento della pressione intraluminale da feci dure e scarso residuo.", "m": "Stipsi cronica → malattia diverticolare.", "f": 0, "fn": 0}, {"n": 366, "id": "T19", "q": "quale non é un fattore di rischio per le piaghe da decubito", "o": ["obesitá", "ridotta mobilitá", "arteropatia obliterante", "incontinenza", "malnutrizione"], "a": 0, "c": "cardio", "w": "L'obesità NON è un fattore di rischio per le ulcere da pressione (la massa adiposa può addirittura proteggere le prominenze ossee). I fattori di rischio veri sono: immobilità, arteriopatia, incontinenza, malnutrizione.", "m": "Obesità non è un fattore di rischio per le piaghe.", "f": 0, "fn": 0}, {"n": 367, "id": "T20", "q": "la mielinolisi cerebrale pontina è una complicanza della:", "o": ["correzione troppo rapida di una ipokaliemia", "correzione troppo rapida di una acidosi metbolica", "correzione troppo rapida dell'osmolarità nel coma diabetico iperosmolare", "correzione troppo rapida di un'iposodiemia", "correzione troppo lenta di un'iposodiemia"], "a": 3, "c": "ossa", "w": "La mielinolisi cerebrale pontina è complicanza della correzione TROPPO RAPIDA di un'iposodiemia (iponatriemia). Non dell'ipokaliemia né dell'iperosmolarità diabetica.", "m": "Mielinolisi pontina = iponatriemia corretta troppo in fretta.", "f": 0, "fn": 0}, {"n": 368, "id": "T21", "q": "paziente con TIA e stenosi carotide comune >85%, qual è la terapia?", "o": ["chiedo consulto chirurgia vascolare", "tp a vita con warfarin", "tp a vita con ASA", "fare angio-RMN prima di inizare warfarin", "fare angio-TC prima di iniziare warfarin"], "a": 0, "c": "cardio", "w": "In un paziente con TIA e stenosi carotidea >85%, l'indicazione è la chirurgia vascolare (endoarteriectomia carotidea): il rischio di ictus è alto e il beneficio chirurgico è documentato per stenosi >70–80% sintomatica.", "m": "TIA + stenosi carotidea >85% → chirurgo vascolare.", "f": 0, "fn": 0}, {"n": 369, "id": "T22", "q": "cosa fai in pz anziano asintomatico con riscontro casule di PSA alto?", "o": ["lo rassicuri", "chiedi consulto urologico", "chiedo un eco transrettale", "valutazione urodinamica", "cistoscopia"], "a": 2, "c": "fragilita", "w": "Di fronte a un PSA alto asintomatico nell'anziano la prima mossa è un'eco transrettale (imaging), prima di decisioni invasive. ⚠️ Domanda segnalata come incerta nel file originale.", "m": "PSA alto → prima un'eco transrettale.", "f": 1, "fn": 1}, {"n": 370, "id": "T23", "q": "in un pz con emorragia acuta GI generalmente la tp medica blocca il sanguinamento. dopo qual è la diagnostica di elezione?", "o": ["esame radiologico del tratto GI con doppio contrasto", "EGDS + pancolonscopia", "angiografia elettiva", "esplorazione chirurgica", "nessuna"], "a": 1, "c": "cardio", "w": "Dopo aver tamponato un'emorragia GI acuta con terapia medica, la diagnostica di elezione è l'EGDS (esofago-gastro-duodenoscopia) con eventuale pancolonscopia: identifica la fonte e permette l'emostasi endoscopica.", "m": "Emorragia GI tamponata → EGDS + pancolonscopia.", "f": 0, "fn": 0}, {"n": 371, "id": "T24", "q": "valutazione multidimensionale geriatrica ideale comprende", "o": ["valutazione clinica e funzione globale", "valutazione clinica, funzione globale e cognitiva", "valutazione clinica, funzione globale, cognitiva-emozionale", "valutazione clinica. funzione globale, cognitiva-emozionale e socio-economica", "valutazione clinica, funzionale globalecognitiva- emozionale, socio-"], "a": 4, "c": "demenza", "w": "La VMD ideale comprende valutazione clinica, funzionale globale, cognitiva-emozionale, socio-economica E della rete di supporto (caregivers) → la risposta più completa è la E.", "m": "VMD completa = clinica + funzione + mente + sociale + rete.", "f": 0, "fn": 0}, {"n": 372, "id": "T25", "q": "valvulopatia piu comune nell'anziano", "o": ["prolasso mitralico", "stenosi aortica reumatica", "stenosi aortica degenerativa", "insufficienza mitralica", "insufficienza aortica"], "a": 2, "c": "cardio", "w": "La valvulopatia più comune nell'anziano è la stenosi aortica degenerativa/calcifica (non reumatica), legata all'accumulo di calcio su valvola bicuspide o tricuspide con l'età.", "m": "Anziano + valvulopatia = stenosi aortica degenerativa.", "f": 0, "fn": 0}, {"n": 373, "id": "T26", "q": "L'anemia da malattie croniche nell'anziano è tipicamente", "o": ["normocromica normocitica", "ipocromica microcitica", "ipocromica macrocitica", "in tutti e tre i modi", "nessuna delle precedenti"], "a": 0, "c": "demenza", "w": "L'anemia da malattie croniche (ACD) è tipicamente normocromica normocitica (GR di dimensioni e colore normali, con sideremia bassa ma ferritina alta). Solo nelle fasi avanzate può diventare microcitica.", "m": "Anemia cronica = normocromica normocitica.", "f": 0, "fn": 0}, {"n": 374, "id": "T27", "q": "sintomo più comune con cui si presenta il morbo di basedow nel vecchio", "o": ["astenia", "perdita di peso", "cardiopalmo", "
